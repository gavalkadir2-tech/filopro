          <ExportMenu headers={['Köpek','Tarih','Kategori','Tutar','Açıklama']} rows={disaAktarSatirlar} filename="filopro-kopek-masraflari" sheetName="Masraflar"/>
        </div>
        <table style={S.tbl}><thead><tr><th style={S.th}>Köpek</th><th style={S.th}>Tarih</th><th style={S.th}>Kategori</th><th style={S.th}>Tutar</th><th style={S.th}>Açıklama</th><th style={S.th}></th></tr></thead>
        <tbody>{masraflar.map(m=>(<tr key={m.id}><td style={S.td}>{kopekAd(m.kopekId)}</td><td style={S.td}>{fmtDate(m.tarih)}</td><td style={S.td}>{MASRAF_KATEGORI_LABEL[m.kategori]||m.kategori}</td><td style={S.td}>{fmtTL(m.tutar)}</td><td style={S.td}>{m.aciklama||'—'}</td><td style={S.td}><div style={{display:'flex',gap:5}}><button style={S.btnO} onClick={()=>{setForm(m);setErr('');setModal(true);}}>✏️</button><button style={S.btnR} onClick={()=>del(m.id)}>🗑</button></div></td></tr>))}</tbody></table>
        {masraflar.length===0&&<div style={{color:C.muted,fontSize:13,padding:'10px 0'}}>Henüz masraf kaydı yok.</div>}
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>🥧 Kategori Dağılımı</div>
        {kategoriDagilimi.length===0?<div style={{color:C.muted,fontSize:13}}>Henüz masraf kaydı yok.</div>:(<ResponsiveContainer width="100%" height={240}><PieChart><Pie data={kategoriDagilimi} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label={({name,percent})=>`${name} %${(percent*100).toFixed(0)}`} labelLine={false} fontSize={11}>{kategoriDagilimi.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Pie><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/></PieChart></ResponsiveContainer>)}
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}><button style={S.btn()} onClick={()=>{setForm({kopekId:null,tarih:today(),kategori:'mama'});setErr('');setModal(true);}}>＋ Masraf Ekle</button></div>
      </div>
    </div>
    {modal&&(<Modal title={form.id?'Masraf Düzenle':'Yeni Masraf'} onClose={()=>setModal(false)}>
      <FG label="Köpek (opsiyonel)"><select style={S.sel} value={form.kopekId||''} onChange={e=>setForm(f=>({...f,kopekId:idVal(e.target.value)}))}><option value="">Genel / Ortak Masraf</option>{kopekler.map(k=>(<option key={k.id} value={k.id}>{k.ad}</option>))}</select></FG>
      <div style={S.g2}><FG label="Tarih"><input type="date" style={S.inp} value={form.tarih||''} onChange={e=>setForm(f=>({...f,tarih:e.target.value}))}/></FG><FG label="Kategori"><select style={S.sel} value={form.kategori||'mama'} onChange={e=>setForm(f=>({...f,kategori:e.target.value}))}>{Object.entries(MASRAF_KATEGORI_LABEL).map(([k,l])=>(<option key={k} value={k}>{l}</option>))}</select></FG></div>
      <FG label="Tutar (₺)"><input type="number" style={S.inp} value={form.tutar??''} onChange={e=>setForm(f=>({...f,tutar:+e.target.value}))}/></FG>
      <FG label="Açıklama"><textarea style={S.ta} value={form.aciklama||''} onChange={e=>setForm(f=>({...f,aciklama:e.target.value}))}/></FG>
      <FormError msg={err}/>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setModal(false)}>İptal</button><button style={S.btn()} onClick={save}>Kaydet</button></div>
    </Modal>)}
  </div>);
}

// ── Canlı Konum Takip ──────────────────────────────────────────────────────────
// Bu cihaz (ör. bir personelin telefonu) "Paylaşımı Başlat" ile kendi GPS konumunu
// 'konumlar' tablosuna yazar. Bu tablo ALL_DATA_KEYS içinde olduğundan, Ayarlar >
// Senkronizasyon üzerinden bir backend bağlanmışsa diğer cihazlara ~45sn içinde
// otomatik olarak yansır. Backend bağlı değilse konum yalnızca bu cihazda görünür.
function CanliKonumGorunumu(){
  const personel=LS.get('personel')||[],araclar=LS.get('araclar')||[];
  const [konumlar,setKonumlar]=useState(LS.get('konumlar')||[]);
  const [yerler,setYerler]=useState(LS.get('konumYerleri')||[]);
  const [olaylar,setOlaylar]=useState(LS.get('konumOlaylari')||[]);
  const [kimlikTip,setKimlikTip]=useState(()=>localStorage.getItem('fp_konum_tip')||'personel');
  const [kimlikId,setKimlikId]=useState(()=>{const v=localStorage.getItem('fp_konum_id');return v?idVal(v):'';});
  const [paylasiliyor,setPaylasiliyor]=useState(false);
  const [hataMsg,setHataMsg]=useState('');
  const [pilSeviyesi,setPilSeviyesi]=useState(null);
  const [izGosterId,setIzGosterId]=useState(null);
  const [yerModal,setYerModal]=useState(false),[yerForm,setYerForm]=useState({});
  const [sosGonderiliyor,setSosGonderiliyor]=useState(false);
  const watchIdRef=useRef(null);
  const mapRef=useRef(null),mapInstRef=useRef(null),markersRef=useRef({}),cemberlerRef=useRef({}),izRef=useRef(null);
  const backendVar=!!getSyncCfg().token;
  const hizLimiti=getSettings().hizLimitiKmh||90;
  const acilDurumTel=getSettings().acilDurumTel;

  useEffect(()=>{
    if(!mapRef.current||mapInstRef.current||!window.L)return;
    const map=window.L.map(mapRef.current).setView([38.9637,35.2433],6);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    mapInstRef.current=map;
    return()=>{map.remove();mapInstRef.current=null;markersRef.current={};cemberlerRef.current={};};
  },[]);

  // Kişi/araç konum işaretçileri
  useEffect(()=>{
    const map=mapInstRef.current;
    if(!map||!window.L)return;
    const aktifIds=new Set();
    konumlar.forEach(k=>{
      aktifIds.add(k.id);
      const kisi=k.tip==='personel'?personel.find(p=>p.id===k.hedefId):araclar.find(a=>a.id===k.hedefId);
      const ad=kisi?.ad||'Bilinmiyor';
      const dk=Math.round((Date.now()-new Date(k.guncellendi).getTime())/60000);
      const asiriHiz=k.hiz&&k.hiz*3.6>hizLimiti;
      const renk=asiriHiz?'#ef4444':dk<5?'#22c55e':dk<30?'#eab308':'#94a3b8';
      const icon=window.L.divIcon({className:'',html:`<div style="background:${renk};width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5)${asiriHiz?';animation:fpPulse 1s infinite':''}"></div>`,iconSize:[16,16]});
      const popupMetin=`<strong>${k.tip==='personel'?'👤':'🚜'} ${ad}</strong><br/>${dk<1?'az önce':dk+' dk önce'}${k.hiz?`<br/>Hız: ${Math.round(k.hiz*3.6)} km/s${asiriHiz?' ⚠️':''}`:''}${k.pil!=null?`<br/>🔋 %${k.pil}`:''}`;
      if(markersRef.current[k.id]){
        markersRef.current[k.id].setLatLng([k.lat,k.lng]);
        markersRef.current[k.id].setIcon(icon);
        markersRef.current[k.id].setPopupContent(popupMetin);
      }else{
        markersRef.current[k.id]=window.L.marker([k.lat,k.lng],{icon}).addTo(map).bindPopup(popupMetin);
      }
    });
    Object.keys(markersRef.current).forEach(id=>{if(!aktifIds.has(id)){map.removeLayer(markersRef.current[id]);delete markersRef.current[id];}});
    if(konumlar.length>0&&!izGosterId){
      const bounds=window.L.latLngBounds(konumlar.map(k=>[k.lat,k.lng]));
      map.fitBounds(bounds,{padding:[40,40],maxZoom:14});
    }
  },[konumlar]);

  // Tanımlı "Yer"lerin haritada daire olarak gösterimi (Life360'daki "bubble"lar gibi)
  useEffect(()=>{
    const map=mapInstRef.current;
    if(!map||!window.L)return;
    const aktifIds=new Set();
    yerler.forEach(y=>{
      aktifIds.add(y.id);
      if(cemberlerRef.current[y.id]){
        cemberlerRef.current[y.id].setLatLng([y.lat,y.lng]).setRadius(y.yaricapM||300);
      }else{
        cemberlerRef.current[y.id]=window.L.circle([y.lat,y.lng],{radius:y.yaricapM||300,color:C.accent,fillColor:C.accent,fillOpacity:0.12,weight:1.5}).addTo(map).bindTooltip(y.ad,{permanent:false});
      }
    });
    Object.keys(cemberlerRef.current).forEach(id=>{if(!aktifIds.has(id)){map.removeLayer(cemberlerRef.current[id]);delete cemberlerRef.current[id];}});
  },[yerler]);

  // Seçili kişinin günlük izini (rota) çizer
  useEffect(()=>{
    const map=mapInstRef.current;
    if(!map||!window.L)return;
    if(izRef.current){map.removeLayer(izRef.current);izRef.current=null;}
    if(!izGosterId)return;
    const esik=Date.now()-1*86400000;
    const noktalar=(LS.get('konumGecmisi')||[]).filter(k=>`${k.tip}-${k.hedefId}`===izGosterId&&new Date(k.zaman).getTime()>=esik).sort((a,b)=>a.zaman.localeCompare(b.zaman));
    if(noktalar.length<2)return;
    izRef.current=window.L.polyline(noktalar.map(n=>[n.lat,n.lng]),{color:C.blue,weight:3,opacity:0.7}).addTo(map);
    map.fitBounds(izRef.current.getBounds(),{padding:[40,40]});
  },[izGosterId]);

  useEffect(()=>{
    const t=setInterval(()=>{setKonumlar(LS.get('konumlar')||[]);setOlaylar(LS.get('konumOlaylari')||[]);},10000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>()=>{if(watchIdRef.current!=null)navigator.geolocation.clearWatch(watchIdRef.current);},[]);

  const kimlikSecenekleri=kimlikTip==='personel'?personel:araclar;

  const pilOku=async()=>{
    try{
      if(navigator.getBattery){const b=await navigator.getBattery();setPilSeviyesi(Math.round(b.level*100));return Math.round(b.level*100);}
    }catch{}
    return null;
  };

  const baslat=async()=>{
    if(!kimlikId){setHataMsg('Önce kim olduğunuzu seçin.');return;}
    if(!navigator.geolocation){setHataMsg('Bu cihaz/tarayıcı konum paylaşımını desteklemiyor.');return;}
    setHataMsg('');
    localStorage.setItem('fp_konum_tip',kimlikTip);
    localStorage.setItem('fp_konum_id',String(kimlikId));
    const pil=await pilOku();
    watchIdRef.current=navigator.geolocation.watchPosition(
      (pos)=>{
        const recId=`${kimlikTip}-${kimlikId}`;
        const guncel=LS.get('konumlar')||[];
        const zaman=new Date().toISOString();
        const yeni={id:recId,tip:kimlikTip,hedefId:kimlikId,lat:pos.coords.latitude,lng:pos.coords.longitude,dogruluk:pos.coords.accuracy||null,hiz:pos.coords.speed||null,pil:pilSeviyesi,guncellendi:zaman};
        const n=guncel.some(k=>k.id===recId)?guncel.map(k=>k.id===recId?yeni:k):[...guncel,yeni];
        LS.set('konumlar',n);setKonumlar(n);
        konumGecmisiKaydet(kimlikTip,kimlikId,pos,zaman);
        konumGeofenceKontrol(kimlikTip,kimlikId,pos.coords.latitude,pos.coords.longitude);
        setOlaylar(LS.get('konumOlaylari')||[]);
      },
      (err)=>{setHataMsg('Konum alınamadı: '+(err.message||'bilinmeyen hata')+'. Tarayıcı/telefon ayarlarından bu siteye konum izni verin.');setPaylasiliyor(false);},
      {enableHighAccuracy:true,maximumAge:10000,timeout:20000}
    );
    setPaylasiliyor(true);
    if(pil!=null)setTimeout(pilOku,600000); // pil seviyesini 10 dk'da bir tazele
  };
  const durdur=()=>{
    if(watchIdRef.current!=null)navigator.geolocation.clearWatch(watchIdRef.current);
    watchIdRef.current=null;setPaylasiliyor(false);
  };

  const sosGonder=()=>{
    if(!acilDurumTel){setHataMsg('Önce Ayarlar > Senkronizasyon bölümünden bir "Acil Durum Telefonu" tanımlayın.');return;}
    setSosGonderiliyor(true);
    const gonderLink=(lat,lng)=>{
      const kimAdi=kimlikId?kimlikSecenekleri.find(x=>x.id===kimlikId)?.ad:'Bilinmeyen kullanıcı';
      const mesaj=`🆘 ACİL DURUM — ${kimAdi}\nKonum: https://www.google.com/maps?q=${lat},${lng}\nZaman: ${new Date().toLocaleString('tr-TR')}`;
      const link=whatsappLinkOlustur(acilDurumTel,mesaj);
      if(link)window.open(link,'_blank');
      setSosGonderiliyor(false);
    };
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        (pos)=>gonderLink(pos.coords.latitude,pos.coords.longitude),
        ()=>{const son=konumlar.find(k=>k.id===`${kimlikTip}-${kimlikId}`);if(son)gonderLink(son.lat,son.lng);else{setHataMsg('Konum alınamadı, SOS gönderilemedi.');setSosGonderiliyor(false);}},
        {enableHighAccuracy:true,timeout:10000}
      );
    }else{setSosGonderiliyor(false);setHataMsg('Bu cihaz konum almayı desteklemiyor.');}
  };

  const yerKaydet=()=>{
    if(!yerForm.ad?.trim()||yerForm.lat==null||yerForm.lng==null){fpToast('Yer adı ve konumu gereklidir.');return;}
    const n=yerForm.id?yerler.map(y=>y.id===yerForm.id?yerForm:y):[...yerler,{...yerForm,id:uid(),yaricapM:yerForm.yaricapM||300,aktif:true}];
    LS.set('konumYerleri',n);setYerler(n);setYerModal(false);
  };
  const yerSil=async(id)=>{if(!(await fpConfirm('Bu yer silinsin mi?')))return;const n=yerler.filter(y=>y.id!==id);LS.set('konumYerleri',n);setYerler(n);};
  const buradanEkle=()=>{
    if(!navigator.geolocation){fpToast('Konum desteklenmiyor.');return;}
    navigator.geolocation.getCurrentPosition(
      (pos)=>{setYerForm(f=>({...f,lat:pos.coords.latitude,lng:pos.coords.longitude}));fpToast('📍 Bu cihazın konumu alındı.');},
      ()=>fpToast('Konum alınamadı.','error')
    );
  };

  const zenginKonumlar=konumlar.map(k=>{
    const kisi=k.tip==='personel'?personel.find(p=>p.id===k.hedefId):araclar.find(a=>a.id===k.hedefId);
    const dk=Math.round((Date.now()-new Date(k.guncellendi).getTime())/60000);
    return{...k,ad:kisi?.ad||'Bilinmiyor',dk};
  }).sort((a,b)=>a.dk-b.dk);

  const bekleyenBildirimler=olaylar.filter(o=>!o.bildirimGonderildi).sort((a,b)=>b.zaman.localeCompare(a.zaman));
  const sonOlaylar=[...olaylar].sort((a,b)=>b.zaman.localeCompare(a.zaman)).slice(0,10);
  const olayAdi=(o)=>(o.tip==='personel'?personel:araclar).find(x=>x.id===o.hedefId)?.ad||'—';
  const yerAdi=(o)=>yerler.find(y=>y.id===o.yerId)?.ad||'—';
  const bildirimGonder=(o)=>{
    const tel=getSettings().konumBildirimTel;
    if(!tel){fpToast('Önce Ayarlar > Senkronizasyon bölümünden "Konum Bildirim Telefonu" tanımlayın.','error');return;}
    const link=whatsappLinkOlustur(tel,`📍 ${olayAdi(o)}, "${yerAdi(o)}" konumuna ${o.olay==='giris'?'GİRİŞ':'ÇIKIŞ'} yaptı.\n${new Date(o.zaman).toLocaleString('tr-TR')}`);
    if(link){window.open(link,'_blank');const n=olaylar.map(x=>x.id===o.id?{...x,bildirimGonderildi:true}:x);LS.set('konumOlaylari',n);setOlaylar(n);}
  };

  return(<div>
    {!backendVar&&<InfoBox color={C.yellow}>⚠️ Canlı takip birden fazla cihaz arasında veri paylaşımı gerektirir. Şu an <strong>Backend Senkronizasyonu</strong> aktif değil (Ayarlar &gt; Senkronizasyon), bu yüzden paylaşılan konum yalnızca bu cihazda görünür.</InfoBox>}
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
      <button style={{...S.btn(C.red),fontWeight:700}} onClick={sosGonder} disabled={sosGonderiliyor}>{sosGonderiliyor?'⏳ Konum alınıyor...':'🆘 ACİL DURUM (SOS)'}</button>
    </div>
    <div style={S.g3}>
      <StatCard color={C.green} value={zenginKonumlar.filter(k=>k.dk<5).length} label="Az Önce Güncellenen"/>
      <StatCard color={C.yellow} value={zenginKonumlar.filter(k=>k.dk>=5&&k.dk<30).length} label="5-30 Dk Önce"/>
      <StatCard color={C.red} value={zenginKonumlar.filter(k=>k.hiz&&k.hiz*3.6>hizLimiti).length} label="Şu An Hız İhlali"/>
    </div>
    <div style={S.card}>
      <div style={S.secTitle}>📍 Bu Cihazdan Konum Paylaş</div>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end',marginTop:10}}>
        <div style={{minWidth:140}}><FG label="Tip"><select style={S.sel} disabled={paylasiliyor} value={kimlikTip} onChange={e=>{setKimlikTip(e.target.value);setKimlikId('');}}><option value="personel">👤 Personel</option><option value="arac">🚜 Araç</option></select></FG></div>
        <div style={{minWidth:200,flex:1}}><FG label={kimlikTip==='personel'?'Personel':'Araç'}><select style={S.sel} disabled={paylasiliyor} value={kimlikId??''} onChange={e=>setKimlikId(idVal(e.target.value))}><option value="">— Seçiniz —</option>{kimlikSecenekleri.map(x=><option key={x.id} value={x.id}>{x.ad}</option>)}</select></FG></div>
        {!paylasiliyor?<button style={S.btn(C.green)} onClick={baslat}>📍 Paylaşımı Başlat</button>:<button style={S.btnR} onClick={durdur}>⏹ Durdur</button>}
      </div>
      {paylasiliyor&&<div style={{marginTop:10,fontSize:12,color:C.green}}>🟢 Konumunuz paylaşılıyor…{pilSeviyesi!=null?` · 🔋 %${pilSeviyesi}`:''}</div>}
      {hataMsg&&<div style={{marginTop:10,fontSize:12,color:C.red}}>{hataMsg}</div>}
    </div>
    {bekleyenBildirimler.length>0&&<div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>🔔 Bildirim Kutusu ({bekleyenBildirimler.length})</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Bu giriş/çıkış olayları "Bildir" işaretli yerlerde gerçekleşti. WhatsApp otomatik gönderilemediği için (tarayıcı kısıtı), tek tıkla siz gönderebilirsiniz.</div>
      {bekleyenBildirimler.slice(0,8).map(o=>(<div key={o.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}22`}}>
        <div style={{fontSize:13,color:C.text}}>{o.olay==='giris'?'📥':'📤'} <strong style={{color:C.white}}>{olayAdi(o)}</strong> — {yerAdi(o)} <span style={{color:C.muted,fontSize:11}}>({new Date(o.zaman).toLocaleTimeString('tr-TR')})</span></div>
        <button style={S.btnO} onClick={()=>bildirimGonder(o)}>📲 Gönder</button>
      </div>))}
    </div>}
    <div style={{...S.card,padding:0,overflow:'hidden',marginTop:16}}>
      <div ref={mapRef} style={{width:'100%',height:440}}/>
    </div>
    <div style={{...S.card,marginTop:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={S.secTitle}>🗺️ Yerler (Şantiye, Depo, Ofis vb.)</div>
        <button style={S.btnO} onClick={()=>{setYerForm({bildir:false});setYerModal(true);}}>＋ Yer Ekle</button>
      </div>
      {yerler.length===0?<div style={{color:C.muted,fontSize:13,marginTop:10}}>Henüz tanımlı yer yok. Bir yer eklerseniz, personel/araçlar oraya girdiğinde/çıktığında otomatik kaydedilir.</div>:(
        <table style={S.tbl}><thead><tr><th style={S.th}>Yer</th><th style={S.th}>Yarıçap</th><th style={S.th}>Bildirim</th><th style={S.th}></th></tr></thead>
        <tbody>{yerler.map(y=>(<tr key={y.id}>
          <td style={S.td}><strong style={{color:C.white}}>{y.ad}</strong></td>
          <td style={S.td}>{y.yaricapM||300} m</td>
          <td style={S.td}>{y.bildir?<span style={S.badge(C.green)}>Açık</span>:<span style={S.badge(C.muted)}>Kapalı</span>}</td>
          <td style={S.td}><div style={{display:'flex',gap:5}}><button style={S.btnO} onClick={()=>{setYerForm(y);setYerModal(true);}}>✏️</button><button style={S.btnR} onClick={()=>yerSil(y.id)}>🗑</button></div></td>
        </tr>))}</tbody></table>
      )}
    </div>
    <div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>📋 Son Bilinen Konumlar</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Tip</th><th style={S.th}>Ad</th><th style={S.th}>Son Güncelleme</th><th style={S.th}>Hız</th><th style={S.th}>Pil</th><th style={S.th}></th></tr></thead>
      <tbody>{zenginKonumlar.map(k=>{const asiriHiz=k.hiz&&k.hiz*3.6>hizLimiti;return(<tr key={k.id}>
        <td style={S.td}>{k.tip==='personel'?'👤 Personel':'🚜 Araç'}</td>
        <td style={S.td}><strong style={{color:C.white}}>{k.ad}</strong></td>
        <td style={S.td}><span style={{color:k.dk<5?C.green:k.dk<30?C.yellow:C.muted}}>{k.dk<1?'az önce':`${k.dk} dk önce`}</span></td>
        <td style={S.td}>{k.hiz?<span style={{color:asiriHiz?C.red:C.text,fontWeight:asiriHiz?700:400}}>{Math.round(k.hiz*3.6)} km/s{asiriHiz?' ⚠️':''}</span>:'—'}</td>
        <td style={S.td}>{k.pil!=null?`🔋 %${k.pil}`:'—'}</td>
        <td style={S.td}><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <button style={S.btnO} onClick={()=>{const map=mapInstRef.current;if(map)map.setView([k.lat,k.lng],15);}}>🎯 Göster</button>
          {k.tip==='personel'&&<button style={izGosterId===k.id?S.btn(C.blue):S.btnO} onClick={()=>setIzGosterId(izGosterId===k.id?null:k.id)}>🧭 {izGosterId===k.id?'İzi Gizle':'İz (24s)'}</button>}
        </div></td>
      </tr>);})}{zenginKonumlar.length===0&&<tr><td style={S.td} colSpan={6}><div style={{textAlign:'center',color:C.muted,padding:20}}>Henüz konum paylaşan personel/araç yok.</div></td></tr>}</tbody></table>
    </div>
    {sonOlaylar.length>0&&<div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>🕒 Son Giriş/Çıkış Kayıtları</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Kim</th><th style={S.th}>Yer</th><th style={S.th}>Olay</th><th style={S.th}>Zaman</th></tr></thead>
      <tbody>{sonOlaylar.map(o=>(<tr key={o.id}><td style={S.td}>{olayAdi(o)}</td><td style={S.td}>{yerAdi(o)}</td><td style={S.td}>{o.olay==='giris'?<span style={S.badge(C.green)}>📥 Giriş</span>:<span style={S.badge(C.muted)}>📤 Çıkış</span>}</td><td style={S.td}>{new Date(o.zaman).toLocaleString('tr-TR')}</td></tr>))}</tbody></table>

      <div style={S.g2}>
        <FG label="Enlem (lat)"><input type="number" step="0.000001" style={S.inp} value={yerForm.lat??''} onChange={e=>setYerForm(f=>({...f,lat:+e.target.value}))}/></FG>
        <FG label="Boylam (lng)"><input type="number" step="0.000001" style={S.inp} value={yerForm.lng??''} onChange={e=>setYerForm(f=>({...f,lng:+e.target.value}))}/></FG>

    </Modal>)}
  </div>);
}

// ── Sürücü Değerlendirme & İzleme ────────────────────────────────────────────────
function SurucuDegerlendirme(){
  const personel=LS.get('personel').filter(p=>p.durum==='aktif');
  const [secili,setSecili]=useState(null);
  const [aiRapor,setAiRapor]=useState(''),[aiYukleniyor,setAiYukleniyor]=useState(false),[aiHata,setAiHata]=useState('');
  const [gunSayisi]=useState(30);
  const hizLimiti=getSettings().hizLimitiKmh||90;
  const bagli=!!getSyncCfg().token;

  const siralanmis=useMemo(()=>personel.map(p=>({p,...surucuSkoruHesapla(p.id)})).sort((a,b)=>b.skor-a.skor),[personel.length]);
  const seciliVeri=secili?siralanmis.find(s=>s.p.id===secili):null;
  const gecmisNoktalar=useMemo(()=>{
    if(!secili)return[];
    const esik=Date.now()-gunSayisi*86400000;
    return(LS.get('konumGecmisi')||[]).filter(k=>k.tip==='personel'&&k.hedefId===secili&&new Date(k.zaman).getTime()>=esik).sort((a,b)=>a.zaman.localeCompare(b.zaman));
  },[secili]);
  // Günlük maksimum hız grafiği için noktaları güne göre grupla.
  const gunlukMaksHiz=useMemo(()=>{
    const map={};
    gecmisNoktalar.forEach(n=>{if(n.hiz==null)return;const gun=n.zaman.slice(0,10);const kmh=n.hiz*3.6;if(!map[gun]||kmh>map[gun])map[gun]=kmh;});
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([gun,hiz])=>({gun:gun.slice(5),hiz:Math.round(hiz)}));
  },[gecmisNoktalar]);

  const renkSkor=(s)=>s>=80?C.green:s>=60?C.yellow:C.red;
  const hasRC=!!RC.LineChart;

  const aiDegerlendirmeIste=async()=>{
    if(!seciliVeri)return;
    if(!bagli){setAiHata('AI değerlendirmesi için önce Ayarlar > Senkronizasyon üzerinden sunucuya bağlanmalısınız (AI isteği sunucu üzerinden güvenli şekilde işlenir).');return;}
    setAiYukleniyor(true);setAiHata('');setAiRapor('');
    const cfg=getSyncCfg();
    const {p,skor,metrik,olaySayisi,tamamlamaOrani,sonPuan,isEmriSayisi}=seciliVeri;
    const prompt=`Sen bir filo yönetimi uzmanısın. Aşağıdaki verilere dayanarak "${p.ad}" adlı sürücü/operatör için 3-4 cümlelik, yapıcı ve somut önerili bir Türkçe değerlendirme paragrafı yaz. Sayısal verileri tekrar tekrar sıralama, yorumla.

Veriler (son ${gunSayisi} gün):
- Sürücü Skoru: ${skor}/100
- Kat edilen mesafe: ${metrik.mesafeKm.toFixed(0)} km (${metrik.noktaSayisi} GPS noktası)
- Ortalama hız: ${metrik.ortalamaHiz.toFixed(0)} km/s, Maksimum hız: ${metrik.maksHiz.toFixed(0)} km/s
- Hız limiti (${metrik.hizLimiti} km/s) ihlali: ${metrik.ihlaller} kez
- İş güvenliği olayı: ${olaySayisi} kez
- İş emri tamamlama oranı: ${tamamlamaOrani!=null?Math.round(tamamlamaOrani*100)+'%':'veri yok'} (${isEmriSayisi} iş emri)
- Son performans değerlendirme puanı: ${sonPuan!=null?sonPuan.toFixed(1)+'/5':'değerlendirme yok'}

Sadece değerlendirme paragrafını yaz, başlık veya madde işareti kullanma.`;
    try{
      const res=await fetch(`${cfg.url}/api/ai/chat`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.token}`},body:JSON.stringify({prompt,maxTokens:400})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok)throw new Error(data.error||'Yanıt alınamadı.');
      setAiRapor(data.text||'Yanıt boş döndü.');
    }catch(e){
      setAiHata(e.message||'AI değerlendirmesi alınamadı.');
    }finally{
      setAiYukleniyor(false);
    }
  };

  return(<div>
    <InfoBox color={C.blue}>ℹ️ Bu modül, personelin Canlı Konum özelliğiyle paylaştığı GPS verilerine (hız, konum geçmişi), iş emri tamamlama oranına, iş güvenliği kayıtlarına ve performans değerlendirmelerine dayanır. Bir personelin verisi görünmesi için Canlı Konum'dan en az birkaç kez konum paylaşmış olması gerekir. Hız limiti Ayarlar'dan değiştirilebilir (şu an: {hizLimiti} km/s).</InfoBox>
    <div style={S.g3}>
      <StatCard color={C.blue} value={siralanmis.length} label="Değerlendirilen Personel"/>
      <StatCard color={C.yellow} value={siralanmis.reduce((s,x)=>s+x.metrik.ihlaller,0)} label="Toplam Hız İhlali (30 gün)"/>
      <StatCard color={siralanmis.length?renkSkor(Math.round(siralanmis.reduce((s,x)=>s+x.skor,0)/siralanmis.length)):C.muted} value={siralanmis.length?Math.round(siralanmis.reduce((s,x)=>s+x.skor,0)/siralanmis.length):'—'} label="Ortalama Filo Skoru"/>
    </div>
    <div style={S.card}>
      <div style={S.secTitle}>🚦 Sürücü Sıralaması</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Personel</th><th style={S.th}>Skor</th><th style={S.th}>Mesafe (30g)</th><th style={S.th}>Ortalama Hız</th><th style={S.th}>Maks. Hız</th><th style={S.th}>Hız İhlali</th><th style={S.th}></th></tr></thead>
      <tbody>{siralanmis.map(s=>(<tr key={s.p.id} style={{cursor:'pointer',background:secili===s.p.id?`${C.accent}11`:'transparent'}} onClick={()=>{setSecili(s.p.id);setAiRapor('');setAiHata('');}}>
        <td style={S.td}><strong style={{color:C.white}}>{s.p.ad}</strong><div style={{fontSize:11,color:C.muted}}>{s.p.pozisyon||'—'}</div></td>
        <td style={S.td}><span style={{...S.badge(renkSkor(s.skor)),fontWeight:700}}>{s.skor}</span></td>
        <td style={S.td}>{s.metrik.mesafeKm.toFixed(0)} km</td>
        <td style={S.td}>{s.metrik.ortalamaHiz.toFixed(0)} km/s</td>
        <td style={S.td}>{s.metrik.maksHiz.toFixed(0)} km/s</td>
        <td style={S.td}>{s.metrik.ihlaller>0?<span style={{color:C.red,fontWeight:700}}>{s.metrik.ihlaller}</span>:'0'}</td>
        <td style={S.td}><button style={S.btnO} onClick={(e)=>{e.stopPropagation();setSecili(s.p.id);setAiRapor('');setAiHata('');}}>Detay →</button></td>
      </tr>))}{siralanmis.length===0&&<tr><td style={S.td} colSpan={7}><div style={{textAlign:'center',color:C.muted,padding:20}}>Aktif personel yok.</div></td></tr>}</tbody></table>
    </div>
    <div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>📈 {seciliVeri?`${seciliVeri.p.ad} — Günlük Maks. Hız`:'Detay için yukarıdan bir personel seçin'}</div>
      {!seciliVeri?<div style={{color:C.muted,fontSize:13}}>—</div>:(<>
        <div style={S.g3}>
          <StatCard color={renkSkor(seciliVeri.skor)} value={seciliVeri.skor} label="Sürücü Skoru"/>
          <StatCard color={C.blue} value={`${seciliVeri.metrik.ortalamaHiz.toFixed(0)} km/s`} label="Ortalama Hız"/>
          <StatCard color={seciliVeri.metrik.ihlaller>0?C.red:C.green} value={seciliVeri.metrik.ihlaller} label="Hız İhlali"/>
        </div>
        {!hasRC?<div style={{color:C.muted,fontSize:13}}>Grafik kütüphanesi yüklenemedi.</div>:gunlukMaksHiz.length===0?<div style={{color:C.muted,fontSize:13,marginTop:10}}>Henüz konum geçmişi verisi yok.</div>:(
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={gunlukMaksHiz}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="gun" tick={{fill:C.muted,fontSize:10}}/><YAxis tick={{fill:C.muted,fontSize:10}}/><Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}} formatter={v=>`${v} km/s`}/><Line type="monotone" dataKey="hiz" stroke={C.accent} strokeWidth={2} dot={{r:3}}/></LineChart>
          </ResponsiveContainer>
        )}
        <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          <button style={S.btn()} onClick={aiDegerlendirmeIste} disabled={aiYukleniyor}>{aiYukleniyor?'⏳ Analiz ediliyor...':'🤖 AI Değerlendirme Raporu Oluştur'}</button>
          {aiHata&&<div style={{...S.alert(C.red),marginTop:10}}>⚠️ {aiHata}</div>}
          {aiRapor&&<div style={{...S.alert(C.blue),marginTop:10,lineHeight:1.6}}>{aiRapor}</div>}
        </div>
      </>)}
    </div>
  </div>);
}

// ── Pages Config ──────────────────────────────────────────────────────────────
const PAGES=[
  {group:'',items:[
    {id:'dashboard',label:'Dashboard',icon:'📊',comp:Dashboard},
    {id:'isemri',label:'İş Emirleri',icon:'📌',comp:IsEmirleri},
    {id:'arac',label:'Araç Yönetimi',icon:'🚜',comp:AracYonetimi},
    {id:'konum',label:'Konum & Sürücü Takip',icon:'📍',comp:KonumTakip},
    {id:'muhasebe',label:'Muhasebe',icon:'💰',comp:Muhasebe},
    {id:'ik',label:'İnsan Kaynakları',icon:'🧑‍💼',comp:InsanKaynaklari},
    {id:'gorevler',label:'Görevler',icon:'✅',comp:Gorevler},
    {id:'proje',label:'Proje Maliyet',icon:'🏗️',comp:ProjeYonetimi},
    {id:'depo',label:'Depo & Envanter',icon:'📦',comp:DepoEnvanter},
    {id:'bekciler',label:'Bekçiler',icon:'🐕‍🦺',comp:BekciKopekleri},
    {id:'akaryakit',label:'Akaryakıt İstasyonu',icon:'⛽🏭',comp:AkaryakitIstasyonu},
    {id:'bildirim',label:'Bildirim Merkezi',icon:'🔔',comp:BildirimMerkezi},
    {id:'ai',label:'Yapay Zeka',icon:'🤖',comp:YapayZeka},
    {id:'ayarlar',label:'Ayarlar',icon:'⚙️',comp:Ayarlar},
  ]},
];
const ALL_PAGES=PAGES.flatMap(g=>g.items);
// Kaldırılan bağımsız sayfa id'leri artık 'arac' modülünün alt sekmeleri: eski linkler/roller için köprü.
const ESKI_SAYFA_YONLENDIRME={bakim:'arac',yakit:'arac',evrak:'arac',hasar:'arac',parca:'arac',saha:'arac',operator:'ik'};

// ── Rol Tabanlı Yetkilendirme (RBAC) ──────────────────────────────────────────
// sayfalar: '*' → tüm sayfalara erişim; aksi halde erişilebilir sayfa id'lerinin listesi.
const ROL_TANIMLARI = {
  admin:    {renkKey:'red',    label:'Admin',     aciklama:'Tüm modüllere tam erişim.',                                  sayfalar:'*'},
  muhasebe: {renkKey:'purple', label:'Muhasebe',  aciklama:'Gelir-gider, fatura, kasa-banka ve ilgili raporlar.',        sayfalar:['dashboard','muhasebe','arac','proje','depo','bekciler','ayarlar']},
  sef:      {renkKey:'blue',   label:'Şef',       aciklama:'Araç, bakım, iş emirleri, personel ve saha yönetimi.',       sayfalar:['dashboard','arac','konum','isemri','gorevler','ik','depo','bekciler']},
  operator: {renkKey:'green',  label:'Operatör',  aciklama:'Sadece saha girişleri ve temel görünüm.',                    sayfalar:['dashboard','arac','konum','akaryakit','gorevler']},
};
const rolRenk=(rol)=>C[ROL_TANIMLARI[rol]?.renkKey]||C.muted;
const rolSayfalari=(rol)=>{const r=ROL_TANIMLARI[rol];if(!r)return null;return r.sayfalar==='*'?null:new Set(r.sayfalar);};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  useEffect(()=>{seed();migratePersonelModulu();migrateCariBirlestir();ensureSettings();migrateSahaServisTipleriEkle();},[]);
  const [active,setActive]=useState(()=>{const h=window.location.hash.replace('#','');if(ESKI_SAYFA_YONLENDIRME[h])return ESKI_SAYFA_YONLENDIRME[h];if(ALL_PAGES.some(p=>p.id===h))return h;return getSettings().baslangicSayfasi||'dashboard';});
  const [menuOpen,setMenuOpen]=useState(false);
  const [,forceThemeRender]=useState(0);
  const [settingsVersion,setSettingsVersion]=useState(0);
  const [dataVersion,setDataVersion]=useState(0);
  useEffect(()=>fpSyncSubscribe(st=>setDataVersion(st.dataVersion||0)),[]);
  const [locked,setLocked]=useState(()=>{
    const st=getSettings();
    return !!(st.girisKorumaAktif&&st.girisSifreHash)&&sessionStorage.getItem('fp_unlocked')!=='1';
  });

  useEffect(()=>{
    const applyTheme=()=>{
      const st=getSettings();
      applyThemeToC(st.tema,st.vurguRenk);
      forceThemeRender(x=>x+1);
      setSettingsVersion(x=>x+1);
    };
    applyTheme();
    window.addEventListener('fp-settings-changed',applyTheme);
    return ()=>window.removeEventListener('fp-settings-changed',applyTheme);
  },[]);
  const sidebarKompakt=getSettings().sidebarKompakt;

  // Hareketsizlikte otomatik kilitleme
  useEffect(()=>{
    if(locked)return;
    const check=()=>{
      const st=getSettings();
      if(!st.girisKorumaAktif||!st.girisSifreHash||!st.otoKilitDakika)return null;
      let timer;
      const kilitle=()=>{sessionStorage.removeItem('fp_unlocked');setLocked(true);};
      const reset=()=>{clearTimeout(timer);timer=setTimeout(kilitle,st.otoKilitDakika*60000);};
      const evs=['mousemove','keydown','click','touchstart','scroll'];
      evs.forEach(ev=>window.addEventListener(ev,reset));
      reset();
      return ()=>{clearTimeout(timer);evs.forEach(ev=>window.removeEventListener(ev,reset));};
    };
    let cleanup=check();
    const onSettings=()=>{if(cleanup)cleanup();cleanup=check();};
    window.addEventListener('fp-settings-changed',onSettings);
    return ()=>{if(cleanup)cleanup();window.removeEventListener('fp-settings-changed',onSettings);};
  },[locked]);

  useEffect(()=>{window.location.hash=active;},[active]);

  useEffect(()=>{
    const onNav=(e)=>{if(e.detail&&ALL_PAGES.some(p=>p.id===e.detail))setActive(e.detail);};
    window.addEventListener('fp-navigate',onNav);
    return ()=>window.removeEventListener('fp-navigate',onNav);
  },[]);

  useEffect(()=>{
    const sb=document.getElementById('fp-sidebar'),ov=document.getElementById('fp-overlay');
    if(sb)sb.classList.toggle('open',menuOpen);
    if(ov)ov.classList.toggle('show',menuOpen);
  },[menuOpen]);

  useEffect(()=>{
    const onForceLock=()=>{sessionStorage.removeItem('fp_unlocked');setLocked(true);setMenuOpen(false);};
    window.addEventListener('fp-force-lock',onForceLock);
    return ()=>window.removeEventListener('fp-force-lock',onForceLock);
  },[]);

  const navigate=(id)=>{setActive(id);setMenuOpen(false);};
  const aktifKullanici=useMemo(()=>{if(locked)return null;const st=getSettings();return LS.get('kullanicilar').find(k=>k.id===st.aktifKullaniciId);},[locked,active,settingsVersion]);
  const erisimSayfalari=useMemo(()=>aktifKullanici?rolSayfalari(aktifKullanici.rol):null,[aktifKullanici]);
  const gorunurPages=useMemo(()=>PAGES.map(g=>({...g,items:g.items.filter(it=>(!erisimSayfalari||erisimSayfalari.has(it.id))&&moduleAktifMi(it.id))})).filter(g=>g.items.length>0),[erisimSayfalari,settingsVersion]);
  const etkinId=((erisimSayfalari&&!erisimSayfalari.has(active))||!moduleAktifMi(active))?'dashboard':active;
  useEffect(()=>{if(etkinId!==active)setActive(etkinId);},[etkinId]);
  const current=ALL_PAGES.find(p=>p.id===etkinId)||ALL_PAGES[0];
  const CurrentComp=current.comp;
  const kilitle=()=>{
    const st=getSettings();
    if(!st.girisKorumaAktif||!st.girisSifreHash){fpToast('Kilitlemeden önce Ayarlar → Güvenlik sekmesinden bir şifre belirlemelisiniz.');return;}
    sessionStorage.removeItem('fp_unlocked');
    setLocked(true);
    setMenuOpen(false);
  };

  if(locked)return<LockScreen onUnlock={()=>setLocked(false)}/>;

  return(
    <div style={S.app}>
      <div id="fp-overlay" onClick={()=>setMenuOpen(false)}/>
      <aside id="fp-sidebar" style={{...S.sidebar,width:sidebarKompakt?70:240}}>
        <div style={S.logo}>
          <div style={S.logoText}>{sidebarKompakt?'🚜':'🚜 FiloPro'}</div>
          {!sidebarKompakt&&<div style={S.logoSub}>İş Makinesi Yönetim Sistemi</div>}
        </div>
        <nav style={{flex:1,paddingBottom:16}}>
          {gorunurPages.map(group=>(<div key={group.group}>
            {!sidebarKompakt&&group.group&&<div style={S.navGroup}>{group.group}</div>}
            {group.items.map(item=>(<div key={item.id} style={S.navItem(active===item.id)} onClick={()=>navigate(item.id)} title={item.label}><span>{item.icon}</span>{!sidebarKompakt&&<span>{item.label}</span>}</div>))}
          </div>))}
        </nav>
        <div style={{padding:sidebarKompakt?'10px 8px':'12px 16px',borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          {aktifKullanici&&!sidebarKompakt&&(<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <div style={{width:26,height:26,borderRadius:20,background:hexA(C.accent,.18),color:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{(aktifKullanici.ad||'?').slice(0,1).toUpperCase()}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{aktifKullanici.ad}</div>
              <div style={{fontSize:10,color:rolRenk(aktifKullanici.rol)}}>{ROL_TANIMLARI[aktifKullanici.rol]?.label||aktifKullanici.rol}</div>
            </div>
          </div>)}
          <button style={{...S.btnO,width:'100%',fontSize:11,padding:'6px 8px'}} onClick={kilitle} title="Uygulamayı Kilitle">🔒{!sidebarKompakt&&' Kilitle'}</button>
          {!sidebarKompakt&&<div style={{fontSize:10,color:C.muted,marginTop:10}}>v4.3.0 — Güvenlik & RBAC</div>}
        </div>
      </aside>
      <main style={S.main}>
        <header style={S.header}>
          <button id="fp-menu-btn" onClick={()=>setMenuOpen(true)}>☰</button>
          <div style={S.headerTitle}><span>{current.icon}</span><span className="fp-headertitle-text">{current.label}</span></div>
          <GlobalSearch onNavigate={navigate}/>
          <SyncBadge/>
          <NotificationBell/>
          <div style={{width:1,height:26,background:C.border,margin:'0 2px'}}/>
          <LiveClock/>
        </header>
        <div style={S.content}>
          <div key={`${active}-${dataVersion}`} className="fp-fade">
            <CurrentComp/>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <ErrorBoundary><App/></ErrorBoundary>
    <ToastHost/>
    <ConfirmHost/>
  </>
);

</script>
<script>
// Offline destek için service worker kaydı. sw.js dosyası index.html ile aynı
// klasörde barındırılmalıdır (file:// üzerinden açılan kopyalarda devre dışı kalır).
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(err){
      console.warn('Service worker kaydı başarısız (sw.js aynı klasörde olmalı):',err);
    });
  });
}
</script>
</body>
</html>
