<title>🚜 FiloPro — İş Makinesi Yönetim Sistemi</title>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{--accent:#f59e0b;--accent-soft:rgba(245,158,11,.16);}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg,#0f1117);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;transition:background .2s ease;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3050;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#3a4270;}
#fp-menu-btn{display:none;background:none;border:1px solid #2a3050;border-radius:6px;color:#e2e8f0;cursor:pointer;padding:5px 10px;font-size:18px;line-height:1;transition:all .15s;}
#fp-menu-btn:hover{border-color:var(--accent);color:var(--accent);}
#fp-overlay{display:none;position:fixed;inset:0;background:rgba(5,6,10,.7);backdrop-filter:blur(2px);z-index:998;animation:fpFade .18s ease;}
#fp-overlay.show{display:block;}
#fp-sidebar{transition:left .22s ease;}
button{font-family:inherit;transition:filter .12s ease,transform .08s ease,opacity .12s ease,box-shadow .15s ease;}
button:hover{filter:brightness(1.14);}
button:active{transform:scale(.97);}
input,select,textarea{font-family:inherit;transition:border-color .15s ease,box-shadow .15s ease;}
input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-soft);}
table tbody tr{transition:background .12s ease;}
table tbody tr:hover{background:rgba(255,255,255,.028);}
a{color:var(--accent);}
.fp-card{transition:border-color .15s ease,transform .15s ease,box-shadow .15s ease;}
.fp-card:hover{border-color:#3a4270;box-shadow:0 6px 18px -8px rgba(0,0,0,.5);}
.fp-navitem{transition:all .15s ease;}
.fp-navitem:hover{background:rgba(255,255,255,.04)!important;color:#e2e8f0!important;}
.fp-fade{animation:fpFadeUp .25s ease;}
.fp-pulse{animation:fpPulse 2s ease-in-out infinite;}
@keyframes fpFade{from{opacity:0;}to{opacity:1;}}
@keyframes fpFadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes fpPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@media(max-width:768px){
  #fp-menu-btn{display:block;}
  #fp-sidebar{position:fixed!important;left:-260px!important;top:0!important;width:240px!important;height:100vh!important;z-index:999!important;overflow-y:auto!important;}
  #fp-sidebar.open{left:0!important;box-shadow:8px 0 30px rgba(0,0,0,.5);}
  .fp-liveclock{display:none;}
}
@media(max-width:560px){
  .fp-headertitle-text{display:none;}
}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const RC = window.Recharts || {};
const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = RC;

// ── Colors ─────────────────────────────────────────────────────────────────
const BASE_SEMANTIC = {accent:'#f59e0b', blue:'#3b82f6', green:'#22c55e', red:'#ef4444', yellow:'#eab308', purple:'#a855f7', orange:'#f97316', teal:'#14b8a6', pink:'#ec4899'};
const THEMES = {
  dark:    {label:'Koyu',            icon:'🌙', bg:'#0f1117', surface:'#181c27', card:'#1e2333', border:'#2a3050', input:'#0f1117', text:'#e2e8f0', muted:'#64748b', white:'#ffffff'},
  light:   {label:'Açık',            icon:'☀️', bg:'#eef1f6', surface:'#ffffff', card:'#ffffff', border:'#dde3ec', input:'#f4f6fa', text:'#1e293b', muted:'#5b6473', white:'#0b1220',
            accent:'#d97706', blue:'#2563eb', green:'#16a34a', red:'#dc2626', yellow:'#b45309', purple:'#9333ea', orange:'#c2410c', teal:'#0d9488', pink:'#db2777'},
  midnight:{label:'Lacivert',        icon:'🌌', bg:'#070b1a', surface:'#0d1330', card:'#111a3d', border:'#242f5f', input:'#070b1a', text:'#dbe4ff', muted:'#7784b8', white:'#ffffff'},
  contrast:{label:'Yüksek Kontrast', icon:'🔆', bg:'#000000', surface:'#0a0a0a', card:'#141414', border:'#f59e0b', input:'#000000', text:'#ffffff', muted:'#d4d4d8', white:'#ffffff'},
};
const C = {...BASE_SEMANTIC, ...THEMES.dark};
const hexA=(hex,a)=>{const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;};
// Tema veya vurgu rengi değiştiğinde çağrılır: C nesnesini günceller ve stilleri yeniden üretir
const applyThemeToC=(temaAdi,vurguRengi)=>{
  const theme=THEMES[temaAdi]||THEMES.dark;
  Object.assign(C, BASE_SEMANTIC, theme);
  C.accent=ACCENT_MAP[vurguRengi]||theme.accent||BASE_SEMANTIC.accent;
  buildStyles();

  document.documentElement.style.setProperty('--accent-soft',hexA(C.accent,.16));

};

// ── Styles ──────────────────────────────────────────────────────────────────
let S;
function buildStyles(){
S = {

  logo:{padding:'20px 16px 14px',borderBottom:`1px solid ${C.border}`,flexShrink:0},
  logoText:{fontSize:16,fontWeight:800,color:C.white,letterSpacing:'-0.3px',display:'flex',alignItems:'center',gap:6},

  content:{padding:'clamp(12px,3vw,24px)',flex:1},
  card:{background:`linear-gradient(160deg,${C.card},${C.surface})`,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:16,overflowX:'auto',boxShadow:'0 2px 10px -6px rgba(0,0,0,.4)'},
  g2:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16,marginBottom:16},
  g3:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:16,marginBottom:16},

  stat:(c)=>({background:`linear-gradient(155deg,${hexA(c,.10)},${C.card})`,border:`1px solid ${C.border}`,borderRadius:12,padding:18,borderTop:`3px solid ${c}`,boxShadow:`0 4px 16px -10px ${hexA(c,.6)}`,position:'relative',overflow:'hidden'}),

  btn:(c=C.accent)=>({background:c===C.accent?`linear-gradient(135deg,${c},${C.orange})`:c,color:c===C.accent?'#000':C.white,border:'none',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',boxShadow:c===C.accent?`0 3px 12px -4px ${hexA(c,.6)}`:'none'}),
  btnO:{background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 13px',fontSize:12,cursor:'pointer'},
  btnR:{background:'transparent',color:C.red,border:`1px solid ${C.red}44`,borderRadius:8,padding:'7px 13px',fontSize:12,cursor:'pointer'},

  lbl:{fontSize:12,color:C.muted,marginBottom:5,display:'block'},
  fg:{marginBottom:14},
  modal:{position:'fixed',inset:0,background:'rgba(0,0,0,.78)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:8},
  mbox:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'24px 20px',width:'min(560px,97vw)',maxHeight:'90vh',overflowY:'auto'},
  tbl:{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:500},
  th:{textAlign:'left',padding:'9px 12px',borderBottom:`1px solid ${C.border}`,color:C.muted,fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.4px'},
  td:{padding:'9px 12px',borderBottom:`1px solid ${C.border}22`,color:C.text,verticalAlign:'middle'},
  alert:(c)=>({background:`${c}15`,border:`1px solid ${c}40`,borderRadius:8,padding:'9px 13px',marginBottom:10,fontSize:13,color:c,display:'flex',alignItems:'center',gap:8}),
  ta:{background:C.input,border:`1px solid ${C.border}`,borderRadius:7,padding:'8px 12px',fontSize:13,color:C.text,width:'100%',boxSizing:'border-box',outline:'none',resize:'vertical',minHeight:70},
};
}
buildStyles();

// ── Storage ─────────────────────────────────────────────────────────────────
const LS = {
  get:(k,fb=[])=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  getObj:(k,fb={})=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
};
const uid=()=>`${Date.now()}-${Math.random().toString(36).slice(2,7)}`;

// ── Settings ─────────────────────────────────────────────────────────────────
const DEFAULT_SETTINGS={
  firmaAdi:'FiloPro A.Ş.', firmaAdres:'Akhisar, Manisa', firmaTel:'0532 000 0000', firmaVergiNo:'', firmaVergiDaire:'',
  paraBirimi:'₺', tarihFormati:'gg.aa.yyyy', kdvOrani:20, varsayilanYakitFiyat:44,
  esikKritikGun:7, esikUyariGun:30, opBelgeEsikGun:60,
  bildirimEmail:true, bildirimSms:true, bildirimSistem:true,
  vardiyaBaslangic:'07:30', vardiyaBitis:'17:30',
  vurguRenk:'amber', tema:'dark', yogunluk:'normal', sidebarKompakt:false,
  aktifKullaniciId:1,
  girisKorumaAktif:false, girisSifreHash:'', girisSifreSalt:'', otoKilitDakika:0,
};
const ACCENT_MAP={amber:'#f59e0b',blue:'#3b82f6',green:'#22c55e',purple:'#a855f7',red:'#ef4444',teal:'#14b8a6'};
const ALL_DATA_KEYS=['araclar','personel','departmanlar','izinler','mesailer','bakimlar','yakitlar','hasarlar','parcalar','isemirleri','gorevler','projeler','hesaplar','gelirGider','faturalar','kasaHareketleri','musteriler','tedarikciler','pompalar','yakitLimitler','otomatikIkmaller','sahaCalisma','sahaAriza','bildirimTercih','kullanicilar','islemLoglari','erpBaglantilar','erpAktarimlar','ayarlar'];
const getSettings=()=>({...DEFAULT_SETTINGS,...LS.getObj('ayarlar',{})});
const saveSettings=(s)=>{LS.set('ayarlar',s);window.dispatchEvent(new Event('fp-settings-changed'));};
const ensureSettings=()=>{if(!localStorage.getItem('ayarlar'))LS.set('ayarlar',DEFAULT_SETTINGS);};

// ── Güvenlik: Şifre Hashleme (yerel erişim kilidi — veriler şifrelenmez) ──────
const simpleHash=(str)=>{let h=5381;for(let i=0;i<str.length;i++){h=((h*33)^str.charCodeAt(i))>>>0;}return h.toString(16).padStart(8,'0');};
async function hashPassword(pw,salt){
  const text=`${salt||''}::${pw||''}`;
  if(window.crypto?.subtle){
    try{
      const buf=await window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){/* aşağıdaki yedek yönteme düş */}
  }
  return simpleHash(text)+simpleHash(text.split('').reverse().join(''));
}
const yeniTuz=()=>uid();

// ── Formatters ───────────────────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>new Date().toISOString().slice(0,7);
const daysLeft=d=>d?Math.ceil((new Date(d)-new Date())/86400000):9999;
const fmtDate=d=>{if(!d)return'—';const dt=new Date(d);if(isNaN(dt))return'—';const fmt=getSettings().tarihFormati;if(fmt==='yyyy-aa-gg')return dt.toISOString().slice(0,10);return dt.toLocaleDateString('tr-TR');};
const fmtMonth=(ym)=>{if(!ym)return'—';const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});};
const fmtTL=n=>{const sim=getSettings().paraBirimi||'₺';return (+n||0).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0})+' '+sim;};
const fmtNum=(n,s='')=>(+n||0).toLocaleString('tr-TR')+(s?' '+s:'');
const pct=(a,b)=>b>0?Math.round((a/b)*100):0;
const months=()=>{const arr=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);arr.push(d.toISOString().slice(0,7));}return arr;};
const esikKritik=()=>getSettings().esikKritikGun??7;
const esikUyari=()=>getSettings().esikUyariGun??30;

// ── Cari Hesap / Fatura Yardımcıları ──────────────────────────────────────────
const musteriAd=(id)=>LS.get('musteriler').find(m=>m.id===id)?.ad||'—';
const tedarikciAd=(id)=>LS.get('tedarikciler').find(t=>t.id===id)?.ad||'—';
const hesapAd=(id)=>LS.get('hesaplar').find(h=>h.id===id)?.ad||'—';
const cariAd=(f)=>f.tur==='kesilen'?musteriAd(f.musteriId):tedarikciAd(f.tedarikciId);
const faturaOdenen=(faturaId,hareketler)=>(hareketler||LS.get('kasaHareketleri')).filter(h=>h.faturaId===faturaId).reduce((s,h)=>s+(+h.tutar||0),0);
const faturaKalan=(f,hareketler)=>(+f.toplam||0)-faturaOdenen(f.id,hareketler);
const faturaDurum=(f,hareketler)=>{const kalan=faturaKalan(f,hareketler);if(kalan<=0)return'odendi';const odenen=faturaOdenen(f.id,hareketler);if(odenen>0)return'kismiOdendi';if(daysLeft(f.vadeTarih)<0)return'vadesiGecti';return'bekliyor';};
const musteriBakiye=(musteriId,faturalar,hareketler)=>{const fl=(faturalar||LS.get('faturalar')).filter(f=>f.tur==='kesilen'&&f.musteriId===musteriId);const toplamFatura=fl.reduce((s,f)=>s+(+f.toplam||0),0);const hl=(hareketler||LS.get('kasaHareketleri')).filter(h=>h.kategori==='tahsilat'&&h.musteriId===musteriId);const toplamTahsilat=hl.reduce((s,h)=>s+(+h.tutar||0),0);return{toplamFatura,toplamTahsilat,bakiye:toplamFatura-toplamTahsilat};};
const tedarikciBakiye=(tedarikciId,faturalar,hareketler)=>{const fl=(faturalar||LS.get('faturalar')).filter(f=>f.tur==='alinan'&&f.tedarikciId===tedarikciId);const toplamFatura=fl.reduce((s,f)=>s+(+f.toplam||0),0);const hl=(hareketler||LS.get('kasaHareketleri')).filter(h=>h.kategori==='odeme'&&h.tedarikciId===tedarikciId);const toplamOdeme=hl.reduce((s,h)=>s+(+h.tutar||0),0);return{toplamFatura,toplamOdeme,bakiye:toplamFatura-toplamOdeme};};
const yeniHareketNo=(hareketler,pre)=>`${pre}-${String(hareketler.filter(h=>h.belgeNo?.startsWith(pre)).length+1).padStart(3,'0')}`;

// ── Dışa Aktarma (CSV / Excel) ve Yazdırma ────────────────────────────────────
const downloadBlob=(content,filename,mime)=>{
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
const csvEscape=(v)=>{const s=String(v??'');return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
const exportCSV=(headers,rows,filename)=>{
  const lines=[headers.map(csvEscape).join(';'),...rows.map(r=>r.map(csvEscape).join(';'))];
  downloadBlob('\ufeff'+lines.join('\r\n'),filename,'text/csv;charset=utf-8;');
};
const exportXLSX=(headers,rows,filename,sheetName='Sayfa1')=>{
  if(!window.XLSX){alert('Excel kütüphanesi yüklenemedi. Lütfen CSV olarak dışa aktarın veya internet bağlantınızı kontrol edin.');return;}
  const ws=window.XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:16}));
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,sheetName);
  window.XLSX.writeFile(wb,filename);
};
const FATURA_DURUM_LABEL={odendi:'Ödendi',kismiOdendi:'Kısmi Ödendi',vadesiGecti:'Vadesi Geçti',bekliyor:'Bekliyor'};
const FATURA_DURUM_RENK={odendi:'#22c55e',vadesiGecti:'#ef4444',kismiOdendi:'#f97316',bekliyor:'#eab308'};
const faturaSatirlari=(zengin)=>zengin.map(f=>[f.no,cariAd(f),fmtDate(f.tarih),fmtDate(f.vadeTarih),+f.tutar||0,+f.kdv||0,+f.toplam||0,+f.kalan||0,FATURA_DURUM_LABEL[f.durum]||f.durum]);
const FATURA_BASLIKLAR=['Fatura No','Cari','Fatura Tarihi','Vade Tarihi','Tutar','KDV','Toplam','Kalan','Durum'];

// Pop-up engelleyicilerden etkilenmeyen, gizli iframe üzerinden yazdırma
const printHTMLDoc=(html)=>{
  const old=document.getElementById('fp-print-frame');
  if(old)old.remove();
  const ifr=document.createElement('iframe');
  ifr.id='fp-print-frame';
  Object.assign(ifr.style,{position:'fixed',right:'0',bottom:'0',width:'0',height:'0',border:'0',visibility:'hidden'});
  document.body.appendChild(ifr);
  const cleanup=()=>{setTimeout(()=>{if(ifr&&ifr.parentNode)ifr.parentNode.removeChild(ifr);},1000);};
  ifr.onload=()=>{
    try{ifr.contentWindow.focus();ifr.contentWindow.print();}
    catch(e){alert('Yazdırma başlatılamadı: '+(e?.message||'bilinmeyen hata'));}
    cleanup();
  };
  const doc=ifr.contentDocument||ifr.contentWindow.document;
  doc.open();doc.write(html);doc.close();
};

const buildInvoiceHTML=(f,hareketler)=>{
  const s=getSettings();
  const kalan=faturaKalan(f,hareketler);
  const durum=faturaDurum(f,hareketler);
  const durumLabel=FATURA_DURUM_LABEL[durum]||durum;
  const durumRenk=FATURA_DURUM_RENK[durum]||'#eab308';
  return `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>${f.no}</title>
<style>

  table{width:100%;border-collapse:collapse;margin-top:20px;}

  .status{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px;color:#fff;background:${durumRenk};}
</style></head><body>
<div class="head">

function recordHareket({hesapId,tur,tutar,tarih,aciklama,kategori,musteriId,tedarikciId,faturaId,yontem}){
  const hareketler=LS.get('kasaHareketleri');
  const pre=kategori==='tahsilat'?'TAH':kategori==='odeme'?'ODE':'KH';
  const yeni={id:uid(),hesapId,tur,tutar:+tutar||0,tarih:tarih||today(),aciklama,belgeNo:yeniHareketNo(hareketler,pre),kategori:kategori||'diger',musteriId:musteriId||null,tedarikciId:tedarikciId||null,faturaId:faturaId||null,yontem:yontem||'nakit'};
  const nH=[...hareketler,yeni];LS.set('kasaHareketleri',nH);
  const hesaplar=LS.get('hesaplar');
  const nA=hesaplar.map(h=>h.id===hesapId?{...h,bakiye:(+h.bakiye||0)+(tur==='giris'?(+tutar||0):-(+tutar||0))}:h);
  LS.set('hesaplar',nA);
  return{hareketler:nH,hesaplar:nA};
}

// ── Ortak Uyarı Hesaplama (Dashboard + Bildirim Zili) ─────────────────────────
function getSistemUyarilari(){
  const araclar=LS.get('araclar'),bakimlar=LS.get('bakimlar'),isemirleri=LS.get('isemirleri'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri');
  const eK=esikKritik(),eU=esikUyari();
  const list=[];
  araclar.forEach(a=>{
    const sg=daysLeft(a.sigorta),mu=daysLeft(a.muayene);
    if(a.sigorta&&sg<=eU)list.push({tip:'Sigorta',baslik:`${a.ad} — sigorta`,gun:sg,c:sg<=eK?C.red:C.yellow,icon:'🛡️'});
    if(a.muayene&&mu<=eU)list.push({tip:'Muayene',baslik:`${a.ad} — muayene`,gun:mu,c:mu<=eK?C.red:C.yellow,icon:'🔍'});
  });
  bakimlar.filter(b=>b.durum==='bekliyor').forEach(b=>{const a=araclar.find(x=>x.id===b.aracId);list.push({tip:'Bakım',baslik:`${a?.ad||'—'} — ${b.tur||'bakım'} bekliyor`,gun:daysLeft(b.tarih),c:C.yellow,icon:'🔧'});});
  isemirleri.filter(i=>i.durum!=='tamamlandi'&&i.oncelik==='acil').forEach(i=>{list.push({tip:'İş Emri',baslik:`${i.baslik} (acil)`,gun:daysLeft(i.tarih),c:C.red,icon:'📌'});});
  (faturalar||[]).forEach(f=>{if(faturaDurum(f,hareketler)==='vadesiGecti')list.push({tip:'Fatura',baslik:`${cariAd(f)} — vadesi geçti`,gun:daysLeft(f.vadeTarih),c:C.red,icon:'💸'});});
  return list.sort((a,b)=>a.gun-b.gun);
}

// Tutar + KDV Oranı (%) giriş alanı: KDV, tutar üzerinden % olarak girilir, ₺ tutar otomatik hesaplanır.
// Örn: Tutar 1000, KDV Oranı %20 girilince KDV tutarı 200₺, Toplam 1200₺ olarak hesaplanır ve form.kdv (₺) alanına yazılır.
function TutarKdvAlani({form,setForm,tutarLabel='Tutar (₺, KDV hariç)'}){
  const oran=form.kdvOran??getSettings().kdvOrani??20;
  const tutar=+form.tutar||0;
  const kdvTutari=Math.round(tutar*oran)/100;
  const toplam=tutar+kdvTutari;
  return (<>
    <div style={S.g2}>
      <FG label={tutarLabel}><input type="number" style={S.inp} value={form.tutar??''} onChange={e=>{const t=+e.target.value;setForm(f=>({...f,tutar:t,kdvOran:oran,kdv:Math.round(t*oran)/100}));}}/></FG>
      <FG label="KDV Oranı (%)"><input type="number" style={S.inp} value={form.kdvOran??oran} onChange={e=>{const o=+e.target.value;setForm(f=>({...f,kdvOran:o,kdv:Math.round(tutar*o)/100}));}}/></FG>
    </div>
    <div style={S.alert(C.accent)}>KDV Tutarı: <strong>{fmtTL(kdvTutari)}</strong> &nbsp;|&nbsp; Toplam: <strong>{fmtTL(toplam)}</strong></div>
  </>);
}

const validate=(form,kurallar)=>{

};

// ── Bordro (Maaş Bordrosu) Sekmesi ─────────────────────────────────────────────
function Bordro(){
  const [personel]=useState(LS.get('personel')),[mesailer]=useState(LS.get('mesailer')),[ay,setAy]=useState(thisMonth());
  const aktifPersonel=personel.filter(p=>p.durum!=='pasif');
  const sgkIsveren=(maas)=>Math.round((+maas||0)*0.225); // Yaklaşık SGK işveren payı (%22.5)
  const mesaiSaatiOnayli=(personelId)=>mesailer.filter(m=>m.personelId===personelId&&m.durum==='onaylandi'&&m.tarih?.startsWith(ay)).reduce((s,m)=>s+(+m.mesaiSaat||0),0);
  const satirlar=aktifPersonel.map(p=>{
    const mesaiSaat=mesaiSaatiOnayli(p.id),mesaiTutari=mesaiUcreti(p.maas,mesaiSaat);
    const brutMaas=+p.maas||0,sgk=sgkIsveren(p.maas);
    return{p,brutMaas,mesaiSaat,mesaiTutari,sgk,toplamMaliyet:brutMaas+mesaiTutari+sgk};
  });
  const toplamMaas=satirlar.reduce((s,r)=>s+r.brutMaas,0),toplamMesai=satirlar.reduce((s,r)=>s+r.mesaiTutari,0),toplamSgk=satirlar.reduce((s,r)=>s+r.sgk,0),toplamMaliyet=satirlar.reduce((s,r)=>s+r.toplamMaliyet,0);
  const disaAktarSatirlar=satirlar.map(r=>[r.p.ad,r.p.departman||'',r.p.pozisyon||'',r.brutMaas,r.mesaiSaat,r.mesaiTutari,r.sgk,r.toplamMaliyet]);
  const gonder=()=>{
    if(!window.confirm(`${fmtMonth(ay)} dönemi için toplam ${fmtTL(toplamMaas+toplamMesai)} personel gideri (maaş + fazla mesai) Muhasebe > Gelir-Gider bölümüne aktarılsın mı?`))return;
    const gelirGider=LS.get('gelirGider');
    const kayit={id:uid(),tur:'gider',kategori:'Personel',aciklama:`${fmtMonth(ay)} personel maaşları ve fazla mesai (${aktifPersonel.length} personel)`,tutar:toplamMaas+toplamMesai,kdv:0,tarih:`${ay}-28`,hesapId:null,projeId:null,belgeNo:`GID-${ay}-BORDRO`};
    LS.set('gelirGider',[...gelirGider,kayit]);
    const loglar=LS.get('islemLoglari');
    LS.set('islemLoglari',[{id:uid(),kullanici:'İnsan Kaynakları',islem:'Bordro Muhasebeye Aktarıldı',detay:`${fmtMonth(ay)} — ${fmtTL(toplamMaas+toplamMesai)}`,tarih:new Date().toLocaleString('tr-TR')},...loglar]);
    alert('✅ Bordro toplamı (maaş + fazla mesai) Muhasebe > Gelir-Gider bölümüne gider kaydı olarak aktarıldı.');
  };
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
      <FG label="Bordro Dönemi"><input type="month" style={{...S.sel,width:180}} value={ay} onChange={e=>setAy(e.target.value)}/></FG>
      <div style={{display:'flex',gap:8}}>
        <ExportMenu headers={['Ad Soyad','Departman','Pozisyon','Net Maaş','Fazla Mesai (sa)','Fazla Mesai Ücreti','SGK İşveren Payı (~)','Toplam İşveren Maliyeti']} rows={disaAktarSatirlar} filename={`filopro-bordro-${ay}`} sheetName="Bordro"/>
        <button style={S.btn(C.green)} onClick={gonder}>📤 Muhasebeye Aktar</button>
      </div>
    </div>
    <div style={S.g4}><StatCard color={C.accent} value={fmtTL(toplamMaas)} label="Toplam Net Maaş"/><StatCard color={C.purple} value={fmtTL(toplamMesai)} label="Fazla Mesai Ücreti (~)"/><StatCard color={C.blue} value={fmtTL(toplamSgk)} label="Tahmini SGK İşveren Payı"/><StatCard color={C.red} value={fmtTL(toplamMaliyet)} label="Toplam İşveren Maliyeti"/></div>
    <InfoBox color={C.yellow}>⚠️ SGK işveren payı ~%22.5, fazla mesai ücreti aylık {AYLIK_ORT_SAAT} saat üzerinden hesaplanan saatlik ücretin %50 zamlısı ile tahmini olarak hesaplanmıştır; kesin tutar için mali müşavirinize danışın.</InfoBox>

    <tbody>{satirlar.map(r=>(<tr key={r.p.id}><td style={S.td}><strong style={{color:C.white}}>{r.p.ad}</strong></td><td style={S.td}>{r.p.departman||'—'}</td><td style={S.td}>{fmtTL(r.brutMaas)}</td><td style={S.td}>{r.mesaiSaat>0?`${fmtTL(r.mesaiTutari)} (${r.mesaiSaat} sa)`:'—'}</td><td style={S.td}>{fmtTL(r.sgk)}</td><td style={S.td}><strong style={{color:C.accent}}>{fmtTL(r.toplamMaliyet)}</strong></td></tr>))}</tbody></table></div>

function EvrakTakibi(){
  const araclar=LS.get('araclar'),personel=LS.get('personel');
  const eK=esikKritik(),eU=esikUyari();
  const evraklar=[];
  araclar.forEach(a=>{evraklar.push({varlik:a.ad,tip:'Sigorta',tarih:a.sigorta,gun:daysLeft(a.sigorta)});evraklar.push({varlik:a.ad,tip:'Muayene',tarih:a.muayene,gun:daysLeft(a.muayene)});});

  evraklar.sort((a,b)=>a.gun-b.gun);
  const kritikler=evraklar.filter(e=>e.gun<=eK),yaklasanlar=evraklar.filter(e=>e.gun>eK&&e.gun<=eU);

  </div>);
}

    if(hata){setErr(hata);return;}
    setErr('');
    const toplam=(+form.tutar||0)+(+form.kdv||0);
    const n=form.id?faturalar.map(f=>f.id===form.id?{...form,toplam}:f):[...faturalar,{...form,id:uid(),toplam,no:form.no||`${form.tur==='kesilen'?'F':'AF'}-${today().slice(0,7)}-${String(faturalar.length+1).padStart(3,'0')}`}];
    LS.set('faturalar',n);setFaturalar(n);setModal(false);
  };
  const del=(id)=>{const n=faturalar.filter(f=>f.id!==id);LS.set('faturalar',n);setFaturalar(n);};
  const eK=esikKritik();
  const filtreli=faturalar.filter(f=>f.tur===tab);
  const zenginTum=filtreli.map(f=>({...f,kalan:faturaKalan(f,hareketler),durum:faturaDurum(f,hareketler)}));
  const bekleyenToplam=zenginTum.filter(f=>f.durum!=='odendi').reduce((s,f)=>s+f.kalan,0);
  const odenenToplam=zenginTum.reduce((s,f)=>s+((+f.toplam||0)-f.kalan),0);
  const toplamKdv=zenginTum.reduce((s,f)=>s+(+f.kdv||0),0);
  const vadesiYaklasan=zenginTum.filter(f=>f.durum!=='odendi'&&daysLeft(f.vadeTarih)<=eK);
  const q=arama.trim().toLocaleLowerCase('tr-TR');
  const filtreliZengin=zenginTum.filter(f=>{
    if(q&&!(`${f.no} ${cariAd(f)} ${f.aciklama||''}`.toLocaleLowerCase('tr-TR').includes(q)))return false;
    if(durumFiltre&&f.durum!==durumFiltre)return false;
    if(tarihBas&&(!f.tarih||f.tarih<tarihBas))return false;
    if(tarihBit&&(!f.tarih||f.tarih>tarihBit))return false;
    return true;
  });
  const sirali=[...filtreliZengin].sort((a,b)=>{
    let va,vb;
    if(sortKey==='cari'){va=cariAd(a);vb=cariAd(b);}
    else{va=a[sortKey];vb=b[sortKey];}
    if(typeof va==='string'||typeof vb==='string'){
      va=va||'';vb=vb||'';
      return sortDir==='asc'?String(va).localeCompare(String(vb),'tr-TR'):String(vb).localeCompare(String(va),'tr-TR');
    }
    va=+va||0;vb=+vb||0;
    return sortDir==='asc'?va-vb:vb-va;
  });
  const toplamSayfa=Math.max(1,Math.ceil(sirali.length/sayfaBoyu));
  const gecerliSayfa=Math.min(sayfa,toplamSayfa);
  const sayfalanan=sirali.slice((gecerliSayfa-1)*sayfaBoyu,gecerliSayfa*sayfaBoyu);
  useEffect(()=>{setSayfa(1);},[tab,arama,durumFiltre,tarihBas,tarihBit,sayfaBoyu]);
  const toggleSort=(k)=>{if(sortKey===k)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortKey(k);setSortDir(k==='tarih'||k==='vadeTarih'?'desc':'asc');}};
  const SortTh=({label,k})=>(<th style={{...S.th,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} onClick={()=>toggleSort(k)}>{label}{sortKey===k?(sortDir==='asc'?' ▲':' ▼'):''}</th>);
  const filtreTemizle=()=>{setArama('');setDurumFiltre('');setTarihBas('');setTarihBit('');};
  const filtreAktif=arama||durumFiltre||tarihBas||tarihBit;
  const dosyaAdi=(uzanti)=>`faturalar-${tab==='kesilen'?'kesilen':'alinan'}-${today()}.${uzanti}`;
  const csvIndir=()=>{exportCSV(FATURA_BASLIKLAR,faturaSatirlari(sirali),dosyaAdi('csv'));setExportOpen(false);};
  const xlsxIndir=()=>{exportXLSX(FATURA_BASLIKLAR,faturaSatirlari(sirali),dosyaAdi('xlsx'),tab==='kesilen'?'Kesilen Faturalar':'Alınan Faturalar');setExportOpen(false);};
  const openPay=(f)=>{setPayForm({faturaId:f.id,tutar:faturaKalan(f,hareketler),tarih:today(),hesapId:hesaplar.find(h=>h.tur==='aktif')?.id,yontem:'havale'});setPayModal(true);};
  const savePay=()=>{
    const f=faturalar.find(x=>x.id===payForm.faturaId);if(!f)return;
    const kategori=f.tur==='kesilen'?'tahsilat':'odeme';
    const tur=f.tur==='kesilen'?'giris':'cikis';
    const {hareketler:nH}=recordHareket({hesapId:+payForm.hesapId,tur,tutar:payForm.tutar,tarih:payForm.tarih,aciklama:`${f.tur==='kesilen'?'Tahsilat':'Ödeme'} — ${f.no}`,kategori,musteriId:f.tur==='kesilen'?f.musteriId:null,tedarikciId:f.tur==='alinan'?f.tedarikciId:null,faturaId:f.id,yontem:payForm.yontem});
    setHareketler(nH);setPayModal(false);
  };
  const payingFatura=payModal?faturalar.find(x=>x.id===payForm.faturaId):null;
  return(<div>
    <TabBar tabs={[['kesilen','📤 Kesilen (Satış)'],['alinan','📥 Alınan (Alış)']]} active={tab} onChange={setTab}/>
    <div style={S.g4}><StatCard color={C.yellow} value={fmtTL(bekleyenToplam)} label={tab==='kesilen'?'Tahsil Edilecek':'Ödenecek'}/><StatCard color={C.green} value={fmtTL(odenenToplam)} label={tab==='kesilen'?'Tahsil Edilen':'Ödenen'}/><StatCard color={C.purple} value={fmtTL(toplamKdv)} label="Toplam KDV"/><StatCard color={C.red} value={vadesiYaklasan.length} label="Vadesi Yaklaşan/Geçen"/></div>
    {vadesiYaklasan.length>0&&<Warn msg={`${vadesiYaklasan.length} fatura vade tarihine ${eK} günden az kaldı veya geçti!`} c={C.red}/>}

    <div style={S.card}>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end',marginBottom:14}}>
        <div style={{flex:'2 1 200px',minWidth:180}}><label style={S.lbl}>Ara (No, Cari, Açıklama)</label><input style={S.inp} placeholder="🔍 Ara..." value={arama} onChange={e=>setArama(e.target.value)}/></div>
        <div style={{flex:'1 1 150px',minWidth:150}}><label style={S.lbl}>Durum</label><select style={S.sel} value={durumFiltre} onChange={e=>setDurumFiltre(e.target.value)}><option value="">Tümü</option><option value="bekliyor">Bekliyor</option><option value="kismiOdendi">Kısmi Ödendi</option><option value="odendi">Ödendi</option><option value="vadesiGecti">Vadesi Geçti</option></select></div>
        <div style={{flex:'1 1 140px',minWidth:140}}><label style={S.lbl}>Başlangıç Tarihi</label><input type="date" style={S.inp} value={tarihBas} onChange={e=>setTarihBas(e.target.value)}/></div>
        <div style={{flex:'1 1 140px',minWidth:140}}><label style={S.lbl}>Bitiş Tarihi</label><input type="date" style={S.inp} value={tarihBit} onChange={e=>setTarihBit(e.target.value)}/></div>
        {filtreAktif&&<button style={S.btnO} onClick={filtreTemizle}>✕ Filtreleri Temizle</button>}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:12,color:C.muted}}>{sirali.length} kayıt bulundu{filtreAktif?` (${zenginTum.length} toplam içinden)`:''}</div>
        <div style={{display:'flex',gap:8,position:'relative'}}>
          <div style={{position:'relative'}}>
            <button style={S.btnO} onClick={()=>setExportOpen(o=>!o)}>⬇ Dışa Aktar {exportOpen?'▲':'▼'}</button>
            {exportOpen&&(<div style={{position:'absolute',top:'110%',right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:20,minWidth:170,boxShadow:'0 6px 18px rgba(0,0,0,.4)'}}>
              <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text}} onMouseDown={csvIndir}>📄 CSV olarak indir</div>
              <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text,borderTop:`1px solid ${C.border}`}} onMouseDown={xlsxIndir}>📊 Excel (.xlsx) olarak indir</div>
            </div>)}
          </div>
          <button style={S.btn()} onClick={()=>{setForm({tur:tab,tarih:today()});setErr('');setModal(true);}}>＋ Fatura Ekle</button>
        </div>
      </div>
    </div>

    <div style={S.card}><table style={S.tbl}><thead><tr>
      <SortTh label="No" k="no"/><SortTh label={tab==='kesilen'?'Müşteri':'Tedarikçi'} k="cari"/><SortTh label="Tarih" k="tarih"/><SortTh label="Vade" k="vadeTarih"/><SortTh label="Toplam" k="toplam"/><SortTh label="Kalan" k="kalan"/><SortTh label="Durum" k="durum"/><th style={S.th}></th>
    </tr></thead>
    <tbody>{sayfalanan.length===0&&(<tr><td style={{...S.td,textAlign:'center',color:C.muted,padding:'24px 12px'}} colSpan={8}>Kayıt bulunamadı.</td></tr>)}
    {sayfalanan.map(f=>(<tr key={f.id}>
      <td style={S.td}><code style={{fontSize:11,color:C.accent}}>{f.no}</code></td>
      <td style={S.td}><strong style={{color:C.white}}>{cariAd(f)}</strong></td>
      <td style={S.td}>{fmtDate(f.tarih)}</td>
      <td style={S.td}><span style={{color:f.durum!=='odendi'&&daysLeft(f.vadeTarih)<=eK?C.red:C.text}}>{fmtDate(f.vadeTarih)}</span></td>
      <td style={S.td}><strong style={{color:C.accent}}>{fmtTL(f.toplam)}</strong></td>
      <td style={S.td}>{f.kalan>0?<strong style={{color:C.yellow}}>{fmtTL(f.kalan)}</strong>:<span style={{color:C.muted}}>—</span>}</td>
      <td style={S.td}><Badge d={f.durum}/></td>
      <td style={S.td}><div style={{display:'flex',gap:5}}><button style={S.btnO} onClick={()=>setDetayFatura(f)}>👁️</button>{f.kalan>0&&<button style={S.btn(C.green)} onClick={()=>openPay(f)}>{f.tur==='kesilen'?'💵 Tahsil':'💸 Öde'}</button>}<button style={S.btnO} onClick={()=>printInvoice(f,hareketler)}>🖨️</button><button style={S.btnO} onClick={()=>{setForm(f);setErr('');setModal(true);}}>✏️</button><button style={S.btnR} onClick={()=>del(f.id)}>🗑</button></div></td>
    </tr>))}</tbody></table>
    {sirali.length>0&&(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:C.muted}}>Sayfa başına:
        <select style={{...S.sel,width:'auto',padding:'5px 10px'}} value={sayfaBoyu} onChange={e=>setSayfaBoyu(+e.target.value)}>
          <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option>
        </select>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button style={S.btnO} disabled={gecerliSayfa<=1} onClick={()=>setSayfa(p=>Math.max(1,p-1))}>‹ Önceki</button>
        <span style={{fontSize:12,color:C.muted}}>Sayfa {gecerliSayfa} / {toplamSayfa}</span>
        <button style={S.btnO} disabled={gecerliSayfa>=toplamSayfa} onClick={()=>setSayfa(p=>Math.min(toplamSayfa,p+1))}>Sonraki ›</button>
      </div>
    </div>)}
    </div>
    {modal&&(<Modal title={form.id?'Fatura Düzenle':'Yeni Fatura'} onClose={()=>setModal(false)}>
      <FG label="Tür"><select style={S.sel} value={form.tur||'kesilen'} onChange={e=>setForm(f=>({...f,tur:e.target.value,musteriId:null,tedarikciId:null}))}><option value="kesilen">Kesilen (Satış)</option><option value="alinan">Alınan (Alış)</option></select></FG>
      {form.tur!=='alinan'?(
        <FG label="Müşteri"><select style={S.sel} value={form.musteriId||''} onChange={e=>setForm(f=>({...f,musteriId:+e.target.value||null}))}><option value="">— Seçiniz —</option>{musteriler.map(m=><option key={m.id} value={m.id}>{m.ad}</option>)}</select></FG>
      ):(
        <FG label="Tedarikçi"><select style={S.sel} value={form.tedarikciId||''} onChange={e=>setForm(f=>({...f,tedarikciId:+e.target.value||null}))}><option value="">— Seçiniz —</option>{tedarikciler.map(t=><option key={t.id} value={t.id}>{t.ad}</option>)}</select></FG>
      )}
      <FG label="Açıklama"><input style={S.inp} value={form.aciklama||''} onChange={e=>setForm(f=>({...f,aciklama:e.target.value}))}/></FG>
      <div style={S.g2}><FG label="Fatura Tarihi"><input type="date" style={S.inp} value={form.tarih||''} onChange={e=>setForm(f=>({...f,tarih:e.target.value}))}/></FG><FG label="Vade Tarihi"><input type="date" style={S.inp} value={form.vadeTarih||''} onChange={e=>setForm(f=>({...f,vadeTarih:e.target.value}))}/></FG></div>
      <TutarKdvAlani form={form} setForm={setForm}/>
      <FG label="İlgili Proje"><select style={S.sel} value={form.projeId||''} onChange={e=>setForm(f=>({...f,projeId:+e.target.value||null}))}><option value="">— Yok —</option>{projeler.map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}</select></FG>
      <FormError msg={err}/>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setModal(false)}>İptal</button><button style={S.btn()} onClick={save}>Kaydet</button></div>
    </Modal>)}
    {payModal&&payingFatura&&(<Modal title={payingFatura.tur==='kesilen'?'💵 Tahsilat Kaydet':'💸 Ödeme Kaydet'} onClose={()=>setPayModal(false)}>
      <InfoBox color={C.blue}>{payingFatura.no} — {cariAd(payingFatura)} — Kalan: <strong>{fmtTL(faturaKalan(payingFatura,hareketler))}</strong></InfoBox>
      <FG label="Hesap (Kasa/Banka)"><select style={S.sel} value={payForm.hesapId||''} onChange={e=>setPayForm(p=>({...p,hesapId:e.target.value}))}><option value="">— Seçiniz —</option>{hesaplar.filter(h=>h.tur==='aktif').map(h=><option key={h.id} value={h.id}>{h.ad}</option>)}</select></FG>
      <div style={S.g2}><FG label="Tutar (₺)"><input type="number" style={S.inp} value={payForm.tutar||''} onChange={e=>setPayForm(p=>({...p,tutar:+e.target.value}))}/></FG><FG label="Tarih"><input type="date" style={S.inp} value={payForm.tarih||''} onChange={e=>setPayForm(p=>({...p,tarih:e.target.value}))}/></FG></div>
      <FG label="Yöntem"><select style={S.sel} value={payForm.yontem||'havale'} onChange={e=>setPayForm(p=>({...p,yontem:e.target.value}))}><option value="havale">Havale/EFT</option><option value="nakit">Nakit</option><option value="cek">Çek</option><option value="senet">Senet</option><option value="kart">Kredi Kartı</option></select></FG>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setPayModal(false)}>İptal</button><button style={S.btn(C.green)} onClick={savePay}>Kaydet</button></div>
    </Modal>)}
    {detayFatura&&<FaturaDetay f={detayFatura} onClose={()=>setDetayFatura(null)} onOde={openPay} onDuzenle={(ff)=>{setForm(ff);setModal(true);}} onSil={del}/>}
  </div>);
}

function CariEkstre({kisi,tur,onClose}){
  const idAlan=tur==='kesilen'?'musteriId':'tedarikciId';
  const kategori=tur==='kesilen'?'tahsilat':'odeme';
  const faturalar=LS.get('faturalar').filter(f=>f.tur===tur&&f[idAlan]===kisi.id);
  const hareketler=LS.get('kasaHareketleri').filter(h=>h.kategori===kategori&&h[idAlan]===kisi.id);
  const kayitlar=[
    ...faturalar.map(f=>({tarih:f.tarih,aciklama:`Fatura ${f.no}${f.aciklama?' — '+f.aciklama:''}`,borc:tur==='kesilen'?(+f.toplam||0):0,alacak:tur==='alinan'?(+f.toplam||0):0})),
    ...hareketler.map(h=>({tarih:h.tarih,aciklama:`${tur==='kesilen'?'Tahsilat':'Ödeme'} ${h.belgeNo}${h.aciklama?' — '+h.aciklama:''}`,borc:tur==='alinan'?(+h.tutar||0):0,alacak:tur==='kesilen'?(+h.tutar||0):0})),
  ].sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  let bakiye=0;
  const satirlar=kayitlar.map(k=>{bakiye+=k.borc-k.alacak;return{...k,bakiye};});
  const sonBakiye=satirlar.length?satirlar[satirlar.length-1].bakiye:0;
  return(<Modal title={`📄 Cari Hesap Ekstresi — ${kisi.ad}`} onClose={onClose}>
    <div style={{overflowX:'auto'}}><table style={S.tbl}><thead><tr><th style={S.th}>Tarih</th><th style={S.th}>Açıklama</th><th style={S.th}>Borç</th><th style={S.th}>Alacak</th><th style={S.th}>Bakiye</th></tr></thead>
    <tbody>{satirlar.length===0?(<tr><td style={S.td} colSpan={5}><span style={{color:C.muted}}>Kayıt yok.</span></td></tr>):satirlar.map((s,i)=>(<tr key={i}><td style={S.td}>{fmtDate(s.tarih)}</td><td style={S.td}><span style={{fontSize:12}}>{s.aciklama}</span></td><td style={S.td}>{s.borc?fmtTL(s.borc):'—'}</td><td style={S.td}>{s.alacak?fmtTL(s.alacak):'—'}</td><td style={S.td}><strong>{fmtTL(s.bakiye)}</strong></td></tr>))}</tbody></table></div>
    <div style={{...S.alert(sonBakiye>0?C.yellow:C.green),marginTop:14}}>{tur==='kesilen'?'Güncel Alacak':'Güncel Borç'}: <strong>{fmtTL(sonBakiye)}</strong></div>
  </Modal>);
}

function FaturaDetay({f,onClose,onOde,onDuzenle,onSil}){
  const [hareketler]=useState(()=>LS.get('kasaHareketleri'));
  const kalan=faturaKalan(f,hareketler);
  const durum=faturaDurum(f,hareketler);
  const odemeler=hareketler.filter(h=>h.faturaId===f.id).sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  const YONTEM_LABEL={havale:'Havale/EFT',nakit:'Nakit',cek:'Çek',senet:'Senet',kart:'Kredi Kartı'};
  return(<Modal title={`🧾 ${f.no}`} onClose={onClose} width={620}>
    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10,marginBottom:16}}>
      <div>
        <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:'.5px'}}>{f.tur==='kesilen'?'Müşteri':'Tedarikçi'}</div>
        <div style={{fontSize:16,fontWeight:700,color:C.white}}>{cariAd(f)}</div>
      </div>
      <Badge d={durum}/>
    </div>
    {f.aciklama&&<InfoBox color={C.blue}>{f.aciklama}</InfoBox>}
    <div style={S.g3}>
      <StatCard color={C.blue} value={fmtDate(f.tarih)} label="Fatura Tarihi"/>
      <StatCard color={daysLeft(f.vadeTarih)<0&&kalan>0?C.red:C.purple} value={fmtDate(f.vadeTarih)} label="Vade Tarihi"/>
      <StatCard color={f.projeId?C.teal:C.muted} value={LS.get('projeler').find(p=>p.id===f.projeId)?.ad||'—'} label="İlgili Proje"/>
    </div>
    <div style={S.card}>
      <table style={S.tbl}><tbody>
        <tr><td style={S.td}>Ara Toplam</td><td style={{...S.td,textAlign:'right'}}>{fmtTL(f.tutar)}</td></tr>
        <tr><td style={S.td}>KDV</td><td style={{...S.td,textAlign:'right'}}>{fmtTL(f.kdv)}</td></tr>
        <tr><td style={{...S.td,fontWeight:700,color:C.white,borderTop:`2px solid ${C.border}`}}>Genel Toplam</td><td style={{...S.td,textAlign:'right',borderTop:`2px solid ${C.border}`}}><strong style={{color:C.accent,fontSize:15}}>{fmtTL(f.toplam)}</strong></td></tr>
        <tr><td style={S.td}>{f.tur==='kesilen'?'Tahsil Edilen':'Ödenen'}</td><td style={{...S.td,textAlign:'right',color:C.green}}>{fmtTL((+f.toplam||0)-kalan)}</td></tr>
        <tr><td style={S.td}>Kalan</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:kalan>0?C.yellow:C.green}}>{fmtTL(kalan)}</strong></td></tr>
      </tbody></table>
    </div>
    <div style={S.secTitle}>💳 Ödeme / Tahsilat Geçmişi</div>
    {odemeler.length===0?<div style={{color:C.muted,fontSize:13,marginBottom:14}}>Bu faturaya ait kayıtlı ödeme yok.</div>:(
      <div style={{...S.card,padding:0}}><table style={S.tbl}><thead><tr><th style={S.th}>Belge No</th><th style={S.th}>Tarih</th><th style={S.th}>Yöntem</th><th style={S.th}>Tutar</th></tr></thead>
      <tbody>{odemeler.map(h=>(<tr key={h.id}><td style={S.td}><code style={{fontSize:11,color:C.muted}}>{h.belgeNo}</code></td><td style={S.td}>{fmtDate(h.tarih)}</td><td style={S.td}>{YONTEM_LABEL[h.yontem]||h.yontem||'—'}</td><td style={S.td}><strong style={{color:C.green}}>{fmtTL(h.tutar)}</strong></td></tr>))}</tbody></table></div>
    )}
    <div style={{display:'flex',gap:10,justifyContent:'flex-end',flexWrap:'wrap',marginTop:16}}>
      {kalan>0&&<button style={S.btn(C.green)} onClick={()=>{onClose();onOde(f);}}>{f.tur==='kesilen'?'💵 Tahsilat Kaydet':'💸 Ödeme Kaydet'}</button>}
      <button style={S.btnO} onClick={()=>printInvoice(f,hareketler)}>🖨️ Yazdır / PDF</button>
      <button style={S.btnO} onClick={()=>{onClose();onDuzenle(f);}}>✏️ Düzenle</button>
      <button style={S.btnR} onClick={()=>{if(window.confirm('Bu fatura silinsin mi? Bu işlem geri alınamaz.')){onClose();onSil(f.id);}}}>🗑 Sil</button>
      <button style={S.btnO} onClick={onClose}>Kapat</button>
    </div>
  </Modal>);
}

function Musteriler(){

function FinansalRaporlar(){
  const gelirGider=LS.get('gelirGider'),projeler=LS.get('projeler'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri'),musteriler=LS.get('musteriler'),tedarikciler=LS.get('tedarikciler');
  const PIE_COLORS=[C.accent,C.blue,C.green,C.purple,C.red,C.yellow,C.teal,C.pink,C.orange];
  const aylikVeri=useMemo(()=>months().map(m=>{const gelir=gelirGider.filter(g=>g.tur==='gelir'&&g.tarih?.startsWith(m)).reduce((s,g)=>s+(+g.tutar||0),0),gider=gelirGider.filter(g=>g.tur==='gider'&&g.tarih?.startsWith(m)).reduce((s,g)=>s+(+g.tutar||0),0);return{ay:fmtMonth(m).split(' ')[0],gelir,gider,net:gelir-gider};}),[gelirGider]);
  const giderDagilimi=useMemo(()=>{const map={};gelirGider.filter(g=>g.tur==='gider').forEach(g=>{map[g.kategori]=(map[g.kategori]||0)+(+g.tutar||0);});return Object.entries(map).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);},[gelirGider]);
  const projeKarliligi=useMemo(()=>projeler.map(p=>{const gelir=gelirGider.filter(g=>g.tur==='gelir'&&g.projeId===p.id).reduce((s,g)=>s+(+g.tutar||0),0),gider=gelirGider.filter(g=>g.tur==='gider'&&g.projeId===p.id).reduce((s,g)=>s+(+g.tutar||0),0);return{proje:p.ad.length>14?p.ad.slice(0,14)+'…':p.ad,gelir,gider,kar:gelir-gider};}).filter(p=>p.gelir>0||p.gider>0),[gelirGider,projeler]);
  const toplamGelir=gelirGider.filter(g=>g.tur==='gelir').reduce((s,g)=>s+(+g.tutar||0),0),toplamGider=gelirGider.filter(g=>g.tur==='gider').reduce((s,g)=>s+(+g.tutar||0),0);
  const tahsilEdilecek=faturalar.filter(f=>f.tur==='kesilen').reduce((s,f)=>s+Math.max(0,faturaKalan(f,hareketler)),0),odenecek=faturalar.filter(f=>f.tur==='alinan').reduce((s,f)=>s+Math.max(0,faturaKalan(f,hareketler)),0);
  const eK=esikKritik();
  const vadesiGecenAlacak=faturalar.filter(f=>f.tur==='kesilen'&&faturaKalan(f,hareketler)>0&&daysLeft(f.vadeTarih)<0).reduce((s,f)=>s+faturaKalan(f,hareketler),0);
  const vadesiGecenBorc=faturalar.filter(f=>f.tur==='alinan'&&faturaKalan(f,hareketler)>0&&daysLeft(f.vadeTarih)<0).reduce((s,f)=>s+faturaKalan(f,hareketler),0);
  const enBorcluMusteriler=musteriler.map(m=>({ad:m.ad,bakiye:musteriBakiye(m.id,faturalar,hareketler).bakiye})).filter(m=>m.bakiye>0).sort((a,b)=>b.bakiye-a.bakiye).slice(0,5);
  const enBorcluTedarikciler=tedarikciler.map(t=>({ad:t.ad,bakiye:tedarikciBakiye(t.id,faturalar,hareketler).bakiye})).filter(t=>t.bakiye>0).sort((a,b)=>b.bakiye-a.bakiye).slice(0,5);
  const tooltipStyle={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,color:C.text};
  const hasRecharts=!!RC.LineChart;
  return(<div>
    <div style={S.g4}><StatCard color={C.green} value={fmtTL(toplamGelir)} label="Toplam Gelir"/><StatCard color={C.red} value={fmtTL(toplamGider)} label="Toplam Gider"/><StatCard color={C.blue} value={fmtTL(tahsilEdilecek)} label="Tahsil Edilecek"/><StatCard color={C.purple} value={fmtTL(odenecek)} label="Ödenecek"/></div>
    {hasRecharts?(<>
    <div style={S.card}><div style={S.secTitle}>📈 6 Aylık Gelir / Gider Trendi</div>
    <ResponsiveContainer width="100%" height={260}><LineChart data={aylikVeri}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="ay" tick={{fill:C.muted,fontSize:12}}/><YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v=>(v/1000)+'K'}/><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/><Legend wrapperStyle={{fontSize:12}}/><Line type="monotone" dataKey="gelir" name="Gelir" stroke={C.green} strokeWidth={2.5} dot={{r:3}}/><Line type="monotone" dataKey="gider" name="Gider" stroke={C.red} strokeWidth={2.5} dot={{r:3}}/><Line type="monotone" dataKey="net" name="Net" stroke={C.accent} strokeWidth={2} strokeDasharray="4 3" dot={false}/></LineChart></ResponsiveContainer></div>
    <div style={S.g2}>
      <div style={S.card}><div style={S.secTitle}>🥧 Gider Kategorileri Dağılımı</div>{giderDagilimi.length===0?<div style={{color:C.muted,fontSize:13}}>Henüz gider kaydı yok.</div>:(<ResponsiveContainer width="100%" height={240}><PieChart><Pie data={giderDagilimi} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label={({name,percent})=>`${name} %${(percent*100).toFixed(0)}`} labelLine={false} fontSize={11}>{giderDagilimi.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Pie><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/></PieChart></ResponsiveContainer>)}</div>
      <div style={S.card}><div style={S.secTitle}>🏗️ Proje Bazlı Kârlılık</div>{projeKarliligi.length===0?<div style={{color:C.muted,fontSize:13}}>Proje bazlı kayıt yok.</div>:(<ResponsiveContainer width="100%" height={240}><BarChart data={projeKarliligi}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="proje" tick={{fill:C.muted,fontSize:10}}/><YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v=>(v/1000)+'K'}/><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="gelir" name="Gelir" fill={C.green} radius={[4,4,0,0]}/><Bar dataKey="gider" name="Gider" fill={C.red} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>)}</div>
    </div>
    </>):(<div style={S.alert(C.yellow)}>⚠️ Grafik kütüphanesi yüklenemedi. İnternet bağlantısı gereklidir.</div>)}
    {(vadesiGecenAlacak>0||vadesiGecenBorc>0)&&<Warn msg={`Vadesi geçmiş alacak: ${fmtTL(vadesiGecenAlacak)} · Vadesi geçmiş borç: ${fmtTL(vadesiGecenBorc)}`} c={C.red}/>}
    <div style={S.g2}>
      <div style={S.card}><div style={S.secTitle}>👥 En Çok Alacaklı Olduğumuz Müşteriler</div>{enBorcluMusteriler.length===0?<div style={{color:C.muted,fontSize:13}}>Açık alacak yok.</div>:enBorcluMusteriler.map((m,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}22`}}><span style={{fontSize:13,color:C.text}}>{m.ad}</span><strong style={{color:C.yellow,fontSize:13}}>{fmtTL(m.bakiye)}</strong></div>))}</div>
      <div style={S.card}><div style={S.secTitle}>🏭 En Çok Borçlu Olduğumuz Tedarikçiler</div>{enBorcluTedarikciler.length===0?<div style={{color:C.muted,fontSize:13}}>Açık borç yok.</div>:enBorcluTedarikciler.map((t,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}22`}}><span style={{fontSize:13,color:C.text}}>{t.ad}</span><strong style={{color:C.red,fontSize:13}}>{fmtTL(t.bakiye)}</strong></div>))}</div>
    </div>
    <div style={S.card}><div style={S.secTitle}>📑 Özet Kâr/Zarar Tablosu</div><table style={S.tbl}><tbody><tr><td style={S.td}>Toplam Gelir</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.green}}>{fmtTL(toplamGelir)}</strong></td></tr><tr><td style={S.td}>Toplam Gider</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.red}}>−{fmtTL(toplamGider)}</strong></td></tr><tr><td style={{...S.td,borderTop:`2px solid ${C.border}`,fontWeight:700,color:C.white}}>Net Kâr/Zarar</td><td style={{...S.td,borderTop:`2px solid ${C.border}`,textAlign:'right'}}><strong style={{color:toplamGelir-toplamGider>=0?C.green:C.red,fontSize:16}}>{fmtTL(toplamGelir-toplamGider)}</strong></td></tr></tbody></table></div>
  </div>);
}

function Ayarlar(){
  const [tab,setTab]=useState('genel');
  const [s,setS]=useState(getSettings());
  const [saved,setSaved]=useState(false);
  const [fileErr,setFileErr]=useState('');
  const fileInputRef=React.useRef(null);
  const upd=(k,v)=>setS(f=>({...f,[k]:v}));
  const kaydet=()=>{saveSettings(s);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const storageKB=useMemo(()=>{try{let total=0;ALL_DATA_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)total+=v.length;});return (total/1024).toFixed(1);}catch{return '—';}},[tab]);
  const dataCounts=useMemo(()=>ALL_DATA_KEYS.filter(k=>k!=='ayarlar').map(k=>({k,n:LS.get(k).length||0})),[tab]);

  const disaAktar=()=>{
    const dump={};ALL_DATA_KEYS.forEach(k=>{dump[k]=k==='ayarlar'?getSettings():LS.get(k);});
    const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`filopro-yedek-${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const iceAktar=(e)=>{
    const file=e.target.files?.[0];if(!file)return;setFileErr('');
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        let ok=false;
        ALL_DATA_KEYS.forEach(k=>{if(data[k]!==undefined){LS.set(k,data[k]);ok=true;}});
        if(!ok){setFileErr('Dosyada tanınan bir FiloPro verisi bulunamadı.');return;}
        alert('Veriler başarıyla içe aktarıldı. Sayfa yenilenecek.');
        window.location.reload();
      }catch(err){setFileErr('Dosya okunamadı — geçerli bir FiloPro yedek dosyası (.json) seçin.');}
    };
    reader.readAsText(file);
    if(fileInputRef.current)fileInputRef.current.value='';
  };
  const varsayilanaDon=()=>{
    if(!window.confirm('Tüm ayarlar varsayılan değerlere döndürülecek. Devam edilsin mi?'))return;
    saveSettings({...DEFAULT_SETTINGS});setS({...DEFAULT_SETTINGS});
  };
  const demoyeDon=()=>{
    if(!window.confirm('DİKKAT: Tüm mevcut veriler silinip demo örnek verilerle değiştirilecek. Bu işlem geri alınamaz. Devam edilsin mi?'))return;
    localStorage.removeItem('fp_v4');
    ALL_DATA_KEYS.forEach(k=>{if(k!=='ayarlar')localStorage.removeItem(k);});
    seed();
    alert('Demo veriler yüklendi. Sayfa yenilenecek.');
    window.location.reload();
  };
  const tumunuTemizle=()=>{
    if(!window.confirm('DİKKAT: Ayarlar hariç TÜM veriler (araçlar, operatörler, mali kayıtlar vb.) kalıcı olarak silinecek. Bu işlem geri alınamaz. Devam edilsin mi?'))return;
    if(!window.confirm('Emin misiniz? Bu son onaydır — tüm veriler silinecek.'))return;
    ALL_DATA_KEYS.forEach(k=>{if(k!=='ayarlar')LS.set(k,[]);});
    alert('Tüm veriler temizlendi. Sayfa yenilenecek.');
    window.location.reload();
  };

  // ── Güvenlik / Giriş Koruması ──────────────────────────────────────────────
  const [eskiSifre,setEskiSifre]=useState('');
  const [yeniSifre,setYeniSifre]=useState('');
  const [yeniSifre2,setYeniSifre2]=useState('');
  const [guvenlikMsg,setGuvenlikMsg]=useState('');
  const [guvenlikErr,setGuvenlikErr]=useState('');
  const [guvenlikBusy,setGuvenlikBusy]=useState(false);
  const sifreKaydet=async()=>{
    setGuvenlikErr('');setGuvenlikMsg('');
    const mevcut=getSettings();
    if(mevcut.girisSifreHash){
      const eskiHash=await hashPassword(eskiSifre,mevcut.girisSifreSalt||'');
      if(eskiHash!==mevcut.girisSifreHash){setGuvenlikErr('Mevcut şifre yanlış.');return;}
    }
    if(!yeniSifre||yeniSifre.length<4){setGuvenlikErr('Yeni şifre en az 4 karakter olmalı.');return;}
    if(yeniSifre!==yeniSifre2){setGuvenlikErr('Yeni şifreler eşleşmiyor.');return;}
    setGuvenlikBusy(true);
    const salt=yeniTuz();
    const hash=await hashPassword(yeniSifre,salt);
    const yeniAyar={...mevcut,girisKorumaAktif:true,girisSifreHash:hash,girisSifreSalt:salt};
    saveSettings(yeniAyar);setS(yeniAyar);
    setEskiSifre('');setYeniSifre('');setYeniSifre2('');
    setGuvenlikBusy(false);
    setGuvenlikMsg('✓ Şifre kaydedildi ve giriş koruması etkinleştirildi.');
  };
  const korumayiKapat=async()=>{
    const mevcut=getSettings();

    }
    const yeniAyar={...mevcut,girisKorumaAktif:false,girisSifreHash:'',girisSifreSalt:'',otoKilitDakika:0};

      <div style={{display:'flex',gap:10,alignItems:'center'}}><button style={S.btn()} onClick={kaydet}>💾 Kaydet</button>{saved&&<span style={{color:C.green,fontSize:12}}>✓ Kaydedildi</span>}</div>

// ── Uygulama Kilidi (Giriş Ekranı) ────────────────────────────────────────────
function LockScreen({onUnlock}){
  const s=getSettings();
  const kullanicilar=useMemo(()=>LS.get('kullanicilar').filter(k=>k.aktif),[]);
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [secilen,setSecilen]=useState(s.aktifKullaniciId||kullanicilar[0]?.id||'');
  const dene=async(e)=>{
    e?.preventDefault();
    if(!pw)return;
    setBusy(true);setErr('');
    const hash=await hashPassword(pw,s.girisSifreSalt||'');
    if(hash===s.girisSifreHash){
      sessionStorage.setItem('fp_unlocked','1');
      const guncelS=getSettings();
      if(secilen){
        saveSettings({...guncelS,aktifKullaniciId:+secilen});
        const kul=kullanicilar.find(k=>k.id===+secilen);
        const loglar=LS.get('islemLoglari');
        LS.set('islemLoglari',[{id:uid(),kullanici:kul?.ad||'Bilinmeyen',islem:'Giriş yapıldı',detay:'Uygulama kilidi açıldı',tarih:new Date().toLocaleString('tr-TR')},...loglar]);
      }
      setBusy(false);
      onUnlock();
    }else{
      setBusy(false);
      setErr('Şifre hatalı. Tekrar deneyin.');
      setPw('');
    }
  };
  return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:`radial-gradient(circle at 30% 20%,${C.card},${C.bg})`,padding:20}}>
    <form onSubmit={dene} style={{width:'min(380px,92vw)',background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:'32px 28px',boxShadow:'0 20px 60px -20px rgba(0,0,0,.6)'}} className="fp-fade">
      <div style={{textAlign:'center',marginBottom:22}}>
        <div style={{fontSize:40,marginBottom:8}}>🚜</div>
        <div style={{fontSize:20,fontWeight:800,color:C.white}}>{s.firmaAdi||'FiloPro'}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>Devam etmek için şifrenizi girin</div>
      </div>
      {kullanicilar.length>0&&(<div style={{marginBottom:14}}>
        <label style={S.lbl}>Kullanıcı</label>
        <select style={S.sel} value={secilen} onChange={e=>setSecilen(e.target.value)}>
          {kullanicilar.map(k=><option key={k.id} value={k.id}>{k.ad}</option>)}
        </select>
      </div>)}
      <div style={{marginBottom:10}}>
        <label style={S.lbl}>Şifre</label>
        <input autoFocus type="password" style={S.inp} value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} placeholder="••••••••"/>
      </div>
      {err&&<div style={S.alert(C.red)}>⚠️ {err}</div>}
      <button type="submit" style={{...S.btn(),width:'100%',padding:'11px 0',fontSize:13,marginTop:6}} disabled={busy||!pw}>{busy?'⏳ Kontrol ediliyor...':'🔓 Giriş Yap'}</button>
      <div style={{textAlign:'center',marginTop:16,fontSize:11,color:C.muted,lineHeight:1.5}}>Bu kilit yalnızca bu cihazdaki erişimi korur.<br/>Veriler tarayıcıda şifrelenmeden saklanır.</div>
    </form>
  </div>);
}

  {group:'FAZ 1 — CORE',items:[

    {id:'gorevler',label:'Görevler',icon:'✅',comp:Gorevler},

  ]},
  {group:'FAZ 3 — ENTERPRISE',items:[

    {id:'yetki',label:'Kullanıcı & Yetki',icon:'🔐',comp:KullaniciYetki},
    {id:'erp',label:'ERP Entegrasyon',icon:'🏢',comp:ErpEntegrasyon},
    {id:'ai',label:'Yapay Zeka',icon:'🤖',comp:YapayZeka},
  ]},
  {group:'FAZ 4 — MUHASEBE',items:[
    {id:'muhasebe',label:'Muhasebe & Finans',icon:'💰',comp:Muhasebe},
  ]},
  {group:'SİSTEM',items:[
    {id:'ayarlar',label:'Ayarlar',icon:'⚙️',comp:Ayarlar},
  ]},
];
const ALL_PAGES=PAGES.flatMap(g=>g.items);
// Kaldırılan bağımsız sayfa id'leri artık 'arac' modülünün alt sekmeleri: eski linkler/roller için köprü.
const ESKI_SAYFA_YONLENDIRME={bakim:'arac',yakit:'arac',evrak:'arac',hasar:'arac',parca:'arac',saha:'arac',operator:'ik'};

// ── Rol Tabanlı Yetkilendirme (RBAC) ──────────────────────────────────────────
// sayfalar: '*' → tüm sayfalara erişim; aksi halde erişilebilir sayfa id'lerinin listesi.
const ROL_TANIMLARI = {
  admin:    {renkKey:'red',    label:'Admin',     aciklama:'Tüm modüllere tam erişim.',                                  sayfalar:'*'},
  muhasebe: {renkKey:'purple', label:'Muhasebe',  aciklama:'Gelir-gider, fatura, kasa-banka ve ilgili raporlar.',        sayfalar:['dashboard','muhasebe','arac','proje','erp']},
  sef:      {renkKey:'blue',   label:'Şef',       aciklama:'Araç, bakım, iş emirleri, personel ve saha yönetimi.',       sayfalar:['dashboard','arac','isemri','gorevler','ik']},
  operator: {renkKey:'green',  label:'Operatör',  aciklama:'Sadece saha girişleri ve temel görünüm.',                    sayfalar:['dashboard','arac','akaryakit','gorevler']},
};
const rolRenk=(rol)=>C[ROL_TANIMLARI[rol]?.renkKey]||C.muted;
const rolSayfalari=(rol)=>{const r=ROL_TANIMLARI[rol];if(!r)return null;return r.sayfalar==='*'?null:new Set(r.sayfalar);};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  useEffect(()=>{seed();migratePersonelModulu();ensureSettings();},[]);
  const [active,setActive]=useState(()=>{const h=window.location.hash.replace('#','');if(ESKI_SAYFA_YONLENDIRME[h])return ESKI_SAYFA_YONLENDIRME[h];return ALL_PAGES.some(p=>p.id===h)?h:'dashboard';});
  const [menuOpen,setMenuOpen]=useState(false);
  const [,forceThemeRender]=useState(0);
  const [settingsVersion,setSettingsVersion]=useState(0);
  const [locked,setLocked]=useState(()=>{
    const st=getSettings();
    return !!(st.girisKorumaAktif&&st.girisSifreHash)&&sessionStorage.getItem('fp_unlocked')!=='1';
  });

  useEffect(()=>{
    const applyTheme=()=>{
      const st=getSettings();
      applyThemeToC(st.tema,st.vurguRenk);
      forceThemeRender(x=>x+1);
      setSettingsVersion(x=>x+1);
    };
    applyTheme();
    window.addEventListener('fp-settings-changed',applyTheme);
    return ()=>window.removeEventListener('fp-settings-changed',applyTheme);
  },[]);
  const sidebarKompakt=getSettings().sidebarKompakt;

  // Hareketsizlikte otomatik kilitleme
  useEffect(()=>{
    if(locked)return;
    const check=()=>{
      const st=getSettings();
      if(!st.girisKorumaAktif||!st.girisSifreHash||!st.otoKilitDakika)return null;
      let timer;
      const kilitle=()=>{sessionStorage.removeItem('fp_unlocked');setLocked(true);};
      const reset=()=>{clearTimeout(timer);timer=setTimeout(kilitle,st.otoKilitDakika*60000);};
      const evs=['mousemove','keydown','click','touchstart','scroll'];
      evs.forEach(ev=>window.addEventListener(ev,reset));
      reset();
      return ()=>{clearTimeout(timer);evs.forEach(ev=>window.removeEventListener(ev,reset));};
    };
    let cleanup=check();
    const onSettings=()=>{if(cleanup)cleanup();cleanup=check();};
    window.addEventListener('fp-settings-changed',onSettings);
    return ()=>{if(cleanup)cleanup();window.removeEventListener('fp-settings-changed',onSettings);};
  },[locked]);

  useEffect(()=>{window.location.hash=active;},[active]);

  useEffect(()=>{
    const onNav=(e)=>{if(e.detail&&ALL_PAGES.some(p=>p.id===e.detail))setActive(e.detail);};
    window.addEventListener('fp-navigate',onNav);
    return ()=>window.removeEventListener('fp-navigate',onNav);
  },[]);

  useEffect(()=>{
    const sb=document.getElementById('fp-sidebar'),ov=document.getElementById('fp-overlay');
    if(sb)sb.classList.toggle('open',menuOpen);
    if(ov)ov.classList.toggle('show',menuOpen);
  },[menuOpen]);

  useEffect(()=>{
    const onForceLock=()=>{sessionStorage.removeItem('fp_unlocked');setLocked(true);setMenuOpen(false);};
    window.addEventListener('fp-force-lock',onForceLock);
    return ()=>window.removeEventListener('fp-force-lock',onForceLock);
  },[]);

  const navigate=(id)=>{setActive(id);setMenuOpen(false);};
  const aktifKullanici=useMemo(()=>{if(locked)return null;const st=getSettings();return LS.get('kullanicilar').find(k=>k.id===st.aktifKullaniciId);},[locked,active,settingsVersion]);
  const erisimSayfalari=useMemo(()=>aktifKullanici?rolSayfalari(aktifKullanici.rol):null,[aktifKullanici]);
  const gorunurPages=useMemo(()=>PAGES.map(g=>({...g,items:g.items.filter(it=>!erisimSayfalari||erisimSayfalari.has(it.id))})).filter(g=>g.items.length>0),[erisimSayfalari]);
  const etkinId=(erisimSayfalari&&!erisimSayfalari.has(active))?'dashboard':active;
  useEffect(()=>{if(etkinId!==active)setActive(etkinId);},[etkinId]);
  const current=ALL_PAGES.find(p=>p.id===etkinId)||ALL_PAGES[0];
  const CurrentComp=current.comp;
  const kilitle=()=>{
    const st=getSettings();
    if(!st.girisKorumaAktif||!st.girisSifreHash){alert('Kilitlemeden önce Ayarlar → Güvenlik sekmesinden bir şifre belirlemelisiniz.');return;}
    sessionStorage.removeItem('fp_unlocked');
    setLocked(true);
    setMenuOpen(false);
  };

  if(locked)return<LockScreen onUnlock={()=>setLocked(false)}/>;

  return(
    <div style={S.app}>
      <div id="fp-overlay" onClick={()=>setMenuOpen(false)}/>
      <aside id="fp-sidebar" style={{...S.sidebar,width:sidebarKompakt?70:240}}>
        <div style={S.logo}>
          <div style={S.logoText}>{sidebarKompakt?'🚜':'🚜 FiloPro'}</div>
          {!sidebarKompakt&&<div style={S.logoSub}>İş Makinesi Yönetim Sistemi</div>}
        </div>
        <nav style={{flex:1,paddingBottom:16}}>
          {gorunurPages.map(group=>(<div key={group.group}>
            {!sidebarKompakt&&<div style={S.navGroup}>{group.group}</div>}
            {group.items.map(item=>(<div key={item.id} style={S.navItem(active===item.id)} onClick={()=>navigate(item.id)} title={item.label}><span>{item.icon}</span>{!sidebarKompakt&&<span>{item.label}</span>}</div>))}
          </div>))}
        </nav>
        <div style={{padding:sidebarKompakt?'10px 8px':'12px 16px',borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          {aktifKullanici&&!sidebarKompakt&&(<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <div style={{width:26,height:26,borderRadius:20,background:hexA(C.accent,.18),color:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{(aktifKullanici.ad||'?').slice(0,1).toUpperCase()}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{aktifKullanici.ad}</div>
              <div style={{fontSize:10,color:rolRenk(aktifKullanici.rol)}}>{ROL_TANIMLARI[aktifKullanici.rol]?.label||aktifKullanici.rol}</div>
            </div>
          </div>)}
          <button style={{...S.btnO,width:'100%',fontSize:11,padding:'6px 8px'}} onClick={kilitle} title="Uygulamayı Kilitle">🔒{!sidebarKompakt&&' Kilitle'}</button>
          {!sidebarKompakt&&<div style={{fontSize:10,color:C.muted,marginTop:10}}>v4.3.0 — Faz 1+2+3+4+Güvenlik+RBAC</div>}
        </div>
      </aside>
      <main style={S.main}>
        <header style={S.header}>
          <button id="fp-menu-btn" onClick={()=>setMenuOpen(true)}>☰</button>
          <div style={S.headerTitle}><span>{current.icon}</span><span className="fp-headertitle-text">{current.label}</span></div>
          <GlobalSearch onNavigate={navigate}/>
          <NotificationBell/>
          <div style={{width:1,height:26,background:C.border,margin:'0 2px'}}/>
          <LiveClock/>
        </header>
        <div style={S.content}>
          <div key={active} className="fp-fade">
            <CurrentComp/>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
