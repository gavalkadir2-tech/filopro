const LS = {

  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},

const uid=()=>`${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
// Kayıt ID'leri karışık tiptedir (başlangıç verileri sayısal, uid() ile eklenenler metin).

// ── Toast & Confirm (global UI feedback, replaces native alert/confirm) ──────
let _toastListeners=[];
function fpToast(msg,type){
  if(!type){
    if(/✅/.test(msg))type='success';
    else if(/⚠️|DİKKAT|yanlış|hata|olmalı|zorunlu|bulunamadı|desteklemiyor|yüklenemedi|silinemedi|okunamadı|başlatılamadı|seçmelisiniz|seçin\.|doldur/i.test(msg))type='error';
    else type='info';
  }
  const t={id:uid(),msg,type};
  _toastListeners.forEach(fn=>fn(t));
}
function ToastHost(){
  const [toasts,setToasts]=React.useState([]);
  React.useEffect(()=>{
    const listener=(t)=>{
      setToasts(ts=>[...ts,t]);
      setTimeout(()=>setToasts(ts=>ts.filter(x=>x.id!==t.id)),4200);
    };
    _toastListeners.push(listener);
    return()=>{_toastListeners=_toastListeners.filter(l=>l!==listener);};
  },[]);
  if(!toasts.length)return null;
  const colorFor=(type)=>type==='success'?C.green:type==='error'?C.red:C.blue;
  const iconFor=(type)=>type==='success'?'✅':type==='error'?'⚠️':'ℹ️';
  return (
    <div style={{position:'fixed',top:16,right:16,zIndex:2000,display:'flex',flexDirection:'column',gap:8,maxWidth:'min(380px,92vw)'}}>
      {toasts.map(t=>(
        <div key={t.id} className="fp-fade" style={{background:C.card,border:`1px solid ${colorFor(t.type)}55`,borderLeft:`4px solid ${colorFor(t.type)}`,borderRadius:8,padding:'11px 14px',fontSize:13,color:C.text,boxShadow:'0 10px 28px -8px rgba(0,0,0,.55)',display:'flex',alignItems:'flex-start',gap:9}}>
          <span style={{flexShrink:0}}>{iconFor(t.type)}</span>
          <span style={{flex:1,lineHeight:1.45,whiteSpace:'pre-line'}}>{t.msg}</span>
          <button onClick={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,lineHeight:1,padding:0,flexShrink:0}}>✕</button>
        </div>
      ))}
    </div>
  );
}

let _confirmSetter=null;
let _confirmResolver=null;
function fpConfirm(msg){
  return new Promise(resolve=>{
    _confirmResolver=resolve;
    if(_confirmSetter)_confirmSetter(msg);
  });
}
function ConfirmHost(){
  const [msg,setMsg]=React.useState(null);
  React.useEffect(()=>{_confirmSetter=setMsg;return()=>{_confirmSetter=null;};},[]);
  const close=(result)=>{
    setMsg(null);
    if(_confirmResolver){const r=_confirmResolver;_confirmResolver=null;r(result);}
  };
  if(!msg)return null;
  const isDanger=/DİKKAT|geri alınamaz|silinsin|silinecek|silinmesin/i.test(msg);
  return (
    <div style={S.modal} onClick={e=>e.target===e.currentTarget&&close(false)}>
      <div style={{...S.mbox,width:'min(420px,94vw)'}}>
        <div style={{fontSize:14,color:C.text,lineHeight:1.55,marginBottom:20,whiteSpace:'pre-line'}}>{msg}</div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button style={S.btn(C.muted)} onClick={()=>close(false)}>Vazgeç</button>
          <button style={S.btn(isDanger?C.red:C.accent)} onClick={()=>close(true)}>Onayla</button>
        </div>
      </div>
    </div>
  );
}

// ── Error Boundary ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('FiloPro hata yakalandı:',error,info);}
  render(){
    if(this.state.hasError){
      return (
        <div style={{position:'fixed',inset:0,background:'#0f1117',color:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',padding:20,zIndex:5000,fontFamily:"'Inter',system-ui,sans-serif"}}>
          <div style={{maxWidth:480,textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>Beklenmeyen bir hata oluştu</div>
            <div style={{fontSize:13,color:'#8892b0',marginBottom:20,lineHeight:1.5}}>Uygulama bir sorunla karşılaştı. Verileriniz tarayıcınızda güvende — sayfayı yenileyerek devam edebilirsiniz. Sorun devam ederse Ayarlar &gt; Veri Yönetimi bölümünden yedek alıp bu hata mesajını paylaşabilirsiniz.</div>
            <button onClick={()=>window.location.reload()} style={{background:'#f59e0b',border:'none',borderRadius:8,padding:'10px 22px',fontSize:14,fontWeight:600,color:'#000',cursor:'pointer'}}>🔄 Sayfayı Yenile</button>
            {this.state.error&&<div style={{marginTop:16,fontSize:11,color:'#5a6280',textAlign:'left',background:'#171a26',border:'1px solid #2a3050',borderRadius:6,padding:10,maxHeight:120,overflow:'auto',fontFamily:'monospace'}}>{String(this.state.error?.message||this.state.error)}</div>}
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
window.addEventListener('error',(e)=>{try{fpToast('Beklenmeyen bir hata oluştu: '+(e?.error?.message||e.message||'bilinmeyen hata'),'error');}catch{}});
window.addEventListener('unhandledrejection',(e)=>{try{fpToast('İşlem tamamlanamadı: '+(e?.reason?.message||e?.reason||'bilinmeyen hata'),'error');}catch{}});

// ── Backend Senkronizasyonu (JWT) ─────────────────────────────────────────────
// Cihazlar arasında veri senkronu isteğe bağlıdır. Bir backend'e bağlanılmadığı
// sürece uygulama tamamen localStorage ile, önceki gibi çalışmaya devam eder.
const SYNC_META_KEY='fp_sync_meta';
const SYNC_CFG_KEY='fp_sync_cfg'; // {url, token, username}
function getSyncMeta(){try{return JSON.parse(localStorage.getItem(SYNC_META_KEY))||{};}catch{return {};}}
function setSyncMeta(m){try{localStorage.setItem(SYNC_META_KEY,JSON.stringify(m));}catch{}}
function getSyncCfg(){try{return JSON.parse(localStorage.getItem(SYNC_CFG_KEY))||{};}catch{return {};}}
function setSyncCfg(c){try{localStorage.setItem(SYNC_CFG_KEY,JSON.stringify(c));}catch{}}

let _syncStatusListeners=[];
let _dataVersion=0;
let _syncStatus={state:'kapali',lastSync:null,pending:0,error:null,dataVersion:0}; // kapali|bagli|senkron_ediliyor|hata|cevrimdisi
function _emitSyncStatus(patch){
  _syncStatus={..._syncStatus,...patch};
  _syncStatusListeners.forEach(fn=>fn(_syncStatus));
}
function fpSyncStatus(){return _syncStatus;}
function fpSyncSubscribe(fn){_syncStatusListeners.push(fn);fn(_syncStatus);return()=>{_syncStatusListeners=_syncStatusListeners.filter(l=>l!==fn);};}

const LS_DIRTY_KEY='fp_dirty_records';
function getDirtyRecords(){try{return JSON.parse(localStorage.getItem(LS_DIRTY_KEY))||{records:{},settings:null};}catch(e){return {records:{},settings:null};}}
function setDirtyRecords(d){try{localStorage.setItem(LS_DIRTY_KEY,JSON.stringify(d));}catch(e){}}
function countPending(dirty){let c=0;if(dirty.settings)c++;if(dirty.records){Object.keys(dirty.records).forEach(m=>{c+=Object.keys(dirty.records[m]||{}).length;});}return c;}

// LS.set her çağrıldığında sadece değişen satırları (records) dirty olarak işaretler;
// bir sonraki senkronda sadece bu değişen/silinen satırlar sunucuya gönderilir.
const _origLSSet=LS.set;
LS.set=(k,v)=>{
  const cfg=getSyncCfg();
  if(!cfg.token){
    _origLSSet(k,v);
    return;
  }

  const dirty=getDirtyRecords();

  if(k==='ayarlar'){
    _origLSSet(k,v);
    dirty.settings={data:v,updatedAt:Date.now()};
    setDirtyRecords(dirty);
    _emitSyncStatus({pending:countPending(dirty)});
    return;
  }

  if(Array.isArray(v)){
    const oldVal=LS.get(k,[]);
    const oldMap=new Map(oldVal.map(r=>[String(r.id),r]));
    const now=Date.now();

    const stripInternal=(obj)=>{
      const copy={...obj};
      delete copy._updatedAt;
      delete copy._deleted;
      return JSON.stringify(copy);
    };

    const updatedV=v.map(newRec=>{
      const oldRec=oldMap.get(String(newRec.id));
      if(!oldRec||stripInternal(newRec)!==stripInternal(oldRec)){
        const recordCopy={...newRec,_updatedAt:now};
        dirty.records[k]=dirty.records[k]||{};
        dirty.records[k][String(newRec.id)]={...recordCopy,_deleted:0};
        return recordCopy;
      }
      return oldRec;
    });

    const newKeys=new Set(v.map(r=>String(r.id)));
    oldVal.forEach(oldRec=>{
      if(!newKeys.has(String(oldRec.id))){
        dirty.records[k]=dirty.records[k]||{};
        dirty.records[k][String(oldRec.id)]={id:oldRec.id,_updatedAt:now,_deleted:1};
      }
    });

    _origLSSet(k,updatedV);
    setDirtyRecords(dirty);
    _emitSyncStatus({pending:countPending(dirty)});
  }else{
    _origLSSet(k,v);
  }
};

  const cleanUrl=(url||'').trim().replace(/\/+$/,'');
  if(!cleanUrl)throw new Error('Sunucu adresi gerekli.');

    method:'POST',headers:{'Content-Type':'application/json'},

  const data=await res.json().catch(()=>({}));

  setSyncMeta({updatedAt:{},lastPull:0});
  setDirtyRecords({records:{},settings:null});
  _emitSyncStatus({state:'bagli',error:null,pending:0,lastSync:null});
  return data;
}

function fpSyncLogout(){
  setSyncCfg({});
  setSyncMeta({});
  setDirtyRecords({records:{},settings:null});
  _emitSyncStatus({state:'kapali',pending:0,lastSync:null,error:null});
}

async function fpSyncPush(){
  const cfg=getSyncCfg();
  if(!cfg.token||!cfg.url)return;
  const dirtySnapshot=getDirtyRecords();
  const pendingCount=countPending(dirtySnapshot);
  if(pendingCount===0)return;

  const changes=[];
  Object.keys(dirtySnapshot.records||{}).forEach(mod=>{
    Object.keys(dirtySnapshot.records[mod]||{}).forEach(recId=>{
      const item=dirtySnapshot.records[mod][recId];
      changes.push({
        module:mod,
        recordId:recId,
        data:item,
        updatedAt:item._updatedAt||Date.now(),
        deleted:item._deleted||0
      });
    });
  });

  const payload={
    changes,
    settingsChange:dirtySnapshot.settings?{
      data:dirtySnapshot.settings.data,
      updatedAt:dirtySnapshot.settings.updatedAt
    }:null
  };

  const res=await fetch(`${cfg.url}/api/sync/push`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.token}`},
    body:JSON.stringify(payload)
  });

  if(res.status===401){fpSyncLogout();throw new Error('Oturum süresi dolmuş, tekrar giriş yapın.');}
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'Gönderim başarısız.');}

  // Gönderim başarılı olunca dirty kayıtlardan temizle (race-condition korumalı)
  const currentDirty=getDirtyRecords();
  if(dirtySnapshot.settings&&currentDirty.settings&&currentDirty.settings.updatedAt===dirtySnapshot.settings.updatedAt){
    currentDirty.settings=null;
  }
  Object.keys(dirtySnapshot.records||{}).forEach(mod=>{
    if(currentDirty.records[mod]){
      Object.keys(dirtySnapshot.records[mod]||{}).forEach(recId=>{
        const snapItem=dirtySnapshot.records[mod][recId];
        const currItem=currentDirty.records[mod][recId];
        if(currItem&&currItem._updatedAt===snapItem._updatedAt){
          delete currentDirty.records[mod][recId];
        }
      });
      if(Object.keys(currentDirty.records[mod]).length===0){
        delete currentDirty.records[mod];
      }
    }
  });

  setDirtyRecords(currentDirty);
  _emitSyncStatus({pending:countPending(currentDirty)});
}

async function fpSyncPull(){
  const cfg=getSyncCfg();
  if(!cfg.token||!cfg.url)return;
  const meta=getSyncMeta();
  const since=meta.lastPull||0;
  const res=await fetch(`${cfg.url}/api/sync/pull?since=${since}`,{
    headers:{'Authorization':`Bearer ${cfg.token}`}
  });
  if(res.status===401){fpSyncLogout();throw new Error('Oturum süresi dolmuş, tekrar giriş yapın.');}
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'Alım başarısız.');}
  
  const data=await res.json();
  let localModified=false;

  if(data.changedSettings){
    _origLSSet('ayarlar',data.changedSettings.data);
    localModified=true;
  }

  const recordsByModule={};
  (data.changedRecords||[]).forEach(item=>{
    recordsByModule[item.module]=recordsByModule[item.module]||[];
    recordsByModule[item.module].push(item);
  });

  Object.keys(recordsByModule).forEach(mod=>{
    const currentList=LS.get(mod,[]);
    const recordMap=new Map(currentList.map(r=>[String(r.id),r]));

    recordsByModule[mod].forEach(item=>{
      const recId=String(item.recordId);
      if(item.deleted){
        recordMap.delete(recId);
      }else{
        const parsed=typeof item.data==='string'?JSON.parse(item.data):item.data;
        parsed._updatedAt=item.updatedAt;
        recordMap.set(recId,parsed);
      }
    });

    const newList=Array.from(recordMap.values());
    _origLSSet(mod,newList);
    localModified=true;
  });

  meta.lastPull=data.serverTime||Date.now();
  setSyncMeta(meta);

  if(localModified){
    fpToast('Güncellemeler başarıyla senkronize edildi.','success');
    _emitSyncStatus({dataVersion:++_dataVersion});
    window.dispatchEvent(new Event('fp-settings-changed'));
  }
}

let _syncing=false;
async function fpSyncNow(){
  const cfg=getSyncCfg();
  if(!cfg.token||_syncing)return;
  _syncing=true;
  _emitSyncStatus({state:'senkron_ediliyor',error:null});
  try{
    await fpSyncPull();
    await fpSyncPush();
    _emitSyncStatus({state:'bagli',lastSync:Date.now(),error:null});
  }catch(e){
    _emitSyncStatus({state:navigator.onLine?'hata':'cevrimdisi',error:e.message});
  }finally{
    _syncing=false;
  }
}

(function initSync(){
  const cfg=getSyncCfg();
  if(cfg.token){
    _emitSyncStatus({state:'bagli',pending:countPending(getDirtyRecords())});
    setTimeout(fpSyncNow,1500);
  }
  setInterval(()=>{if(getSyncCfg().token)fpSyncNow();},45000);
  window.addEventListener('online',()=>{if(getSyncCfg().token)fpSyncNow();});
  window.addEventListener('offline',()=>{if(getSyncCfg().token)_emitSyncStatus({state:'cevrimdisi'});});
})();

// ── Güvenlik: Şifre Hashleme (yerel erişim kilidi — veriler şifrelenmez) ──────
const simpleHash=(str)=>{let h=5381;for(let i=0;i<str.length;i++){h=((h*33)^str.charCodeAt(i))>>>0;}return h.toString(16).padStart(8,'0');};
async function hashPassword(pw,salt){
  const text=`${salt||''}::${pw||''}`;
  if(window.crypto?.subtle){
    try{
      const buf=await window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){/* aşağıdaki yedek yönteme düş */}
  }
  return simpleHash(text)+simpleHash(text.split('').reverse().join(''));
}

// ── WhatsApp / Telegram Bildirim Yardımcıları ─────────────────────────────────
// NOT: WhatsApp'ın ücretsiz/genel kullanıcılara açık bir gönderim API'si yoktur (yalnızca
// onaylı WhatsApp Business API ile, sunucu tarafında ve şablon mesajlarla mümkündür).
// Bu nedenle burada "tıkla-gönder" (wa.me) bağlantısı üretilir; mesaj otomatik hazırlanır
// ama gönderim için WhatsApp arayüzünde tek tıkla onay gerekir.
const whatsappNumaraTemizle=(tel)=>{
  let t=(tel||'').replace(/[^\d]/g,'');
  if(!t)return'';
  if(t.startsWith('0'))t='90'+t.slice(1);
  else if(!t.startsWith('90')&&t.length===10)t='90'+t;
  return t;
};
const whatsappLinkOlustur=(tel,mesaj)=>{
  const n=whatsappNumaraTemizle(tel);
  if(!n)return null;
  return `https://wa.me/${n}?text=${encodeURIComponent(mesaj)}`;
};

// ── Sürücü Değerlendirme & İzleme — konum geçmişi ve analiz yardımcıları ──────────
// 'konumlar' sadece SON bilinen konumu tutar (upsert); sürüş analizi (mesafe, hız
// ihlali, zaman içindeki eğilim) için buna ek olarak sınırlı bir GEÇMİŞ log'u tutulur.
// Depolamanın şişmemesi için: kişi başına en fazla ~500 nokta VE son 30 günden eski
// noktalar otomatik budanır (LS.set üzerinden dirty-tracking'e uygun, id bazlı).
const KONUM_GECMISI_MAX_GUN=30;
const KONUM_GECMISI_MAX_NOKTA=500;
function konumGecmisiKaydet(tip,hedefId,pos,zamanISO){
  const gecmis=LS.get('konumGecmisi')||[];
  const yeni={id:uid(),tip,hedefId,lat:pos.coords.latitude,lng:pos.coords.longitude,hiz:pos.coords.speed||null,zaman:zamanISO};
  const esikTarih=Date.now()-KONUM_GECMISI_MAX_GUN*86400000;
  const buKisiEski=gecmis.filter(k=>k.tip===tip&&k.hedefId===hedefId).sort((a,b)=>a.zaman.localeCompare(b.zaman));
  const buKisiYeni=[...buKisiEski,yeni].filter(k=>new Date(k.zaman).getTime()>=esikTarih).slice(-KONUM_GECMISI_MAX_NOKTA);
  const digerleri=gecmis.filter(k=>!(k.tip===tip&&k.hedefId===hedefId));
  LS.set('konumGecmisi',[...digerleri,...buKisiYeni]);
}
// İki GPS noktası arası kuş uçuşu mesafe (km) — Haversine formülü.
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Bir personelin (tip:'personel') konum geçmişinden sürüş metriklerini hesaplar.
function surucuMetrikleri(personelId,gunSayisi=30){
  const esik=Date.now()-gunSayisi*86400000;
  const noktalar=(LS.get('konumGecmisi')||[]).filter(k=>k.tip==='personel'&&k.hedefId===personelId&&new Date(k.zaman).getTime()>=esik).sort((a,b)=>a.zaman.localeCompare(b.zaman));
  const hizLimiti=getSettings().hizLimitiKmh||90;
  let mesafeKm=0;
  for(let i=1;i<noktalar.length;i++){
    const onceki=noktalar[i-1],simdi=noktalar[i];
    // GPS sıçramalarını (sinyal hatası) elemek için art arda >5dk boşluk varsa mesafeye katma.
    if(new Date(simdi.zaman)-new Date(onceki.zaman)>5*60000)continue;
    mesafeKm+=haversineKm(onceki.lat,onceki.lng,simdi.lat,simdi.lng);
  }
  const hizlar=noktalar.filter(n=>n.hiz!=null).map(n=>n.hiz*3.6); // m/s -> km/h
  const ortalamaHiz=hizlar.length?hizlar.reduce((s,h)=>s+h,0)/hizlar.length:0;
  const maksHiz=hizlar.length?Math.max(...hizlar):0;
  const ihlaller=hizlar.filter(h=>h>hizLimiti).length;
  return{noktaSayisi:noktalar.length,mesafeKm,ortalamaHiz,maksHiz,ihlaller,hizLimiti};
}
// Bir GPS noktasının hangi tanımlı "Yer"lerin içinde olduğunu bulur (Life360'daki "bubble"lara benzer).
function icindeOlduguYerler(lat,lng){
  return(LS.get('konumYerleri')||[]).filter(y=>y.aktif!==false&&haversineKm(lat,lng,y.lat,y.lng)*1000<=(y.yaricapM||300));
}
// Konum güncellemesi geldiğinde, tanımlı yerlere göre giriş/çıkış olaylarını tespit edip kaydeder.
// Aynı yere art arda giriş kaydı açılmasın diye, o kişi+yer için en son olayın tipine bakılır.
// NOT: WhatsApp linkleri (wa.me) arka planda sessizce gönderilemez — tarayıcıda açılıp elle
// "gönder" basılması gerekir. Bu yüzden burada mesaj OTOMATİK gönderilmez; "bildir" işaretli
// bir yerde giriş/çıkış olursa, olay "bildirimGonderildi:false" ile işaretlenir ve Canlı Konum
// ekranındaki "Bildirim Kutusu"nda kullanıcının tek tıkla göndermesi için bekler.
function konumGeofenceKontrol(tip,hedefId,lat,lng){
  const yerler=LS.get('konumYerleri')||[];
  if(!yerler.length)return;
  const icindekiler=new Set(icindeOlduguYerler(lat,lng).map(y=>y.id));
  const olaylar=LS.get('konumOlaylari')||[];
  const yeniler=[];
  yerler.forEach(y=>{
    if(y.aktif===false)return;
    const buKisiYer=olaylar.filter(o=>o.tip===tip&&o.hedefId===hedefId&&o.yerId===y.id).sort((a,b)=>a.zaman.localeCompare(b.zaman));
    const sonOlay=buKisiYer[buKisiYer.length-1];
    const suAnIcinde=icindekiler.has(y.id);
    const oncekiIcinde=sonOlay?sonOlay.olay==='giris':false;
    if(suAnIcinde&&!oncekiIcinde){
      yeniler.push({id:uid(),tip,hedefId,yerId:y.id,olay:'giris',zaman:new Date().toISOString(),bildirimGonderildi:!y.bildir});
    }else if(!suAnIcinde&&oncekiIcinde){
      yeniler.push({id:uid(),tip,hedefId,yerId:y.id,olay:'cikis',zaman:new Date().toISOString(),bildirimGonderildi:!y.bildir});
    }
  });
  if(yeniler.length)LS.set('konumOlaylari',[...olaylar,...yeniler].slice(-2000));
}
// 0-100 arası bileşik "Sürücü Skoru": hız ihlali ve iş güvenliği olayı puan kırar,
// iş emri tamamlama oranı ve son performans değerlendirmesi puan katar.
function surucuSkoruHesapla(personelId){
  const metrik=surucuMetrikleri(personelId);
  const olaylar=(LS.get('isGuvenligiOlaylari')||[]).filter(o=>o.personelId===personelId);
  const isEmirleri=(LS.get('isemirleri')||[]).filter(i=>i.opId===personelId);
  const tamamlanan=isEmirleri.filter(i=>i.durum==='tamamlandi').length;
  const tamamlamaOrani=isEmirleri.length?tamamlanan/isEmirleri.length:null;
  const degerlendirmeler=(LS.get('degerlendirmeler')||[]).filter(d=>d.personelId===personelId).sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  const sonDeger=degerlendirmeler[degerlendirmeler.length-1];
  const sonPuan=sonDeger?((+sonDeger.verimlilik||0)+(+sonDeger.isKalitesi||0)+(+sonDeger.devamDisiplin||0)+(+sonDeger.ekipUyumu||0))/4:null;
  let skor=100;
  skor-=Math.min(40,metrik.ihlaller*5); // her hız ihlali -5 (en fazla -40)
  skor-=Math.min(30,olaylar.length*10); // her iş güvenliği olayı -10 (en fazla -30)
  if(tamamlamaOrani!=null)skor+=(tamamlamaOrani-0.8)*25; // %80 üzeri tamamlama bonus, altı ceza
  if(sonPuan!=null)skor+=(sonPuan-3)*5; // 5 üzerinden 3 nötr kabul edilir
  skor=Math.max(0,Math.min(100,Math.round(skor)));
  return{skor,metrik,olaySayisi:olaylar.length,tamamlamaOrani,sonPuan,isEmriSayisi:isEmirleri.length};
}

// Telegram Bot API tarayıcıdan doğrudan çağrılabilir (CORS'a izin verir), bu yüzden
// Telegram bildirimleri tek tıkla değil, gerçek anlamda otomatik gönderilir.
async function telegramMesajGonder(chatId,mesaj){
  const ayar=getSettings();
  if(!ayar.telegramBotToken||!chatId)return{basarili:false,hata:'Bot token veya sohbet kimliği eksik.'};
  try{
    const res=await fetch(`https://api.telegram.org/bot${ayar.telegramBotToken}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatId,text:mesaj,parse_mode:'HTML'}),
    });
    const data=await res.json();
    return data.ok?{basarili:true}:{basarili:false,hata:data.description||'Bilinmeyen hata'};
  }catch(e){return{basarili:false,hata:e.message||'Bağlantı hatası (internet/CORS)'};}
}
// Personelin Telegram'dan bota gönderdiği masraf mesajlarını/fotoğraflarını çeker.
// Not: Bu statik uygulamanın sürekli çalışan bir sunucusu olmadığından, Telegram
// mesajları gerçek zamanlı/otomatik olarak sisteme düşmez; bu fonksiyon çağrıldığında
// (yani "Telegram'dan Al" butonuna tıklandığında) o ana kadar birikmiş mesajları alır.
async function telegramGuncellemeleriAl(){
  const ayar=getSettings();
  if(!ayar.telegramBotToken)return{basarili:false,hata:"Önce Ayarlar > Bildirimler bölümünden Telegram Bot Token girin."};
  const offset=LS.getObj('telegramSonOffset',{v:0}).v||0;
  try{
    const res=await fetch(`https://api.telegram.org/bot${ayar.telegramBotToken}/getUpdates?offset=${offset+1}&timeout=0`);
    const data=await res.json();
    if(!data.ok)return{basarili:false,hata:data.description||'Telegram API hatası'};
    const updates=data.result||[];
    if(updates.length===0)return{basarili:true,yeni:0};
    const mevcut=LS.get('telegramMasrafBildirimleri');
    const yeniKayitlar=[];
    let sonOffset=offset;
    for(const u of updates){
      sonOffset=Math.max(sonOffset,u.update_id);
      const msg=u.message;
      if(!msg)continue;
      const gonderen=msg.from?`${msg.from.first_name||''}${msg.from.last_name?` ${msg.from.last_name}`:''}`.trim()||msg.from.username||'Bilinmeyen':'Bilinmeyen';
      const tarih=new Date((msg.date||Date.now()/1000)*1000).toISOString().slice(0,10);
      const kayit={id:uid(),telegramUpdateId:u.update_id,gonderen,tarih,mesaj:msg.text||msg.caption||'',durum:'bekliyor',dosyaUrl:null,tur:'metin'};
      const tutarEslesme=(msg.text||msg.caption||'').match(/(\d+[.,]?\d*)/);
      if(tutarEslesme)kayit.tutar=parseFloat(tutarEslesme[1].replace(',','.'));
      let fileId=null;
      if(msg.photo&&msg.photo.length){fileId=msg.photo[msg.photo.length-1].file_id;kayit.tur='foto';}
      else if(msg.document){fileId=msg.document.file_id;kayit.tur='belge';kayit.dosyaAdi=msg.document.file_name;}
      if(fileId){
        try{
          const fRes=await fetch(`https://api.telegram.org/bot${ayar.telegramBotToken}/getFile?file_id=${fileId}`);
          const fData=await fRes.json();
          if(fData.ok)kayit.dosyaUrl=`https://api.telegram.org/file/bot${ayar.telegramBotToken}/${fData.result.file_path}`;
        }catch(e){/* dosya alınamadı, metin/kayıt yine de eklenir */}
      }
      yeniKayitlar.push(kayit);
    }
    LS.set('telegramMasrafBildirimleri',[...yeniKayitlar,...mevcut]);
    LS.set('telegramSonOffset',{v:sonOffset});
    return{basarili:true,yeni:yeniKayitlar.length};
  }catch(e){return{basarili:false,hata:e.message||'Bağlantı hatası (internet/CORS)'};}
}
// ── Webhook Backend Entegrasyonu (opsiyonel) ──────────────────────────────────
// Ayarlar'da "Backend API URL" tanımlıysa, personelden gelen Telegram mesajları
// artık bu Worker/D1 backend'i üzerinden GERÇEK ZAMANLI olarak toplanır (webhook
// sayesinde uygulama kapalıyken bile). Tanımlı değilse eski davranış (yalnızca
// butona basınca Telegram'dan çekme) aynen çalışmaya devam eder.
const backendYapilandirildiMi=()=>{const a=getSettings();return!!(a.backendApiUrl&&a.backendApiKey);};
async function backendMasraflariGetir(){
  const a=getSettings();
  try{
    const res=await fetch(`${a.backendApiUrl}/api/masraflar`,{headers:{Authorization:`Bearer ${a.backendApiKey}`}});
    const data=await res.json();
    if(!res.ok)return{basarili:false,hata:data.hata||'Backend hatası'};
    const kayitlar=(data.kayitlar||[]).map(k=>({
      id:k.id,telegramUpdateId:k.telegram_update_id,gonderen:k.gonderen,tarih:k.tarih,mesaj:k.mesaj,
      tur:k.tur,tutar:k.tutar_tahmini,durum:k.durum,dosyaAdi:k.dosya_adi,
      dosyaUrl:k.dosya_yolu?`${a.backendApiUrl}/api/dosya?path=${encodeURIComponent(k.dosya_yolu)}&key=${encodeURIComponent(a.backendApiKey)}`:null,
    }));
    LS.set('telegramMasrafBildirimleri',kayitlar);
    return{basarili:true,yeni:kayitlar.filter(k=>k.durum==='bekliyor').length};
  }catch(e){return{basarili:false,hata:e.message||'Backend\'e ulaşılamadı.'};}
}
async function backendDurumGuncelle(id,durum){
  const a=getSettings();
  try{
    const res=await fetch(`${a.backendApiUrl}/api/masraflar/${id}`,{
      method:'PATCH',headers:{'Content-Type':'application/json',Authorization:`Bearer ${a.backendApiKey}`},
      body:JSON.stringify({durum}),
    });
    return res.ok;
  }catch(e){return false;}
}
// İş emri oluşturulunca ilgili personele ve muhasebeye bildirim gönderir/hazırlar.
async function isEmriBildirimGonder(kayit,personel){
  const ayar=getSettings();
  const per=personel.find(p=>p.id===kayit.opId);
  const mesaj=`📋 Yeni İş Emri\n${kayit.baslik}\n${kayit.aciklama?`Açıklama: ${kayit.aciklama}\n`:''}${kayit.olayYeri?`📍 Yer: ${kayit.olayYeri}\n`:''}Öncelik: ${kayit.oncelik==='kritik'?'🔴 Kritik':kayit.oncelik==='dusuk'?'⚪ Düşük':'🔵 Normal'}\nBitiş: ${fmtDate(kayit.bitis)}`;
  const whatsapp=[],telegram=[];
  if(per?.tel){const link=whatsappLinkOlustur(per.tel,mesaj);if(link)whatsapp.push({ad:per.ad,link});}
  if(ayar.whatsappMuhasebeTel){const link=whatsappLinkOlustur(ayar.whatsappMuhasebeTel,`💰 Muhasebe Bilgi — ${mesaj}`);if(link)whatsapp.push({ad:'Muhasebe',link});}
  if(per?.telegramChatId){const r=await telegramMesajGonder(per.telegramChatId,mesaj);telegram.push({ad:per.ad,...r});}
  if(ayar.telegramMuhasebeChatId){const r=await telegramMesajGonder(ayar.telegramMuhasebeChatId,`💰 Muhasebe Bilgi\n${mesaj}`);telegram.push({ad:'Muhasebe',...r});}
  return{whatsapp,telegram};
}

// ── Dışa Aktarma (CSV / Excel) ve Yazdırma ────────────────────────────────────
const downloadBlob=(content,filename,mime)=>{
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
const csvEscape=(v)=>{const s=String(v??'');return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
const exportCSV=(headers,rows,filename)=>{
  const lines=[headers.map(csvEscape).join(';'),...rows.map(r=>r.map(csvEscape).join(';'))];
  downloadBlob('\ufeff'+lines.join('\r\n'),filename,'text/csv;charset=utf-8;');
};
const exportXLSX=(headers,rows,filename,sheetName='Sayfa1')=>{
  if(!window.XLSX){fpToast('Excel kütüphanesi yüklenemedi. Lütfen CSV olarak dışa aktarın veya internet bağlantınızı kontrol edin.');return;}
  const ws=window.XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:16}));
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,sheetName);
  window.XLSX.writeFile(wb,filename);
};

// Pop-up engelleyicilerden etkilenmeyen, gizli iframe üzerinden yazdırma
const printHTMLDoc=(html)=>{
  const old=document.getElementById('fp-print-frame');
  if(old)old.remove();
  const ifr=document.createElement('iframe');
  ifr.id='fp-print-frame';
  Object.assign(ifr.style,{position:'fixed',right:'0',bottom:'0',width:'0',height:'0',border:'0',visibility:'hidden'});
  document.body.appendChild(ifr);
  const cleanup=()=>{setTimeout(()=>{if(ifr&&ifr.parentNode)ifr.parentNode.removeChild(ifr);},1000);};
  ifr.onload=()=>{
    try{ifr.contentWindow.focus();ifr.contentWindow.print();}
    catch(e){fpToast('Yazdırma başlatılamadı: '+(e?.message||'bilinmeyen hata'));}
    cleanup();
  };
  const doc=ifr.contentDocument||ifr.contentWindow.document;
  doc.open();doc.write(html);doc.close();
};

const buildInvoiceHTML=(f,hareketler)=>{
  const s=getSettings();
  const kalan=faturaKalan(f,hareketler);
  const durum=faturaDurum(f,hareketler);
  const durumLabel=FATURA_DURUM_LABEL[durum]||durum;
  const durumRenk=FATURA_DURUM_RENK[durum]||'#eab308';
  return `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>${f.no}</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;padding:40px;color:#111;max-width:800px;margin:0 auto;}
  .head{display:flex;justify-content:space-between;border-bottom:3px solid #f59e0b;padding-bottom:16px;margin-bottom:24px;}
  .firma{font-size:20px;font-weight:800;}
  .muted{color:#666;font-size:13px;margin-top:2px;}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:1px;}
  table{width:100%;border-collapse:collapse;margin-top:20px;}
  th,td{border:1px solid #ddd;padding:10px 12px;text-align:left;font-size:13px;}
  th{background:#f5f5f5;}
  .totals{margin-top:20px;width:300px;margin-left:auto;}
  .totals div{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
  .totals .grand{font-weight:800;font-size:17px;border-top:2px solid #111;padding-top:10px;margin-top:4px;}
  .status{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px;color:#fff;background:${durumRenk};}
</style></head><body>
<div class="head">
  <div>
    <div class="firma">${s.firmaAdi||''}</div>
    <div class="muted">${s.firmaAdres||''}</div>
    <div class="muted">${s.firmaTel||''}${s.firmaVergiNo?' · VKN: '+s.firmaVergiNo:''}${s.firmaVergiDaire?' · '+s.firmaVergiDaire:''}</div>
  </div>
  <div style="text-align:right;">
    <h1>${f.tur==='kesilen'?'FATURA':'ALIŞ FATURASI'}</h1>
    <div class="muted">No: <strong>${f.no}</strong></div>
    <div class="muted">Tarih: ${fmtDate(f.tarih)}</div>
    <div class="muted">Vade: ${fmtDate(f.vadeTarih)}</div>
  </div>
</div>
<div><strong>${f.tur==='kesilen'?'Müşteri':'Tedarikçi'}:</strong> ${cariAd(f)}</div>
${f.aciklama?`<div class="muted">${f.aciklama}</div>`:''}
<table><thead><tr><th>Açıklama</th><th style="text-align:right;">Tutar</th></tr></thead>
<tbody><tr><td>${f.aciklama||(f.tur==='kesilen'?'Hizmet/Satış Bedeli':'Alış Bedeli')}</td><td style="text-align:right;">${fmtTL(f.tutar)}</td></tr></tbody></table>
<div class="totals">
  <div><span>Ara Toplam</span><span>${fmtTL(f.tutar)}</span></div>
  <div><span>KDV</span><span>${fmtTL(f.kdv)}</span></div>
  <div class="grand"><span>Genel Toplam</span><span>${fmtTL(f.toplam)}</span></div>
  <div><span>Ödenen</span><span>${fmtTL((+f.toplam||0)-kalan)}</span></div>
  <div><span>Kalan</span><span>${fmtTL(kalan)}</span></div>
</div>
<div><span class="status">Durum: ${durumLabel}</span></div>
</body></html>`;
};
const printInvoice=(f,hareketler)=>{
  try{printHTMLDoc(buildInvoiceHTML(f,hareketler));}
  catch(e){fpToast('Fatura yazdırılamadı: '+(e?.message||'bilinmeyen hata'));}
};
function recordHareket({hesapId,tur,tutar,tarih,aciklama,kategori,musteriId,tedarikciId,personelId,faturaId,yontem}){
  const hareketler=LS.get('kasaHareketleri');
  const pre=kategori==='tahsilat'?'TAH':kategori==='odeme'?'ODE':'KH';
  const yeni={id:uid(),hesapId,tur,tutar:+tutar||0,tarih:tarih||today(),aciklama,belgeNo:yeniHareketNo(hareketler,pre),kategori:kategori||'diger',musteriId:musteriId||null,tedarikciId:tedarikciId||null,personelId:personelId||null,faturaId:faturaId||null,yontem:yontem||'nakit'};
  const nH=[...hareketler,yeni];LS.set('kasaHareketleri',nH);
  const hesaplar=LS.get('hesaplar');
  const nA=hesaplar.map(h=>h.id===hesapId?{...h,bakiye:(+h.bakiye||0)+(tur==='giris'?(+tutar||0):-(+tutar||0))}:h);
  LS.set('hesaplar',nA);
  return{hareketler:nH,hesaplar:nA};
}

// ── Geçiş: ayrı "Müşteriler" ve "Tedarikçiler" listelerini tek "Cariler" listesine birleştirir ──
// Aynı isimli kayıtlar (örn. hem müşteri hem tedarikçi olan bir firma) tek cari kartında toplanır.
// Tedarikçiye ait eski ID'ler faturalar/kasaHareketleri/isemirleri kayıtlarında yeni cari ID'siyle güncellenir.
function migrateCariBirlestir(){
  if(localStorage.getItem('fp_cari_migration'))return;
  if(localStorage.getItem('cariler')){localStorage.setItem('fp_cari_migration','1');return;}
  const eskiMusteriler=LS.get('musteriler',[]);
  const eskiTedarikciler=LS.get('tedarikciler',[]);
  const normAd=(s)=>(s||'').trim().toLocaleLowerCase('tr-TR');
  const cariler=eskiMusteriler.map(m=>({...m,tipler:['musteri']}));
  const idMap={}; // eski tedarikçi id -> yeni/birleşmiş cari id
  eskiTedarikciler.forEach(t=>{
    const eslesen=cariler.find(c=>normAd(c.ad)===normAd(t.ad));
    if(eslesen){
      if(!eslesen.tipler.includes('tedarikci'))eslesen.tipler.push('tedarikci');
      idMap[t.id]=eslesen.id;
    }else{
      const yeniId=uid();
      cariler.push({...t,id:yeniId,tipler:['tedarikci']});
      idMap[t.id]=yeniId;
    }
  });
  LS.set('cariler',cariler);
  const remap=(id)=>id!=null&&idMap[id]!==undefined?idMap[id]:id;
  const faturalar=LS.get('faturalar',[]).map(f=>f.tedarikciId!=null?{...f,tedarikciId:remap(f.tedarikciId)}:f);
  LS.set('faturalar',faturalar);
  const kasaHareketleri=LS.get('kasaHareketleri',[]).map(h=>h.tedarikciId!=null?{...h,tedarikciId:remap(h.tedarikciId)}:h);
  LS.set('kasaHareketleri',kasaHareketleri);
  const isemirleri=LS.get('isemirleri',[]).map(i=>i.cariTipi==='tedarikci'&&i.cariId!=null?{...i,cariId:remap(i.cariId)}:i);
  LS.set('isemirleri',isemirleri);
  localStorage.removeItem('musteriler');
  localStorage.removeItem('tedarikciler');
  localStorage.setItem('fp_cari_migration','1');
}

// ── Geçiş: Forklift ve Menlift saha servis tiplerini mevcut ayarlara ekler ─────
function migrateSahaServisTipleriEkle(){
  if(localStorage.getItem('fp_saha_servis_v2'))return;
  const s=getSettings();
  const mevcut=Array.isArray(s.sahaServisTipleri)?s.sahaServisTipleri:[];
  const eksikler=[{id:'forklift',icon:'🏭',label:'Forklift'},{id:'menlift',icon:'🪜',label:'Menlift'}].filter(e=>!mevcut.some(m=>m.id===e.id));
  if(eksikler.length)saveSettings({...s,sahaServisTipleri:[...mevcut,...eksikler]});
  localStorage.setItem('fp_saha_servis_v2','1');
}

// ── Ortak Uyarı Hesaplama (Dashboard + Bildirim Zili) ─────────────────────────
function getSistemUyarilari(){
  const araclar=LS.get('araclar'),bakimlar=LS.get('bakimlar'),isemirleri=LS.get('isemirleri'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri');
  const eK=esikKritik(),eU=esikUyari(),bakimSaatEsik=getSettings().bakimSaatUyariEsigi??50,bakimKmEsik=getSettings().bakimKmUyariEsigi??500;
  const list=[];
  araclar.forEach(a=>{
    const sg=daysLeft(a.sigorta),mu=daysLeft(a.muayene);
    if(a.sigorta&&sg<=eU)list.push({tip:'Sigorta',baslik:`${a.ad} — sigorta`,gun:sg,c:sg<=eK?C.red:C.yellow,icon:'🛡️'});
    if(a.muayene&&mu<=eU)list.push({tip:'Muayene',baslik:`${a.ad} — muayene`,gun:mu,c:mu<=eK?C.red:C.yellow,icon:'🔍'});
    if(a.sonrakiBakimSaat){const kalanSaat=+a.sonrakiBakimSaat-(+a.saat||0);if(kalanSaat<=bakimSaatEsik)list.push({tip:'Bakım (Saat)',baslik:`${a.ad} — bakıma ${kalanSaat<=0?'süresi geçti':`${kalanSaat} sa kaldı`}`,gun:kalanSaat<=0?-1:Math.ceil(kalanSaat/8),c:kalanSaat<=0?C.red:C.yellow,icon:'⏲️'});}
    if(a.sonrakiBakimKm){const kalanKm=+a.sonrakiBakimKm-(+a.km||0);if(kalanKm<=bakimKmEsik)list.push({tip:'Bakım (Km)',baslik:`${a.ad} — bakıma ${kalanKm<=0?'süresi geçti':`${kalanKm} km kaldı`}`,gun:kalanKm<=0?-1:Math.ceil(kalanKm/250),c:kalanKm<=0?C.red:C.yellow,icon:'🛣️'});}
  });
  bakimlar.filter(b=>b.durum==='bekliyor').forEach(b=>{const a=araclar.find(x=>x.id===b.aracId);list.push({tip:'Bakım',baslik:`${a?.ad||'—'} — ${b.tur||'bakım'} bekliyor`,gun:daysLeft(b.tarih),c:C.yellow,icon:'🔧'});});
  isemirleri.filter(i=>i.durum!=='tamamlandi'&&i.oncelik==='acil').forEach(i=>{list.push({tip:'İş Emri',baslik:`${i.baslik} (acil)`,gun:daysLeft(i.tarih),c:C.red,icon:'📌'});});
  (faturalar||[]).forEach(f=>{if(faturaDurum(f,hareketler)==='vadesiGecti')list.push({tip:'Fatura',baslik:`${cariAd(f)} — vadesi geçti`,gun:daysLeft(f.vadeTarih),c:C.red,icon:'💸'});});
  return list.sort((a,b)=>a.gun-b.gun);
}

function Badge({d}){
  const m={aktif:[C.green,'Aktif'],bakimda:[C.yellow,'Bakımda'],hurda:[C.red,'Hurda'],tamamlandi:[C.green,'Tamamlandı'],bekliyor:[C.yellow,'Bekliyor'],planli:[C.blue,'Planlı'],acik:[C.red,'Açık'],devamediyor:[C.yellow,'Devam'],kapandi:[C.green,'Kapandı'],kritik:[C.red,'Kritik'],normal:[C.blue,'Normal'],dusuk:[C.muted,'Düşük'],pasif:[C.muted,'Pasif'],odendi:[C.green,'Ödendi'],kismiOdendi:[C.orange,'Kısmi Ödendi'],vadesiGecti:[C.red,'Vadesi Geçti'],iptal:[C.red,'İptal'],gelir:[C.green,'Gelir'],gider:[C.red,'Gider'],kesilen:[C.blue,'Kesilen'],alinan:[C.purple,'Alınan'],tahsilat:[C.green,'Tahsilat'],odeme:[C.red,'Ödeme'],};
  const[c,l]=m[d]||[C.muted,d];
  return <span style={S.badge(c)}>{l}</span>;
}
function Warn({msg,c=C.yellow}){return <div style={S.alert(c)}>⚠️ {msg}</div>;}
function FG({label,children}){return <div style={S.fg}><label style={S.lbl}>{label}</label>{children}</div>;}
// Tutar + KDV Oranı (%) giriş alanı: KDV, tutar üzerinden % olarak girilir, ₺ tutar otomatik hesaplanır.
// Örn: Tutar 1000, KDV Oranı %20 girilince KDV tutarı 200₺, Toplam 1200₺ olarak hesaplanır ve form.kdv (₺) alanına yazılır.
function TutarKdvAlani({form,setForm,tutarLabel='Tutar (₺, KDV hariç)'}){
  const oran=form.kdvOran??getSettings().kdvOrani??20;
  const tutar=+form.tutar||0;
  const kdvTutari=Math.round(tutar*oran)/100;
  const toplam=tutar+kdvTutari;
  return (<>
    <div style={S.g2}>
      <FG label={tutarLabel}><input type="number" style={S.inp} value={form.tutar??''} onChange={e=>{const t=+e.target.value;setForm(f=>({...f,tutar:t,kdvOran:oran,kdv:Math.round(t*oran)/100}));}}/></FG>
      <FG label="KDV Oranı (%)"><input type="number" style={S.inp} value={form.kdvOran??oran} onChange={e=>{const o=+e.target.value;setForm(f=>({...f,kdvOran:o,kdv:Math.round(tutar*o)/100}));}}/></FG>
    </div>
    <div style={S.alert(C.accent)}>KDV Tutarı: <strong>{fmtTL(kdvTutari)}</strong> &nbsp;|&nbsp; Toplam: <strong>{fmtTL(toplam)}</strong></div>
  </>);
}
function StatCard({color,value,label,sub}){return(<div style={S.stat(color)}><div style={S.statVal}>{value}</div><div style={S.statLbl}>{label}</div>{sub&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}</div>);}
function InfoBox({color=C.blue,children}){return <div style={{background:`${color}12`,border:`1px solid ${color}33`,borderRadius:8,padding:'10px 14px',fontSize:12,color,marginBottom:14}}>{children}</div>;}
function ProgressBar({value,max,color}){const p=max>0?Math.min(100,Math.round((value/max)*100)):0;const c=p>85?C.red:p>60?C.yellow:(color||C.green);return(<div><div style={{background:C.input,borderRadius:4,height:6,overflow:'hidden'}}><div style={{width:`${p}%`,height:'100%',background:c,transition:'width .3s'}}/></div><div style={{fontSize:11,color:C.muted,marginTop:4,textAlign:'right'}}>%{p}</div></div>);}
function Toggle({value,onChange}){return(<div style={{width:36,height:20,borderRadius:10,background:value?C.green:C.border,cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}} onClick={()=>onChange(!value)}><div style={{position:'absolute',width:14,height:14,borderRadius:7,background:C.white,top:3,left:value?19:3,transition:'left .2s'}}/></div>);}
function TabBar({tabs,active,onChange}){return(<div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>{tabs.map(([k,l])=>(<button key={k} style={{...S.btn(active===k?C.accent:'transparent'),border:`1px solid ${active===k?C.accent:C.border}`,color:active===k?'#000':C.muted,fontSize:12}} onClick={()=>onChange(k)}>{l}</button>))}</div>);}
function Modal({onClose,title,children,width=560}){return(<div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={S.mbox}><div style={{...S.secTitle,fontSize:15,marginBottom:18}}>{title}</div>{children}</div></div>);}

// Listede olmayan müşteri/tedarikçiyi hızlıca eklemek için kullanılan minik modal.
// tip: 'musteri' | 'tedarikci'. onEklendi(yeniKayit, guncelListe) ekleme başarılı olunca çağrılır.
function HizliCariEkle({tip,onClose,onEklendi}){
  const baslik=tip==='tedarikci'?'Tedarikçi':'Müşteri';
  const [ad,setAd]=useState(''),[yetkili,setYetkili]=useState(''),[tel,setTel]=useState('');
  const ekle=()=>{
    if(!ad.trim()){fpToast(`${baslik} adı zorunludur.`);return;}
    const liste=LS.get('cariler');
    const normAd=(s)=>(s||'').trim().toLocaleLowerCase('tr-TR');
    const mevcut=liste.find(c=>normAd(c.ad)===normAd(ad));
    let yeni,n;
    if(mevcut){
      // Aynı isimde cari zaten varsa, yeni kayıt açmak yerine bu tipi mevcut cariye ekler (örn. hem müşteri hem tedarikçi).
      yeni={...mevcut,tipler:[...new Set([...(mevcut.tipler||[]),tip])]};
      n=liste.map(c=>c.id===mevcut.id?yeni:c);
      fpToast(`"${mevcut.ad}" zaten kayıtlıydı, ${baslik.toLowerCase()} olarak da işaretlendi.`,'info');
    }else{
      yeni={id:uid(),ad:ad.trim(),yetkili:yetkili.trim(),tel:tel.trim(),email:'',adres:'',vergiNo:'',vergiDaire:'',notlar:'',tipler:[tip]};
      n=[...liste,yeni];
    }
    LS.set('cariler',n);
    onEklendi(yeni,n);
  };
  return(<Modal title={`＋ Hızlı ${baslik} Ekle`} onClose={onClose} width={420}>
    <FG label={`${baslik} Adı / Ünvanı`}><input style={S.inp} autoFocus value={ad} onChange={e=>setAd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ekle()}/></FG>
    <div style={S.g2}><FG label="Yetkili Kişi"><input style={S.inp} value={yetkili} onChange={e=>setYetkili(e.target.value)}/></FG><FG label="Telefon"><input style={S.inp} value={tel} onChange={e=>setTel(e.target.value)}/></FG></div>
    <div style={{fontSize:11,color:C.muted,marginTop:2}}>E-posta, vergi no, adres gibi diğer bilgileri daha sonra Cariler sayfasından tamamlayabilirsiniz.</div>
    <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:14}}><button style={S.btnO} onClick={onClose}>İptal</button><button style={S.btn()} onClick={ekle}>Ekle</button></div>
  </Modal>);
}

// ── Genel Dışa Aktarma Menüsü (CSV / Excel) ───────────────────────────────────
function ExportMenu({headers,rows,filename,sheetName='Sayfa1'}){
  const [open,setOpen]=useState(false);
  const csvIndir=()=>{if(!rows.length){fpToast('Dışa aktarılacak kayıt yok.');return;}exportCSV(headers,rows,`${filename}.csv`);setOpen(false);};
  const xlsxIndir=()=>{if(!rows.length){fpToast('Dışa aktarılacak kayıt yok.');return;}exportXLSX(headers,rows,`${filename}.xlsx`,sheetName);setOpen(false);};
  return(<div style={{position:'relative'}}>
    <button style={S.btnO} onClick={()=>setOpen(o=>!o)}>⬇ Dışa Aktar {open?'▲':'▼'}</button>
    {open&&(<>
      <div style={{position:'fixed',inset:0,zIndex:19}} onClick={()=>setOpen(false)}/>
      <div style={{position:'absolute',top:'110%',right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:20,minWidth:180,boxShadow:'0 6px 18px rgba(0,0,0,.4)'}} className="fp-fade">
        <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text}} onClick={csvIndir}>📄 CSV olarak indir ({rows.length})</div>
        <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text,borderTop:`1px solid ${C.border}22`}} onClick={xlsxIndir}>📊 Excel (.xlsx) olarak indir ({rows.length})</div>
      </div>
    </>)}
  </div>);
}

// ── Basit Form Doğrulama Yardımcıları ─────────────────────────────────────────
const validate=(form,kurallar)=>{
  // kurallar: {alan:[fn(form)=>true|false, mesaj]}
  for(const alan in kurallar){
    const [fn,mesaj]=kurallar[alan];
    if(!fn(form))return mesaj;
  }
  return null;
};
function FormError({msg}){if(!msg)return null;return<div style={S.alert(C.red)}>⚠️ {msg}</div>;}

function LiveClock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000*30);return()=>clearInterval(id);},[]);
  return(<div className="fp-liveclock" style={{display:'flex',flexDirection:'column',alignItems:'flex-end',marginRight:2}}>
    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{t.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>
    <div style={{fontSize:10,color:C.muted}}>{t.toLocaleDateString('tr-TR',{day:'2-digit',month:'short',weekday:'short'})}</div>
  </div>);
}

  useEffect(()=>{
    const refresh=()=>setUyarilar(getSistemUyarilari());
    window.addEventListener('fp-settings-changed',refresh);
    const id=setInterval(refresh,60000);
    return()=>{window.removeEventListener('fp-settings-changed',refresh);clearInterval(id);};

      {uyarilar.length>0&&<span className={kritikSayi>0?'fp-pulse':''} style={{position:'absolute',top:-4,right:-4,background:kritikSayi>0?C.red:C.yellow,color:'#000',fontSize:10,fontWeight:800,borderRadius:10,minWidth:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{uyarilar.length>99?'99+':uyarilar.length}</span>}

      <div style={{position:'fixed',inset:0,zIndex:19}} onClick={()=>setOpen(false)}/>

        <div style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}`,fontWeight:700,fontSize:13,color:C.white,display:'flex',justifyContent:'space-between'}}><span>🔔 Bildirimler</span><span style={{color:C.muted,fontWeight:400}}>{uyarilar.length} adet</span></div>
        {uyarilar.length===0?<div style={{padding:16,fontSize:13,color:C.muted,textAlign:'center'}}>Şu an aktif bir uyarı yok ✅</div>:uyarilar.slice(0,15).map((u,i)=>(
          <div key={i} style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}22`,display:'flex',gap:9,alignItems:'flex-start'}}>

function GlobalSearch({onNavigate}){
  const [q,setQ]=useState(''),[open,setOpen]=useState(false);
  const results=useMemo(()=>{
    if(q.trim().length<1)return[];
    const s=q.trim().toLocaleLowerCase('tr-TR');
    const out=[];
    LS.get('araclar').forEach(a=>{if((a.ad||'').toLocaleLowerCase('tr-TR').includes(s)||(a.plaka||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'Araç',icon:'🚜',label:`${a.ad} ${a.plaka?'· '+a.plaka:''}`,page:'arac'});});
    LS.get('personel').forEach(o=>{if((o.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'Personel',icon:'🧑‍💼',label:o.ad,page:'ik'});});
    LS.get('isemirleri').forEach(i=>{if((i.baslik||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'İş Emri',icon:'📌',label:i.baslik,page:'isemri'});});
    LS.get('projeler').forEach(p=>{if((p.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'Proje',icon:'🏗️',label:p.ad,page:'proje'});});
    LS.get('cariler').forEach(c=>{if((c.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:(c.tipler||[]).includes('tedarikci')&&!(c.tipler||[]).includes('musteri')?'Tedarikçi':'Müşteri',icon:'🧾',label:c.ad,page:'muhasebe'});});
    return out.slice(0,8);
  },[q]);
  return(<div style={{position:'relative',flex:'0 1 260px',minWidth:120}}>
    <input style={{...S.inp,padding:'7px 12px 7px 30px',fontSize:12.5}} placeholder="Ara... (araç, personel, iş emri)" value={q}
      onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>
    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:12,color:C.muted,pointerEvents:'none'}}>🔍</span>
    {open&&q.trim()&&(<>
      <div style={{position:'fixed',inset:0,zIndex:19}} onClick={()=>setOpen(false)}/>
      <div style={{position:'absolute',left:0,top:'calc(100% + 6px)',width:'min(320px,90vw)',background:C.card,border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 10px 30px -8px rgba(0,0,0,.6)',zIndex:20,maxHeight:320,overflowY:'auto'}} className="fp-fade">
        {results.length===0?<div style={{padding:14,fontSize:12.5,color:C.muted,textAlign:'center'}}>Sonuç bulunamadı.</div>:results.map((r,i)=>(
          <div key={i} style={{padding:'9px 13px',borderBottom:`1px solid ${C.border}22`,display:'flex',gap:8,alignItems:'center',cursor:'pointer'}}
            onClick={()=>{onNavigate(r.page);setOpen(false);setQ('');}}>
            <span style={{fontSize:14}}>{r.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12.5,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.label}</div>
              <div style={{fontSize:10,color:C.muted}}>{r.tip}</div>
            </div>
          </div>
        ))}
      </div>
    </>)}
  </div>);
}

const fpNav=(pageId)=>window.dispatchEvent(new CustomEvent('fp-navigate',{detail:pageId}));

function Dashboard(){
  const araclar=LS.get('araclar'),bakimlar=LS.get('bakimlar'),yakitlar=LS.get('yakitlar'),personel=LS.get('personel'),gelirGider=LS.get('gelirGider'),isemirleri=LS.get('isemirleri'),izinler=LS.get('izinler'),mesailer=LS.get('mesailer'),adaylar=LS.get('adaylar'),isGuvenligiOlaylari=LS.get('isGuvenligiOlaylari');
  const cariler=LS.get('cariler'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri'),gorevler=LS.get('gorevler'),islemLoglari=LS.get('islemLoglari'),konumlar=LS.get('konumlar')||[];
  const degerlendirmeler=LS.get('degerlendirmeler');
  const aktifArac=araclar.filter(a=>a.durum==='aktif').length,bakimdaArac=araclar.filter(a=>a.durum==='bakimda').length,hurdaArac=araclar.filter(a=>a.durum==='hurda').length,bekleyenBakim=bakimlar.filter(b=>b.durum==='bekliyor').length;
  const buAyYakit=yakitlar.filter(y=>y.tarih?.startsWith(today().slice(0,7))).reduce((s,y)=>s+(+y.toplam||0),0);
  const buAyGelir=gelirGider.filter(g=>g.tur==='gelir'&&g.tarih?.startsWith(today().slice(0,7))).reduce((s,g)=>s+(+g.tutar||0),0);
  const buAyGider=gelirGider.filter(g=>g.tur==='gider'&&g.tarih?.startsWith(today().slice(0,7))).reduce((s,g)=>s+(+g.tutar||0),0);
  const uyarilar=getSistemUyarilari();
  const acikIsler=isemirleri.filter(i=>i.durum!=='tamamlandi');
  const hasRC=!!RC.LineChart;
  const aylikVeri=months().map(ay=>{
    const g=gelirGider.filter(x=>x.tarih?.startsWith(ay)&&x.tur==='gelir').reduce((s,x)=>s+(+x.tutar||0),0);
    const gi=gelirGider.filter(x=>x.tarih?.startsWith(ay)&&x.tur==='gider').reduce((s,x)=>s+(+x.tutar||0),0);
    return{ay:fmtMonth(ay).split(' ')[0],net:g-gi};
  });
  const yakitAylikVeri=months().map(ay=>({ay:fmtMonth(ay).split(' ')[0],yakit:yakitlar.filter(y=>y.tarih?.startsWith(ay)).reduce((s,y)=>s+(+y.toplam||0),0)}));
  const filoDagilim=[{name:'Aktif',value:aktifArac,c:C.green},{name:'Bakımda',value:bakimdaArac,c:C.yellow},{name:'Hurda',value:hurdaArac,c:C.red}].filter(f=>f.value>0);
  const enCokCalisanlar=[...araclar].sort((a,b)=>(+b.saat||0)-(+a.saat||0)).slice(0,5);
  const tooltipStyle={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,color:C.text};
  // Açık alacak/borç: her cariyi kendi tipine (müşteri/tedarikçi) göre bakiye hesabına sokar, ikisi de olabilir.
  let toplamAlacak=0,toplamBorc=0;
  cariler.forEach(c=>{
    if((c.tipler||[]).includes('musteri'))toplamAlacak+=Math.max(0,musteriBakiye(c.id,faturalar,hareketler).bakiye);
    if((c.tipler||[]).includes('tedarikci'))toplamBorc+=Math.max(0,tedarikciBakiye(c.id,faturalar,hareketler).bakiye);
  });
  const acikGorevler=gorevler.filter(g=>g.durum!=='tamamlandi');
  const gecikenGorevler=gorevler.filter(g=>g.durum!=='tamamlandi'&&g.bitis&&daysLeft(g.bitis)<0);
  const canliKonumAktif=konumlar.filter(k=>(Date.now()-new Date(k.guncellendi).getTime())/60000<30).length;
  const sonIslemler=[...islemLoglari].slice(0,6);
  // En çok çalışan personel: onaylı mesai kayıtlarındaki çalışılan saatler personel bazında toplanır.
  const personelSaatMap={};
  mesailer.filter(m=>m.durum==='onaylandi').forEach(m=>{personelSaatMap[m.personelId]=(personelSaatMap[m.personelId]||0)+(+m.calisilanSaat||0);});
  const enCokCalisanPersonel=Object.entries(personelSaatMap).map(([pid,saat])=>({ad:personel.find(p=>p.id===idVal(pid))?.ad||'—',saat})).filter(p=>p.ad!=='—').sort((a,b)=>b.saat-a.saat).slice(0,5);
  // Ayın personeli: her personelin EN SON değerlendirmesindeki 4 puanın (verimlilik, iş
  // kalitesi, devam/disiplin, ekip uyumu) ortalaması esas alınır — ömür boyu ortalama değil,
  // güncel/en taze performans. En yüksek puanlı aktif personel öne çıkarılır.
  const sonDegerlendirmeMap={};
  [...degerlendirmeler].sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||'')).forEach(d=>{sonDegerlendirmeMap[d.personelId]=d;});
  const ayinPersoneli=Object.values(sonDegerlendirmeMap).map(d=>({p:personel.find(x=>x.id===idVal(d.personelId)),puan:((+d.verimlilik||0)+(+d.isKalitesi||0)+(+d.devamDisiplin||0)+(+d.ekipUyumu||0))/4,tarih:d.tarih})).filter(x=>x.p&&x.p.durum==='aktif').sort((a,b)=>b.puan-a.puan)[0];
  const KART=({children,onClick,...p})=><div style={{...S.card,...(onClick?{cursor:'pointer'}:{})}} onClick={onClick} {...p}>{children}</div>;
  return(<div className="fp-fade">
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
      <button style={S.btn()} onClick={()=>fpNav('isemri')}>📌 İş Emri Oluştur</button>
      <button style={S.btnO} onClick={()=>fpNav('gorevler')}>✅ Görev Ekle</button>
      <button style={S.btnO} onClick={()=>fpNav('muhasebe')}>💵 Tahsilat / Ödeme</button>
      <button style={S.btnO} onClick={()=>fpNav('konum')}>📍 Canlı Konum</button>
      <button style={S.btnO} onClick={()=>fpNav('arac')}>🚜 Araç Yönetimi</button>
    </div>
    <div style={S.g4}>
      <StatCard color={C.green} value={aktifArac} label="Aktif Araç" sub={`${araclar.length} toplam`}/>
      <StatCard color={C.yellow} value={bakimdaArac} label="Bakımda" sub={`${bekleyenBakim} bekleyen bakım`}/>
      <StatCard color={C.accent} value={fmtTL(buAyYakit)} label="Bu Ay Yakıt"/>
      <StatCard color={buAyGelir-buAyGider>=0?C.green:C.red} value={fmtTL(buAyGelir-buAyGider)} label="Bu Ay Net" sub={`G:${fmtTL(buAyGelir)} / G:${fmtTL(buAyGider)}`}/>
    </div>
    <div style={S.g4}>
      <StatCard color={C.yellow} value={fmtTL(toplamAlacak)} label="Toplam Açık Alacak"/>
      <StatCard color={C.red} value={fmtTL(toplamBorc)} label="Toplam Açık Borç"/>
      <StatCard color={C.blue} value={acikGorevler.length} label="Açık Görev" sub={gecikenGorevler.length>0?`${gecikenGorevler.length} gecikmiş`:'Gecikmiş yok'}/>
      <StatCard color={C.green} value={canliKonumAktif} label="Canlı Konum Paylaşan" sub="Son 30 dk"/>
    </div>

function AraclarListesi(){

      <div style={S.g2}><FG label="Sigorta Bitiş"><input type="date" style={S.inp} value={form.sigorta||''} onChange={e=>setForm(f=>({...f,sigorta:e.target.value}))}/></FG><FG label="Muayene Bitiş"><input type="date" style={S.inp} value={form.muayene||''} onChange={e=>setForm(f=>({...f,muayene:e.target.value}))}/></FG></div>

      <FG label="Dökümanlar (Ruhsat, Sigorta Poliçesi vb.)">
        <input type="file" style={S.inp} onChange={e=>{const dosya=e.target.files[0];if(!dosya)return;const r=new FileReader();r.onload=()=>{setForm(f=>({...f,dokumanlar:[...(f.dokumanlar||[]),{id:uid(),ad:dosya.name,veri:r.result,tarih:today()}]}));};r.readAsDataURL(dosya);}}/>
        {(form.dokumanlar||[]).length>0&&<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>{form.dokumanlar.map(b=>(<div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,background:C.input,borderRadius:6,padding:'6px 10px'}}><a href={b.veri} download={b.ad} style={{color:C.accent,textDecoration:'none'}}>📎 {b.ad}</a><button style={S.btnR} onClick={()=>setForm(f=>({...f,dokumanlar:f.dokumanlar.filter(x=>x.id!==b.id)}))}>🗑</button></div>))}</div>}

const IZIN_TUR_LABEL={yillik:'Yıllık İzin',mazeret:'Mazeret İzni',hastalik:'Rapor / Hastalık',ucretsiz:'Ücretsiz İzin'};
const normalMesaiSaat=()=>getSettings().normalMesaiSaat??9; // Günlük standart mesai eşiği (Ayarlar > Genel'den değiştirilebilir)
const aylikOrtSaat=()=>getSettings().aylikOrtSaat??225; // Saatlik ücret hesaplamasında kullanılan aylık ortalama çalışma saati
const mesaiZamKatsayisi=()=>1+((getSettings().mesaiZamOrani??50)/100);
const saatlikUcret=(maas)=>(+maas||0)/aylikOrtSaat();
const mesaiUcreti=(maas,mesaiSaat)=>Math.round(saatlikUcret(maas)*mesaiZamKatsayisi()*(+mesaiSaat||0)); // Fazla mesai zam oranı Ayarlar'dan gelir
const saatFarki=(giris,cikis)=>{if(!giris||!cikis)return 0;const g=new Date(`2000-01-01T${giris}`),c=new Date(`2000-01-01T${cikis}`);let fark=(c-g)/3600000;if(fark<0)fark+=24;return Math.round(fark*10)/10;};
const izinKullanilanGun=(personelId,izinler)=>(izinler||LS.get('izinler')).filter(i=>i.personelId===personelId&&i.durum==='onaylandi'&&i.tur==='yillik').reduce((s,i)=>s+(+i.gun||0),0);
const izinBakiye=(p,izinler)=>Math.max(0,((+p.izinHakki||0)+(+p.devredenIzin||0))-izinKullanilanGun(p.id,izinler));

// ── Bordro: Basitleştirilmiş 2026 Gelir/Damga Vergisi Yardımcıları ─────────────
// NOT: Bu hesaplamalar yaklaşık/örnek dilimlerle yapılır; kesin tutar için mali müşavire danışılmalıdır.
const GELIR_VERGISI_DILIMLERI=[
  {sinir:110000,oran:0.15},{sinir:230000,oran:0.20},{sinir:870000,oran:0.27},{sinir:3000000,oran:0.35},{sinir:Infinity,oran:0.40},
];
const yillikGelirVergisi=(yillikMatrah)=>{
  let kalan=Math.max(0,+yillikMatrah||0),vergi=0,oncekiSinir=0;
  for(const d of GELIR_VERGISI_DILIMLERI){
    const dilimGenisligi=d.sinir-oncekiSinir;
    const buDilim=Math.min(kalan,dilimGenisligi);
    if(buDilim<=0)break;
    vergi+=buDilim*d.oran;kalan-=buDilim;oncekiSinir=d.sinir;
    if(kalan<=0)break;
  }
  return Math.round(vergi);
};
const DAMGA_VERGISI_ORANI=()=>(getSettings().damgaVergisiOrani??0.759)/100;
const SGK_ISCI_ORANI=()=>(getSettings().sgkIsciOrani??14)/100, SGK_ISVEREN_ORANI=()=>(getSettings().sgkIsverenOrani??22.5)/100, ISSIZLIK_ISCI_ORANI=()=>(getSettings().issizlikIsciOrani??1)/100, ISSIZLIK_ISVEREN_ORANI=()=>(getSettings().issizlikIsverenOrani??2)/100;
// Aylık brüt maaştan basitleştirilmiş kesintiler (kümülatif matrah dikkate alınmadan, tek aylık dilim üzerinden yaklaşık hesap)
const bordroHesapla=(brutMaas,ekOdeme=0,kesinti=0,mesaiTutari=0)=>{
  const brut=(+brutMaas||0)+(+ekOdeme||0)+(+mesaiTutari||0);
  const sgkIsci=Math.round(brut*SGK_ISCI_ORANI()),issizlikIsci=Math.round(brut*ISSIZLIK_ISCI_ORANI());
  const gvMatrah=Math.max(0,brut-sgkIsci-issizlikIsci);
  const gelirVergisi=Math.round(yillikGelirVergisi(gvMatrah*12)/12);
  const damgaVergisi=Math.round(brut*DAMGA_VERGISI_ORANI());
  const sgkIsveren=Math.round(brut*SGK_ISVEREN_ORANI()),issizlikIsveren=Math.round(brut*ISSIZLIK_ISVEREN_ORANI());
  const netOdenen=brut-sgkIsci-issizlikIsci-gelirVergisi-damgaVergisi-(+kesinti||0);
  const toplamMaliyet=brut+sgkIsveren+issizlikIsveren;
  return{brut,sgkIsci,issizlikIsci,gelirVergisi,damgaVergisi,sgkIsveren,issizlikIsveren,netOdenen:Math.round(netOdenen),toplamMaliyet:Math.round(toplamMaliyet)};
};

function GirisCikis(){
  const personel=LS.get('personel').filter(p=>p.durum!=='pasif');
  const [pin,setPin]=useState(''),[mesaj,setMesaj]=useState(null);
  const acikKayitAl=(personelId)=>{const mesailer=LS.get('mesailer');return mesailer.find(m=>m.personelId===personelId&&!m.cikisSaat);};
  const girisYap=(p)=>{
    const acik=acikKayitAl(p.id);
    if(acik){setMesaj({tip:'uyari',metin:`${p.ad} için zaten açık bir giriş kaydı var (${acik.girisSaat}).`});return;}
    const simdi=new Date(),saat=simdi.toTimeString().slice(0,5);
    const mesailer=LS.get('mesailer');
    const kayit={id:uid(),personelId:p.id,tarih:today(),girisSaat:saat,cikisSaat:null,calisilanSaat:0,normalSaat:0,mesaiSaat:0,durum:'bekliyor',notlar:'QR/PIN ile giriş'};
    LS.set('mesailer',[...mesailer,kayit]);
    setMesaj({tip:'basari',metin:`✅ ${p.ad} — giriş saati ${saat} olarak kaydedildi.`});
  };
  const cikisYap=(p)=>{
    const acik=acikKayitAl(p.id);
    if(!acik){setMesaj({tip:'uyari',metin:`${p.ad} için açık bir giriş kaydı bulunamadı.`});return;}
    const simdi=new Date(),saat=simdi.toTimeString().slice(0,5);
    const nms=normalMesaiSaat();const calisilanSaat=saatFarki(acik.girisSaat,saat),normalSaat=Math.min(calisilanSaat,nms),mesaiSaat=Math.max(0,Math.round((calisilanSaat-nms)*10)/10);
    const mesailer=LS.get('mesailer');
    const n=mesailer.map(m=>m.id===acik.id?{...m,cikisSaat:saat,calisilanSaat,normalSaat,mesaiSaat}:m);
    LS.set('mesailer',n);
    setMesaj({tip:'basari',metin:`✅ ${p.ad} — çıkış saati ${saat}, toplam ${calisilanSaat} sa çalışıldı${mesaiSaat>0?` (${mesaiSaat} sa fazla mesai)`:''}.`});
  };
  const pinIleGiris=(islem)=>{
    const p=personel.find(x=>x.pinKodu&&x.pinKodu===pin.trim());
    if(!p){setMesaj({tip:'hata',metin:'❌ PIN koduna sahip aktif personel bulunamadı.'});return;}

  return(<div>
    <InfoBox color={C.blue}>ℹ️ Demo modunda kamera/QR taraması simüle edilir; personel kartına dokunarak veya PIN girerek giriş-çıkış kaydı oluşturabilirsiniz.</InfoBox>

    <div style={{...S.card,marginBottom:20}}>
      <div style={S.secTitle}>🔢 PIN ile Giriş-Çıkış</div>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <input style={{...S.inp,width:160}} placeholder="PIN kodu" value={pin} onChange={e=>setPin(e.target.value)}/>
        <button style={S.btn(C.green)} onClick={()=>pinIleGiris('giris')} disabled={!pin.trim()}>🟢 Giriş Yap</button>
        <button style={S.btn(C.red)} onClick={()=>pinIleGiris('cikis')} disabled={!pin.trim()}>🔴 Çıkış Yap</button>
      </div>
    </div>
    <div style={S.secTitle}>📷 Personel Kartları (Demo QR)</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
      {personel.map(p=>{const acik=acikKayitAl(p.id);return(<div key={p.id} style={{...S.card,marginBottom:0,textAlign:'center',border:`1px solid ${acik?C.green:C.border}`}}>
        <div style={{fontSize:24,marginBottom:6}}>{acik?'🟢':'⚪'}</div>
