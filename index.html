function Badge({d}){
  const m={aktif:[C.green,'Aktif'],bakimda:[C.yellow,'Bakımda'],hurda:[C.red,'Hurda'],tamamlandi:[C.green,'Tamamlandı'],bekliyor:[C.yellow,'Bekliyor'],planli:[C.blue,'Planlı'],acik:[C.red,'Açık'],devamediyor:[C.yellow,'Devam'],kapandi:[C.green,'Kapandı'],kritik:[C.red,'Kritik'],normal:[C.blue,'Normal'],dusuk:[C.muted,'Düşük'],pasif:[C.muted,'Pasif'],odendi:[C.green,'Ödendi'],iptal:[C.red,'İptal'],gelir:[C.green,'Gelir'],gider:[C.red,'Gider'],kesilen:[C.blue,'Kesilen'],alinan:[C.purple,'Alınan'],};
  const[c,l]=m[d]||[C.muted,d];
  return <span style={S.badge(c)}>{l}</span>;
}
function Warn({msg,c=C.yellow}){return <div style={S.alert(c)}>⚠️ {msg}</div>;}
function FG({label,children}){return <div style={S.fg}><label style={S.lbl}>{label}</label>{children}</div>;}
function StatCard({color,value,label,sub}){return(<div style={S.stat(color)}><div style={S.statVal}>{value}</div><div style={S.statLbl}>{label}</div>{sub&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}</div>);}
function InfoBox({color=C.blue,children}){return <div style={{background:`${color}12`,border:`1px solid ${color}33`,borderRadius:8,padding:'10px 14px',fontSize:12,color,marginBottom:14}}>{children}</div>;}
function ProgressBar({value,max,color}){const p=max>0?Math.min(100,Math.round((value/max)*100)):0;const c=p>85?C.red:p>60?C.yellow:(color||C.green);return(<div><div style={{background:'#0f1117',borderRadius:4,height:6,overflow:'hidden'}}><div style={{width:`${p}%`,height:'100%',background:c,transition:'width .3s'}}/></div><div style={{fontSize:11,color:C.muted,marginTop:4,textAlign:'right'}}>%{p}</div></div>);}
function Toggle({value,onChange}){return(<div style={{width:36,height:20,borderRadius:10,background:value?C.green:C.border,cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}} onClick={()=>onChange(!value)}><div style={{position:'absolute',width:14,height:14,borderRadius:7,background:C.white,top:3,left:value?19:3,transition:'left .2s'}}/></div>);}
function TabBar({tabs,active,onChange}){return(<div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>{tabs.map(([k,l])=>(<button key={k} style={{...S.btn(active===k?C.accent:'transparent'),border:`1px solid ${active===k?C.accent:C.border}`,color:active===k?'#000':C.muted,fontSize:12}} onClick={()=>onChange(k)}>{l}</button>))}</div>);}
function Modal({onClose,title,children,width=560}){return(<div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={S.mbox}><div style={{...S.secTitle,fontSize:15,marginBottom:18}}>{title}</div>{children}</div></div>);}

      </div>

      <div style={S.card}><div style={S.secTitle}>🏗️ Proje Bazlı Kârlılık</div>{projeKarliligi.length===0?<div style={{color:C.muted,fontSize:13}}>Proje bazlı kayıt yok.</div>:(<ResponsiveContainer width="100%" height={240}><BarChart data={projeKarliligi}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="proje" tick={{fill:C.muted,fontSize:10}}/><YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v=>(v/1000)+'K'}/><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="gelir" name="Gelir" fill={C.green} radius={[4,4,0,0]}/><Bar dataKey="gider" name="Gider" fill={C.red} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>)}</div>
    </div>
    </>):(<div style={S.alert(C.yellow)}>⚠️ Grafik kütüphanesi yüklenemedi. İnternet bağlantısı gereklidir.</div>)}
    <div style={S.card}><div style={S.secTitle}>📑 Özet Kâr/Zarar Tablosu</div><table style={S.tbl}><tbody><tr><td style={S.td}>Toplam Gelir</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.green}}>{fmtTL(toplamGelir)}</strong></td></tr><tr><td style={S.td}>Toplam Gider</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.red}}>−{fmtTL(toplamGider)}</strong></td></tr><tr><td style={{...S.td,borderTop:`2px solid ${C.border}`,fontWeight:700,color:C.white}}>Net Kâr/Zarar</td><td style={{...S.td,borderTop:`2px solid ${C.border}`,textAlign:'right'}}><strong style={{color:toplamGelir-toplamGider>=0?C.green:C.red,fontSize:16}}>{fmtTL(toplamGelir-toplamGider)}</strong></td></tr></tbody></table></div>
  </div>);
}

function Muhasebe(){
  const [tab,setTab]=useState('raporlar');
  return(<div><TabBar tabs={[['raporlar','📊 Finansal Raporlar'],['gelirgider','💰 Gelir/Gider'],['fatura','🧾 Faturalar'],['kasa','💳 Kasa & Banka']]} active={tab} onChange={setTab}/>{tab==='raporlar'&&<FinansalRaporlar/>}{tab==='gelirgider'&&<GelirGider/>}{tab==='fatura'&&<Faturalar/>}{tab==='kasa'&&<KasaBanka/>}</div>);
}

// ── Ayarlar (Settings) ─────────────────────────────────────────────────────────
function Ayarlar(){
  const [tab,setTab]=useState('genel');
  const [s,setS]=useState(getSettings());
  const [saved,setSaved]=useState(false);
  const [fileErr,setFileErr]=useState('');
  const fileInputRef=React.useRef(null);
  const upd=(k,v)=>setS(f=>({...f,[k]:v}));
  const kaydet=()=>{saveSettings(s);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const storageKB=useMemo(()=>{try{let total=0;ALL_DATA_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)total+=v.length;});return (total/1024).toFixed(1);}catch{return '—';}},[tab]);
  const dataCounts=useMemo(()=>ALL_DATA_KEYS.filter(k=>k!=='ayarlar').map(k=>({k,n:LS.get(k).length||0})),[tab]);

  const disaAktar=()=>{
    const dump={};ALL_DATA_KEYS.forEach(k=>{dump[k]=k==='ayarlar'?getSettings():LS.get(k);});
    const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`filopro-yedek-${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const iceAktar=(e)=>{
    const file=e.target.files?.[0];if(!file)return;setFileErr('');
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        let ok=false;
        ALL_DATA_KEYS.forEach(k=>{if(data[k]!==undefined){LS.set(k,data[k]);ok=true;}});
        if(!ok){setFileErr('Dosyada tanınan bir FiloPro verisi bulunamadı.');return;}
        alert('Veriler başarıyla içe aktarıldı. Sayfa yenilenecek.');
        window.location.reload();
      }catch(err){setFileErr('Dosya okunamadı — geçerli bir FiloPro yedek dosyası (.json) seçin.');}
    };
    reader.readAsText(file);
    if(fileInputRef.current)fileInputRef.current.value='';
  };
  const varsayilanaDon=()=>{
    if(!window.confirm('Tüm ayarlar varsayılan değerlere döndürülecek. Devam edilsin mi?'))return;
    saveSettings({...DEFAULT_SETTINGS});setS({...DEFAULT_SETTINGS});
  };
  const demoyeDon=()=>{
    if(!window.confirm('DİKKAT: Tüm mevcut veriler silinip demo örnek verilerle değiştirilecek. Bu işlem geri alınamaz. Devam edilsin mi?'))return;
    localStorage.removeItem('fp_v4');
    ALL_DATA_KEYS.forEach(k=>{if(k!=='ayarlar')localStorage.removeItem(k);});
    seed();
    alert('Demo veriler yüklendi. Sayfa yenilenecek.');
    window.location.reload();
  };
  const tumunuTemizle=()=>{
    if(!window.confirm('DİKKAT: Ayarlar hariç TÜM veriler (araçlar, operatörler, mali kayıtlar vb.) kalıcı olarak silinecek. Bu işlem geri alınamaz. Devam edilsin mi?'))return;
    if(!window.confirm('Emin misiniz? Bu son onaydır — tüm veriler silinecek.'))return;
    ALL_DATA_KEYS.forEach(k=>{if(k!=='ayarlar')LS.set(k,[]);});
    alert('Tüm veriler temizlendi. Sayfa yenilenecek.');
    window.location.reload();
  };

  return(<div>
    <TabBar tabs={[['genel','⚙️ Genel'],['firma','🏢 Firma'],['bildirimler','🔔 Bildirimler'],['gorunum','🎨 Görünüm'],['veri','💾 Veri Yönetimi'],['hakkinda','ℹ️ Hakkında']]} active={tab} onChange={setTab}/>

    {tab==='genel'&&(<div style={S.card}>
      <div style={S.secTitle}>⚙️ Genel Tercihler</div>
      <div style={S.g2}>
        <FG label="Para Birimi Sembolü"><select style={S.sel} value={s.paraBirimi} onChange={e=>upd('paraBirimi',e.target.value)}><option value="₺">₺ — Türk Lirası</option><option value="$">$ — Dolar</option><option value="€">€ — Euro</option></select></FG>
        <FG label="Tarih Formatı"><select style={S.sel} value={s.tarihFormati} onChange={e=>upd('tarihFormati',e.target.value)}><option value="gg.aa.yyyy">GG.AA.YYYY (31.12.2026)</option><option value="yyyy-aa-gg">YYYY-AA-GG (2026-12-31)</option></select></FG>
      </div>
      <div style={S.g2}>
        <FG label="Varsayılan KDV Oranı (%)"><input type="number" style={S.inp} value={s.kdvOrani} onChange={e=>upd('kdvOrani',+e.target.value)}/></FG>
        <FG label="Varsayılan Yakıt Fiyatı (₺/Lt)"><input type="number" step="0.01" style={S.inp} value={s.varsayilanYakitFiyat} onChange={e=>upd('varsayilanYakitFiyat',+e.target.value)}/></FG>
      </div>
      <div style={S.g2}>
        <FG label="Vardiya Başlangıcı"><input type="time" style={S.inp} value={s.vardiyaBaslangic} onChange={e=>upd('vardiyaBaslangic',e.target.value)}/></FG>
        <FG label="Vardiya Bitişi"><input type="time" style={S.inp} value={s.vardiyaBitis} onChange={e=>upd('vardiyaBitis',e.target.value)}/></FG>
      </div>
      <InfoBox color={C.blue}>ℹ️ Bu ayarlar; fatura, gelir-gider ve yakıt modüllerinde varsayılan değer olarak kullanılır.</InfoBox>
      <div style={{display:'flex',gap:10,alignItems:'center'}}><button style={S.btn()} onClick={kaydet}>💾 Kaydet</button>{saved&&<span style={{color:C.green,fontSize:12}}>✓ Kaydedildi</span>}</div>
    </div>)}

    {tab==='firma'&&(<div style={S.card}>
      <div style={S.secTitle}>🏢 Firma Bilgileri</div>
      <FG label="Firma Adı"><input style={S.inp} value={s.firmaAdi} onChange={e=>upd('firmaAdi',e.target.value)}/></FG>
      <FG label="Adres"><input style={S.inp} value={s.firmaAdres} onChange={e=>upd('firmaAdres',e.target.value)}/></FG>
      <div style={S.g2}>
        <FG label="Telefon"><input style={S.inp} value={s.firmaTel} onChange={e=>upd('firmaTel',e.target.value)}/></FG>
        <FG label="Vergi No"><input style={S.inp} value={s.firmaVergiNo} onChange={e=>upd('firmaVergiNo',e.target.value)}/></FG>
      </div>
      <FG label="Vergi Dairesi"><input style={S.inp} value={s.firmaVergiDaire} onChange={e=>upd('firmaVergiDaire',e.target.value)}/></FG>
      <div style={{display:'flex',gap:10,alignItems:'center'}}><button style={S.btn()} onClick={kaydet}>💾 Kaydet</button>{saved&&<span style={{color:C.green,fontSize:12}}>✓ Kaydedildi</span>}</div>
    </div>)}

    {tab==='bildirimler'&&(<div>
      <div style={S.card}>
        <div style={S.secTitle}>🔔 Uyarı Eşikleri</div>
        <div style={S.g3}>
          <FG label="Kritik Eşik (gün)"><input type="number" style={S.inp} value={s.esikKritikGun} onChange={e=>upd('esikKritikGun',+e.target.value)}/></FG>
          <FG label="Uyarı Eşiği (gün)"><input type="number" style={S.inp} value={s.esikUyariGun} onChange={e=>upd('esikUyariGun',+e.target.value)}/></FG>
          <FG label="Operatör Belgesi Eşiği (gün)"><input type="number" style={S.inp} value={s.opBelgeEsikGun} onChange={e=>upd('opBelgeEsikGun',+e.target.value)}/></FG>
        </div>
        <InfoBox color={C.yellow}>⚠️ Bu değerler; Evrak Takibi, Bildirim Merkezi, Dashboard ve Fatura vade uyarılarında kullanılır.</InfoBox>
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>📡 Bildirim Kanalları</div>
        {[['bildirimEmail','📧 E-posta Bildirimleri'],['bildirimSms','📱 SMS Bildirimleri'],['bildirimSistem','🔔 Sistem İçi Bildirimler']].map(([k,l])=>(
          <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}22`}}>
            <span style={{fontSize:13,color:C.text}}>{l}</span>
            <Toggle value={s[k]} onChange={v=>upd(k,v)}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}><button style={S.btn()} onClick={kaydet}>💾 Kaydet</button>{saved&&<span style={{color:C.green,fontSize:12}}>✓ Kaydedildi</span>}</div>
    </div>)}

    {tab==='gorunum'&&(<div style={S.card}>
      <div style={S.secTitle}>🎨 Görünüm</div>
      <FG label="Vurgu Rengi">
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {Object.entries(ACCENT_MAP).map(([k,hex])=>(
            <div key={k} onClick={()=>upd('vurguRenk',k)} style={{width:38,height:38,borderRadius:9,background:hex,cursor:'pointer',border:s.vurguRenk===k?`3px solid ${C.white}`:'3px solid transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {s.vurguRenk===k&&<span style={{color:'#000',fontWeight:900}}>✓</span>}
            </div>
          ))}
        </div>
      </FG>
      <FG label="Sidebar Yoğunluğu">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Toggle value={s.sidebarKompakt} onChange={v=>upd('sidebarKompakt',v)}/>
          <span style={{fontSize:12,color:C.muted}}>{s.sidebarKompakt?'Kompakt (dar menü)':'Normal'}</span>
        </div>
      </FG>
      <InfoBox color={C.purple}>🎨 Vurgu rengi; butonlar, aktif menü öğesi ve grafiklerde anında uygulanır.</InfoBox>
      <div style={{display:'flex',gap:10,alignItems:'center'}}><button style={S.btn()} onClick={kaydet}>💾 Kaydet</button>{saved&&<span style={{color:C.green,fontSize:12}}>✓ Kaydedildi</span>}</div>
    </div>)}

    {tab==='veri'&&(<div>
      <div style={S.g3}>
        <StatCard color={C.blue} value={storageKB+' KB'} label="Kullanılan Depolama"/>
        <StatCard color={C.green} value={dataCounts.reduce((s,d)=>s+d.n,0)} label="Toplam Kayıt"/>
        <StatCard color={C.accent} value={ALL_DATA_KEYS.length-1} label="Veri Tablosu"/>
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>📦 Yedekleme</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Tüm sistem verilerini (araçlar, mali kayıtlar, kullanıcılar vb.) tek bir JSON dosyası olarak indirin.</div>
        <button style={S.btn()} onClick={disaAktar}>⬇️ Yedeği İndir (.json)</button>
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>📤 Geri Yükleme</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Daha önce indirdiğiniz bir yedek dosyasını seçerek verileri geri yükleyin. Mevcut veriler dosyadaki verilerle değiştirilir.</div>
        <input ref={fileInputRef} type="file" accept="application/json" onChange={iceAktar} style={{display:'none'}} id="fp-import-input"/>
        <button style={S.btnO} onClick={()=>fileInputRef.current?.click()}>⬆️ Yedek Dosyası Seç</button>
        {fileErr&&<div style={{...S.alert(C.red),marginTop:10}}>⚠️ {fileErr}</div>}
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>📊 Veri Tabloları</div>
        <table style={S.tbl}><thead><tr><th style={S.th}>Tablo</th><th style={S.th}>Kayıt Sayısı</th></tr></thead>
        <tbody>{dataCounts.map(d=>(<tr key={d.k}><td style={S.td}>{d.k}</td><td style={S.td}>{d.n}</td></tr>))}</tbody></table>
      </div>
      <div style={{...S.card,borderColor:`${C.red}44`}}>
        <div style={{...S.secTitle,color:C.red}}>⚠️ Tehlikeli Bölge</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button style={S.btnO} onClick={varsayilanaDon}>↺ Ayarları Sıfırla</button>
          <button style={S.btnO} onClick={demoyeDon}>🔄 Demo Verilerle Değiştir</button>
          <button style={S.btnR} onClick={tumunuTemizle}>🗑 Tüm Verileri Temizle</button>
        </div>
      </div>
    </div>)}

    {tab==='hakkinda'&&(<div style={S.card}>
      <div style={S.secTitle}>🚜 FiloPro Hakkında</div>
      <div style={{fontSize:13,color:C.text,lineHeight:1.9}}>
        <div><strong style={{color:C.white}}>Sürüm:</strong> v4.1.0 — Faz 1 + 2 + 3 + 4 + Ayarlar</div>
        <div><strong style={{color:C.white}}>Veri Depolama:</strong> Tarayıcı localStorage (çevrimdışı çalışır)</div>
        <div><strong style={{color:C.white}}>Modül Sayısı:</strong> {ALL_PAGES?.length||'—'}</div>
      </div>
      <InfoBox color={C.blue}>ℹ️ Tüm veriler yalnızca bu tarayıcıda saklanır. Farklı bir cihaz veya tarayıcıda kullanmak için Veri Yönetimi sekmesinden yedek alıp geri yükleyin.</InfoBox>
    </div>)}
  </div>);
}

// ── Pages Config ──────────────────────────────────────────────────────────────
const PAGES=[
  {group:'FAZ 1 — CORE',items:[
    {id:'dashboard',label:'Dashboard',icon:'📊',comp:Dashboard},
    {id:'arac',label:'Araç Yönetimi',icon:'🚜',comp:AracYonetimi},
    {id:'bakim',label:'Bakım Takibi',icon:'🔧',comp:BakimTakibi},
    {id:'yakit',label:'Yakıt Yönetimi',icon:'⛽',comp:YakitYonetimi},
    {id:'operator',label:'Operatörler',icon:'👷',comp:OperatorYonetimi},
    {id:'evrak',label:'Evrak Takibi',icon:'📋',comp:EvrakTakibi},
  ]},
  {group:'FAZ 2 — GELİŞMİŞ',items:[
    {id:'hasar',label:'Hasar & Sigorta',icon:'🛡️',comp:HasarTakibi},
    {id:'parca',label:'Yedek Parça',icon:'🏭',comp:YedekParca},
    {id:'isemri',label:'İş Emirleri',icon:'📌',comp:IsEmirleri},
    {id:'proje',label:'Proje & Maliyet',icon:'🏗️',comp:ProjeYonetimi},
  ]},
  {group:'FAZ 3 — ENTERPRISE',items:[
    {id:'akaryakit',label:'Akaryakıt İstasyonu',icon:'⛽🏭',comp:AkaryakitIstasyonu},
    {id:'saha',label:'Mobil Saha',icon:'📱',comp:MobilSaha},
    {id:'bildirim',label:'Bildirim Merkezi',icon:'🔔',comp:BildirimMerkezi},
    {id:'yetki',label:'Kullanıcı & Yetki',icon:'🔐',comp:KullaniciYetki},
    {id:'erp',label:'ERP Entegrasyon',icon:'🏢',comp:ErpEntegrasyon},
    {id:'ai',label:'Yapay Zeka',icon:'🤖',comp:YapayZeka},
  ]},
  {group:'FAZ 4 — MUHASEBE',items:[
    {id:'muhasebe',label:'Muhasebe & Finans',icon:'💰',comp:Muhasebe},
  ]},
  {group:'SİSTEM',items:[
    {id:'ayarlar',label:'Ayarlar',icon:'⚙️',comp:Ayarlar},
  ]},
];
const ALL_PAGES=PAGES.flatMap(g=>g.items);

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  useEffect(()=>{seed();ensureSettings();},[]);
  const [active,setActive]=useState(()=>{const h=window.location.hash.replace('#','');return ALL_PAGES.some(p=>p.id===h)?h:'dashboard';});
  const [menuOpen,setMenuOpen]=useState(false);
  const [,forceThemeRender]=useState(0);

  useEffect(()=>{
    const applyTheme=()=>{const st=getSettings();C.accent=ACCENT_MAP[st.vurguRenk]||'#f59e0b';forceThemeRender(x=>x+1);};
    applyTheme();
    window.addEventListener('fp-settings-changed',applyTheme);
    return ()=>window.removeEventListener('fp-settings-changed',applyTheme);
  },[]);
  const sidebarKompakt=getSettings().sidebarKompakt;

  useEffect(()=>{window.location.hash=active;},[active]);

  useEffect(()=>{
    const sb=document.getElementById('fp-sidebar'),ov=document.getElementById('fp-overlay');
    if(sb)sb.classList.toggle('open',menuOpen);
    if(ov)ov.classList.toggle('show',menuOpen);
  },[menuOpen]);

  const navigate=(id)=>{setActive(id);setMenuOpen(false);};
  const current=ALL_PAGES.find(p=>p.id===active)||ALL_PAGES[0];
  const CurrentComp=current.comp;

  return(
    <div style={S.app}>
      <div id="fp-overlay" onClick={()=>setMenuOpen(false)}/>
      <aside id="fp-sidebar" style={{...S.sidebar,width:sidebarKompakt?70:240}}>
        <div style={S.logo}>
          <div style={S.logoText}>{sidebarKompakt?'🚜':'🚜 FiloPro'}</div>
          {!sidebarKompakt&&<div style={S.logoSub}>İş Makinesi Yönetim Sistemi</div>}
        </div>
        <nav style={{flex:1,paddingBottom:16}}>
          {PAGES.map(group=>(<div key={group.group}>
            {!sidebarKompakt&&<div style={S.navGroup}>{group.group}</div>}
            {group.items.map(item=>(<div key={item.id} style={S.navItem(active===item.id)} onClick={()=>navigate(item.id)} title={item.label}><span>{item.icon}</span>{!sidebarKompakt&&<span>{item.label}</span>}</div>))}
          </div>))}
        </nav>
        {!sidebarKompakt&&<div style={{padding:'14px 16px',borderTop:`1px solid ${C.border}`,fontSize:10,color:C.muted,flexShrink:0}}>
          Faz 1 + 2 + 3 + 4 + Ayarlar — v4.1.0
        </div>}
      </aside>
      <main style={S.main}>
        <header style={S.header}>
          <button id="fp-menu-btn" onClick={()=>setMenuOpen(true)}>☰</button>
          <div style={S.headerTitle}>{current.icon} {current.label}</div>
        </header>
        <div style={S.content}>
          <CurrentComp/>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
