<!DOCTYPE html>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f1117'/%3E%3Ctext x='50' y='68' font-size='56' text-anchor='middle'%3E%F0%9F%9A%9C%3C/text%3E%3C/svg%3E">
<link rel="manifest" id="fp-manifest">
<script>
// PWA manifest'i istemci tarafında üretir; index.html dosyasının tek dosya olarak
// taşınabilir kalmasını sağlar (ayrı bir manifest.json dosyasına gerek kalmaz).
(function(){
  try{
    var iconSvg="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f1117'/%3E%3Ctext x='50' y='68' font-size='56' text-anchor='middle'%3E%F0%9F%9A%9C%3C/text%3E%3C/svg%3E";
    var manifest={
      name:"FiloPro — İş Makinesi Yönetim Sistemi",
      short_name:"FiloPro",
      description:"Filo, personel ve muhasebe yönetim sistemi",
      start_url:"./",
      scope:"./",
      display:"standalone",
      background_color:"#0f1117",
      theme_color:"#0f1117",
      icons:[
        {src:iconSvg,sizes:"192x192",type:"image/svg+xml",purpose:"any"},
        {src:iconSvg,sizes:"512x512",type:"image/svg+xml",purpose:"any"}
      ]
    };
    var blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    document.getElementById("fp-manifest").href=URL.createObjectURL(blob);
  }catch(e){console.warn("Manifest oluşturulamadı:",e);}
})();
// "Ana Ekrana Ekle" istemini erkenden (React yüklenmeden önce) yakalar; tarayıcı bu olayı
// sayfa açılır açılmaz tetikleyebileceği için burada, en üstte dinlemeye başlamak gerekir.
window.__fpInstallPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  window.__fpInstallPrompt=e;
  window.dispatchEvent(new Event('fp-install-available'));
});
window.addEventListener('appinstalled',function(){
  window.__fpInstallPrompt=null;
  window.dispatchEvent(new Event('fp-install-done'));
});
</script>

<style>
:root{--accent:#f59e0b;--accent-soft:rgba(245,158,11,.16);}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg,#0f1117);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;transition:background .2s ease;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3050;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#3a4270;}
#fp-menu-btn{display:none;background:none;border:1px solid #2a3050;border-radius:6px;color:#e2e8f0;cursor:pointer;padding:5px 10px;font-size:18px;line-height:1;transition:all .15s;}
#fp-menu-btn:hover{border-color:var(--accent);color:var(--accent);}
#fp-overlay{display:none;position:fixed;inset:0;background:rgba(5,6,10,.7);backdrop-filter:blur(2px);z-index:998;animation:fpFade .18s ease;}
#fp-overlay.show{display:block;}
#fp-sidebar{transition:left .22s ease;}
button{font-family:inherit;transition:filter .12s ease,transform .08s ease,opacity .12s ease,box-shadow .15s ease;}
button:hover{filter:brightness(1.14);}
button:active{transform:scale(.97);}
input,select,textarea{font-family:inherit;transition:border-color .15s ease,box-shadow .15s ease;}
input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-soft);}
table tbody tr{transition:background .12s ease;}
table tbody tr:hover{background:rgba(255,255,255,.028);}
a{color:var(--accent);}
.fp-card{transition:border-color .15s ease,transform .15s ease,box-shadow .15s ease;}
.fp-card:hover{border-color:#3a4270;box-shadow:0 10px 28px -10px rgba(0,0,0,.55);transform:translateY(-2px);}
.fp-stat{overflow:hidden;}
.fp-stat:hover{transform:translateY(-3px);}
.fp-navitem{transition:all .15s ease;}
.fp-navitem:hover{background:rgba(255,255,255,.04)!important;color:#e2e8f0!important;transform:translateX(2px);}
.fp-fade{animation:fpFadeUp .25s ease;}
.fp-pulse{animation:fpPulse 2s ease-in-out infinite;}
@keyframes fpFade{from{opacity:0;}to{opacity:1;}}
@keyframes fpFadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes fpPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@media(max-width:768px){
  #fp-menu-btn{display:block;}
  #fp-sidebar{position:fixed!important;left:-260px!important;top:0!important;width:240px!important;height:100vh!important;z-index:999!important;overflow-y:auto!important;}
  #fp-sidebar.open{left:0!important;box-shadow:8px 0 30px rgba(0,0,0,.5);}
  .fp-liveclock{display:none;}
}
@media(max-width:560px){
  .fp-headertitle-text{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// SADECE Capacitor native kabuğu içindeyken (Android/iOS uygulaması) yüklenir.
// Düz web sitesi olarak açıldığında window.Capacitor tanımsız olur ve bu satır hiçbir şey yapmaz;
// app.js otomatik olarak tarayıcı içi navigator.geolocation.watchPosition yöntemine döner.
if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
  document.write('<script src="./native-konum-bridge.js"><\/script>');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="app.js"></script>
<script>
// Offline destek için service worker kaydı. sw.js dosyası index.html ile aynı
// klasörde barındırılmalıdır (file:// üzerinden açılan kopyalarda devre dışı kalır).
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(err){
      console.warn('Service worker kaydı başarısız (sw.js aynı klasörde olmalı):',err);
    });
  });
}
</script>
</body>
</html>
