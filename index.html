const LS = {
  get:(k,fb=[])=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  getObj:(k,fb={})=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
};
const uid=()=>`${Date.now()}-${Math.random().toString(36).slice(2,7)}`;

let _toastListeners=[];
function fpToast(msg,type){
  if(!type){
    if(/✅/.test(msg))type='success';
    else if(/⚠️|DİKKAT|yanlış|hata|olmalı|zorunlu|bulunamadı|desteklemiyor|yüklenemedi|silinemedi|okunamadı|başlatılamadı|seçmelisiniz|seçin\.|doldur/i.test(msg))type='error';
    else type='info';
  }
  const t={id:uid(),msg,type};
  _toastListeners.forEach(fn=>fn(t));
}

function ToastHost(){
  const [toasts,setToasts]=React.useState([]);
  React.useEffect(()=>{
    const listener=(t)=>{
      setToasts(ts=>[...ts,t]);
      setTimeout(()=>setToasts(ts=>ts.filter(x=>x.id!==t.id)),4200);
    };
    _toastListeners.push(listener);
    return()=>{_toastListeners=_toastListeners.filter(l=>l!==listener);};
  },[]);
  if(!toasts.length)return null;
  const colorFor=(type)=>type==='success'?C.green:type==='error'?C.red:C.blue;
  const iconFor=(type)=>type==='success'?'✅':type==='error'?'⚠️':'ℹ️';
  return (
    <div style={{position:'fixed',top:16,right:16,zIndex:2000,display:'flex',flexDirection:'column',gap:8,maxWidth:'min(380px,92vw)'}}>
      {toasts.map(t=>(
        <div key={t.id} className="fp-fade" style={{background:C.card,border:`1px solid ${colorFor(t.type)}55`,borderLeft:`4px solid ${colorFor(t.type)}`,borderRadius:8,padding:'11px 14px',fontSize:13}}>
          <span style={{flexShrink:0}}>{iconFor(t.type)}</span>
          <span style={{flex:1,lineHeight:1.45,whiteSpace:'pre-line'}}>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// GPS Tracker Bileşeni
function GpsTrackerPanel() {
  const [vehicles, setVehicles] = React.useState({});
  const [selectedVehicle, setSelectedVehicle] = React.useState(null);
  const mapRef = React.useRef(null);
  const mapInstance = React.useRef(null);

  React.useEffect(() => {
    // Harita başlat
    if (!mapInstance.current && mapRef.current) {
      mapInstance.current = L.map(mapRef.current).setView([38.76, 27.32], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19,
      }).addTo(mapInstance.current);
    }
  }, []);

  const loadVehicles = React.useCallback(async () => {
    try {
      const cfg = JSON.parse(localStorage.getItem('fp_sync_cfg') || '{}');
      if (!cfg.token || !cfg.url) return;

      const res = await fetch(`${cfg.url}/api/gps/vehicles`, {
        headers: { 'Authorization': `Bearer ${cfg.token}` }
      });
      if (!res.ok) return;
      
      const data = await res.json();
      const vehiclesObj = data.vehicles.reduce((acc, v) => {
        acc[v.vehicleId] = v;
        return acc;
      }, {});
      setVehicles(vehiclesObj);
    } catch (e) {
      console.error('GPS yükleme hatası:', e);
    }
  }, []);

  React.useEffect(() => {
    loadVehicles();
    const interval = setInterval(loadVehicles, 10000);
    return () => clearInterval(interval);
  }, [loadVehicles]);

  return (
    <div style={{ display: 'flex', gap: '16px', height: 'calc(100vh - 60px)' }}>
      <div style={{ flex: 1, borderRadius: '12px', overflow: 'hidden', border: `1px solid ${C.border}` }}>
        <div ref={mapRef} id="gps-map-container" style={{ width: '100%', height: '100%' }} />
      </div>
      
      <div style={{ width: '280px', background: C.card, border: `1px solid ${C.border}`, borderRadius: '12px', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ padding: '12px', borderBottom: `1px solid ${C.border}`, background: C.surface }}>
          <div style={{ fontSize: '14px', fontWeight: '600' }}>📍 Araçlar</div>
          <div style={{ fontSize: '11px', color: C.muted, marginTop: '2px' }}>Canlı Konum</div>
        </div>
        
        <div style={{ flex: 1, overflowY: 'auto', padding: '12px' }}>
          {Object.entries(vehicles).length === 0 ? (
            <div style={{ color: C.muted, fontSize: '12px', textAlign: 'center', marginTop: '20px' }}>Araç verisi bulunamadı</div>
          ) : (
            Object.entries(vehicles).map(([id, v]) => (
              <div
                key={id}
                onClick={() => setSelectedVehicle(id)}
                style={{
                  background: selectedVehicle === id ? hexA(C.accent, 0.14) : 'transparent',
                  border: `1px solid ${selectedVehicle === id ? C.accent : C.border}`,
                  borderRadius: '8px',
                  padding: '10px',
                  marginBottom: '8px',
                  cursor: 'pointer',
                  transition: 'all 0.2s',
                }}
              >
                <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '4px' }}>{v.vehicleId}</div>
                {v.location ? (
                  <div style={{ fontSize: '11px', color: C.muted, lineHeight: '1.4' }}>
                    📍 {v.location.lat.toFixed(4)}, {v.location.lng.toFixed(4)}<br />
                    🏃 {v.location.speed.toFixed(1)} km/h
                  </div>
                ) : (
                  <div style={{ fontSize: '11px', color: C.red }}>Çevrimdışı</div>
                )}
              </div>
            ))
          )}
        </div>
        
        <div style={{ padding: '12px', borderTop: `1px solid ${C.border}`, display: 'flex', gap: '6px' }}>

        </div>
      </div>
    </div>
  );
}

// SYNC & AUTH FUNCTIONS
const SYNC_META_KEY='fp_sync_meta';
const SYNC_CFG_KEY='fp_sync_cfg';
function getSyncMeta(){try{return JSON.parse(localStorage.getItem(SYNC_META_KEY))||{};}catch{return {};}}
function setSyncMeta(m){try{localStorage.setItem(SYNC_META_KEY,JSON.stringify(m));}catch{}}
function getSyncCfg(){try{return JSON.parse(localStorage.getItem(SYNC_CFG_KEY))||{};}catch{return {};}}
function setSyncCfg(c){try{localStorage.setItem(SYNC_CFG_KEY,JSON.stringify(c));}catch{}}

let _syncStatusListeners=[];
let _dataVersion=0;
let _syncStatus={state:'kapali',lastSync:null,pending:0,error:null,dataVersion:0};
function _emitSyncStatus(patch){
  _syncStatus={..._syncStatus,...patch};
  _syncStatusListeners.forEach(fn=>fn(_syncStatus));
}
function fpSyncStatus(){return _syncStatus;}
function fpSyncSubscribe(fn){_syncStatusListeners.push(fn);fn(_syncStatus);return()=>{_syncStatusListeners=_syncStatusListeners.filter(l=>l!==fn);};}

const _origLSSet=LS.set;
LS.set=(k,v)=>{
  _origLSSet(k,v);
  const cfg=getSyncCfg();
  if(!cfg.token)return;
  const meta=getSyncMeta();
  meta.updatedAt=meta.updatedAt||{};
  meta.updatedAt[k]=Date.now();
  setSyncMeta(meta);
  _emitSyncStatus({pending:Object.keys(meta.updatedAt).length});
};

async function fpSyncRegister(url,companyName,username,password){
  const cleanUrl=(url||'').trim().replace(/\/+$/,'');
  if(!cleanUrl)throw new Error('Sunucu adresi gerekli.');
  const res=await fetch(`${cleanUrl}/api/auth/register`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({companyName,username,password})
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||'Kayıt başarısız.');
  setSyncCfg({url:cleanUrl,token:data.token,username:username.trim().toLowerCase(),companyName:data.companyName,role:data.role});
  setSyncMeta({updatedAt:{},lastPull:0});
  _emitSyncStatus({state:'bagli',error:null,pending:0,lastSync:null});
  return data;
}

async function fpSyncLogin(url,username,password){
  const cleanUrl=(url||'').trim().replace(/\/+$/,'');
  if(!cleanUrl)throw new Error('Sunucu adresi gerekli.');
  const res=await fetch(`${cleanUrl}/api/auth/login`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||'Giriş başarısız.');
  setSyncCfg({url:cleanUrl,token:data.token,username:username.trim().toLowerCase(),companyName:data.companyName,role:data.role});
  setSyncMeta({updatedAt:{},lastPull:0});
  _emitSyncStatus({state:'bagli',error:null,pending:0,lastSync:null});
  return data;
}

function fpSyncLogout(){
  setSyncCfg({});
  setSyncMeta({});
  _emitSyncStatus({state:'kapali',pending:0,lastSync:null,error:null});
}

async function fpSyncPush(){
  const cfg=getSyncCfg();
  if(!cfg.token||!cfg.url)return;
  const meta=getSyncMeta();
  const dirty=Object.keys(meta.updatedAt||{});
  if(!dirty.length)return;
  const changes=dirty.map(k=>({key:k,data:LS.get(k,k==='ayarlar'?{}:[]),updatedAt:meta.updatedAt[k]}));
  const res=await fetch(`${cfg.url}/api/sync/push`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.token}`},
    body:JSON.stringify({changes})
  });
  if(res.status===401){fpSyncLogout();throw new Error('Oturum süresi dolmuş, tekrar giriş yapın.');}
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'Gönderim başarısız.');}
  meta.updatedAt={};
  setSyncMeta(meta);
  _emitSyncStatus({pending:0});
}

async function fpSyncPull(){
  const cfg=getSyncCfg();
  if(!cfg.token||!cfg.url)return;
  const meta=getSyncMeta();
  const since=meta.lastPull||0;
  const res=await fetch(`${cfg.url}/api/sync/pull?since=${since}`,{
    headers:{'Authorization':`Bearer ${cfg.token}`}
  });
  if(res.status===401){fpSyncLogout();throw new Error('Oturum süresi dolmuş, tekrar giriş yapın.');}
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'Alım başarısız.');}
  const data=await res.json();
  const changed=data.changed||{};
  Object.keys(changed).forEach(k=>{_origLSSet(k,changed[k].data);});
  meta.lastPull=data.serverTime||Date.now();
  setSyncMeta(meta);
  if(Object.keys(changed).length){
    fpToast(`${Object.keys(changed).length} modülde güncelleme senkronize edildi.`,'success');
    _emitSyncStatus({dataVersion:++_dataVersion});
  }
}

let _syncing=false;
async function fpSyncNow(){
  const cfg=getSyncCfg();
  if(!cfg.token||_syncing)return;
  _syncing=true;
  _emitSyncStatus({state:'senkron_ediliyor',error:null});
  try{
    await fpSyncPull();
    await fpSyncPush();
    _emitSyncStatus({state:'bagli',lastSync:Date.now(),error:null});
  }catch(e){
    _emitSyncStatus({state:navigator.onLine?'hata':'cevrimdisi',error:e.message});
  }finally{
    _syncing=false;
  }
}

(function initSync(){
  const cfg=getSyncCfg();
  if(cfg.token){
    _emitSyncStatus({state:'bagli',pending:Object.keys(getSyncMeta().updatedAt||{}).length});
    setTimeout(fpSyncNow,1500);
  }
  setInterval(()=>{if(getSyncCfg().token)fpSyncNow();},45000);
  window.addEventListener('online',()=>{if(getSyncCfg().token)fpSyncNow();});
  window.addEventListener('offline',()=>{if(getSyncCfg().token)_emitSyncStatus({state:'cevrimdisi'});});
})();

function SyncBadge(){
  const [status,setStatus]=React.useState(fpSyncStatus());
  React.useEffect(()=>fpSyncSubscribe(setStatus),[]);
  if(status.state==='kapali')return null;
  const cfgMap={
    bagli:{c:C.green,label:'Senkron',icon:'☁️'},
    senkron_ediliyor:{c:C.blue,label:'Senkronize ediliyor…',icon:'🔄'},
    hata:{c:C.red,label:'Senkron hatası',icon:'⚠️'},
    cevrimdisi:{c:C.yellow,label:'Çevrimdışı',icon:'📴'},
  };
  const info=cfgMap[status.state]||cfgMap.bagli;
  const title=status.state==='hata'?status.error:status.pending>0?`${status.pending} değişiklik bekliyor`:status.lastSync?`Son senkron: ${new Date(status.lastSync).toLocaleTimeString('tr-TR')}`:'Bağlı';
  return (
    <div title={title} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:info.c,padding:'4px 9px',borderRadius:20,border:`1px solid ${info.c}44`,background:`${info.c}12`,cursor:'pointer'}}>
      <span className={status.state==='senkron_ediliyor'?'fp-pulse':''}>{info.icon}</span>
      <span className="fp-liveclock">{info.label}{status.pending>0&&status.state!=='senkron_ediliyor'?` (${status.pending})`:''}</span>
    </div>
  );
}

const DEFAULT_SETTINGS={
  firmaAdi:'FiloPro A.Ş.', firmaAdres:'Akhisar, Manisa', firmaTel:'0532 000 0000', firmaVergiNo:'', firmaVergiDaire:'',
  paraBirimi:'₺', tarihFormati:'gg.aa.yyyy', kdvOrani:20, varsayilanYakitFiyat:44,
  esikKritikGun:7, esikUyariGun:30, opBelgeEsikGun:60,
  bildirimEmail:true, bildirimSms:true, bildirimSistem:true,
  vardiyaBaslangic:'07:30', vardiyaBitis:'17:30',
  yillikMesaiLimit:270, asgariUcret:22104,
  vurguRenk:'amber', tema:'dark', yogunluk:'normal', sidebarKompakt:false,
  aktifKullaniciId:1,
  girisKorumaAktif:false, girisSifreHash:'', girisSifreSalt:'', otoKilitDakika:0,

const ALL_DATA_KEYS=['araclar','personel','departmanlar','izinler','mesailer','egitimler','adaylar','degerlendirmeler','isGuvenligiOlaylari','bordroEkKalemler','bordroArsiv','bakimlar','yakitlar','hasarlar','parcalar','depolar','envanterKalemleri','stokHareketleri','bekciKopekleri','kopekAsilari','kopekSaglikKayitleri','kopekMasraflari','isemirleri','gorevler','projeler','hesaplar','gelirGider','musteriler','tedarikciler','faturalar','kasaHareketleri','pompalar','yakitLimitler','otomatikIkmaller','sahaCalisma','sahaAriza','bildirimTercih','kullanicilar','islemLoglari','erpBaglantilar','erpAktarimlar'];
const getSettings=()=>({...DEFAULT_SETTINGS,...LS.getObj('ayarlar',{})});
const saveSettings=(s)=>{LS.set('ayarlar',s);window.dispatchEvent(new Event('fp-settings-changed'));};
const ensureSettings=()=>{if(!localStorage.getItem('ayarlar'))LS.set('ayarlar',DEFAULT_SETTINGS);};

// MAIN APP
function App(){
  const [page,setPage]=React.useState(LS.getObj('ayarlar',{}) ? 'araclar' : 'giris');
  const [sidebarOpen,setSidebarOpen]=React.useState(false);

  return (
    <div style={S.app}>
      <ToastHost />
      <SyncBadge />
      
      {page !== 'giris' && (
        <div id="fp-sidebar" style={S.sidebar}>
          <div style={S.logo}>
            <div style={S.logoText}>📦 FiloPro</div>
            <div style={S.logoSub}>İş Makinesi Yönetim</div>
          </div>
          
          <div style={{flex:1, overflowY:'auto'}}>
            <div style={S.navGroup}>Filo</div>
            <div style={S.navItem(page==='araclar')} onClick={()=>setPage('araclar')} className="fp-navitem">🚜 Araçlar</div>
            <div style={S.navItem(page==='gps-takip')} onClick={()=>setPage('gps-takip')} className="fp-navitem">📍 GPS İzleme</div>
            <div style={S.navItem(page==='bakimlar')} onClick={()=>setPage('bakimlar')} className="fp-navitem">🔧 Bakımlar</div>
            
            <div style={S.navGroup}>İnsan Kaynakları</div>
            <div style={S.navItem(page==='personel')} onClick={()=>setPage('personel')} className="fp-navitem">👥 Personel</div>
            
            <div style={S.navGroup}>Muhasebe</div>
            <div style={S.navItem(page==='faturalar')} onClick={()=>setPage('faturalar')} className="fp-navitem">📋 Faturalar</div>
            
            <div style={S.navGroup}>Ayarlar</div>
            <div style={S.navItem(page==='ayarlar')} onClick={()=>setPage('ayarlar')} className="fp-navitem">⚙️ Ayarlar</div>
            <div style={S.navItem(page==='cikis')} onClick={()=>{fpSyncLogout();setPage('giris');}} className="fp-navitem">🚪 Çıkış</div>
          </div>
        </div>
      )}
      
      <div style={S.main}>
        <div style={S.header}>
          <button id="fp-menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>☰</button>
          <div style={S.headerTitle}>
            {page === 'gps-takip' && '📍 GPS Araç İzleme'}
            {page === 'araclar' && '🚜 Araçlar'}
            {page === 'bakimlar' && '🔧 Bakımlar'}
            {page === 'personel' && '👥 Personel'}
            {page === 'faturalar' && '📋 Faturalar'}
            {page === 'ayarlar' && '⚙️ Ayarlar'}
            {page === 'giris' && '🔐 Giriş'}
          </div>
        </div>
        
        <div style={S.content}>
          {page === 'gps-takip' && <GpsTrackerPanel />}
          {page === 'araclar' && <div style={{color:C.muted}}>Araçlar sayfası (yakında eklenecek)</div>}
          {page === 'bakimlar' && <div style={{color:C.muted}}>Bakımlar sayfası (yakında eklenecek)</div>}
          {page === 'personel' && <div style={{color:C.muted}}>Personel sayfası (yakında eklenecek)</div>}
          {page === 'faturalar' && <div style={{color:C.muted}}>Faturalar sayfası (yakında eklenecek)</div>}
          {page === 'ayarlar' && <div style={{color:C.muted}}>Ayarlar sayfası (yakında eklenecek)</div>}
          {page === 'giris' && <LoginPage onLoginSuccess={()=>setPage('araclar')} />}
        </div>
      </div>
    </div>
  );
}

function LoginPage({onLoginSuccess}){
  const [url,setUrl]=React.useState('');
  const [username,setUsername]=React.useState('');
  const [password,setPassword]=React.useState('');
  const [loading,setLoading]=React.useState(false);

  const handleLogin=async()=>{
    try{
      setLoading(true);
      await fpSyncLogin(url,username,password);
      fpToast('✅ Başarıyla giriş yapıldı');
      onLoginSuccess();
    }catch(e){
      fpToast('⚠️ '+e.message,'error');
    }finally{
      setLoading(false);
    }
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
      <div style={S.card}>
        <div style={{fontSize:24,fontWeight:800,marginBottom:20,textAlign:'center'}}>FiloPro Giriş</div>
        <div style={S.fg}>
          <label style={S.lbl}>Sunucu Adresi</label>
          <input style={S.inp} type="url" placeholder="http://localhost:3001" value={url} onChange={(e)=>setUrl(e.target.value)} />
        </div>
        <div style={S.fg}>
          <label style={S.lbl}>Kullanıcı Adı</label>
          <input style={S.inp} type="text" value={username} onChange={(e)=>setUsername(e.target.value)} />
        </div>
        <div style={S.fg}>
          <label style={S.lbl}>Şifre</label>
          <input style={S.inp} type="password" value={password} onChange={(e)=>setPassword(e.target.value)} />
        </div>
        <button style={{...S.btn(),width:'100%',padding:'12px'}} onClick={handleLogin} disabled={loading}>
          {loading?'Giriş yapılıyor...':'Giriş Yap'}
        </button>
      </div>
    </div>
  );
}

ensureSettings();
ReactDOM.render(<App />, document.getElementById('root'));
</script>
