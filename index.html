const daysLeft=d=>d?Math.ceil((new Date(d)-new Date())/86400000):9999;
const fmtDate=d=>{if(!d)return'ГўвӮ¬вҖқ';const dt=new Date(d);if(isNaN(dt))return'ГўвӮ¬вҖқ';const fmt=getSettings().tarihFormati;if(fmt==='yyyy-aa-gg')return dt.toISOString().slice(0,10);return dt.toLocaleDateString('tr-TR');};
const fmtMonth=(ym)=>{if(!ym)return'ГўвӮ¬вҖқ';const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});};
const fmtTL=n=>{const sim=getSettings().paraBirimi||'ГўвҖҡВә';return (+n||0).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0})+' '+sim;};
const fmtNum=(n,s='')=>(+n||0).toLocaleString('tr-TR')+(s?' '+s:'');
const pct=(a,b)=>b>0?Math.round((a/b)*100):0;
const months=()=>{const arr=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);arr.push(d.toISOString().slice(0,7));}return arr;};

const downloadBlob=(content,filename,mime)=>{
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
const csvEscape=(v)=>{const s=String(v??'');return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
const exportCSV=(headers,rows,filename)=>{
  const lines=[headers.map(csvEscape).join(';'),...rows.map(r=>r.map(csvEscape).join(';'))];
  downloadBlob('\ufeff'+lines.join('\r\n'),filename,'text/csv;charset=utf-8;');
};
const exportXLSX=(headers,rows,filename,sheetName='Sayfa1')=>{
  if(!window.XLSX){alert('Excel kГғВјtГғВјphanesi yГғВјklenemedi. LГғВјtfen CSV olarak dГ„ВұГ…Еёa aktarГ„Вұn veya internet baГ„ЕёlantГ„ВұnГ„ВұzГ„Вұ kontrol edin.');return;}
  const ws=window.XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:16}));
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,sheetName);
  window.XLSX.writeFile(wb,filename);
};

// Pop-up engelleyicilerden etkilenmeyen, gizli iframe ГғВјzerinden yazdГ„Вұrma
const printHTMLDoc=(html)=>{
  const old=document.getElementById('fp-print-frame');
  if(old)old.remove();
  const ifr=document.createElement('iframe');
  ifr.id='fp-print-frame';
  Object.assign(ifr.style,{position:'fixed',right:'0',bottom:'0',width:'0',height:'0',border:'0',visibility:'hidden'});
  document.body.appendChild(ifr);
  const cleanup=()=>{setTimeout(()=>{if(ifr&&ifr.parentNode)ifr.parentNode.removeChild(ifr);},1000);};
  ifr.onload=()=>{
    try{ifr.contentWindow.focus();ifr.contentWindow.print();}
    catch(e){alert('YazdГ„Вұrma baГ…ЕёlatГ„ВұlamadГ„Вұ: '+(e?.message||'bilinmeyen hata'));}
    cleanup();
  };
  const doc=ifr.contentDocument||ifr.contentWindow.document;
  doc.open();doc.write(html);doc.close();
};

function recordHareket({hesapId,tur,tutar,tarih,aciklama,kategori,musteriId,tedarikciId,faturaId,yontem}){
  const hareketler=LS.get('kasaHareketleri');
  const pre=kategori==='tahsilat'?'TAH':kategori==='odeme'?'ODE':'KH';
  const yeni={id:uid(),hesapId,tur,tutar:+tutar||0,tarih:tarih||today(),aciklama,belgeNo:yeniHareketNo(hareketler,pre),kategori:kategori||'diger',musteriId:musteriId||null,tedarikciId:tedarikciId||null,faturaId:faturaId||null,yontem:yontem||'nakit'};
  const nH=[...hareketler,yeni];LS.set('kasaHareketleri',nH);
  const hesaplar=LS.get('hesaplar');
  const nA=hesaplar.map(h=>h.id===hesapId?{...h,bakiye:(+h.bakiye||0)+(tur==='giris'?(+tutar||0):-(+tutar||0))}:h);
  LS.set('hesaplar',nA);
  return{hareketler:nH,hesaplar:nA};
}

// ГўвҖқвӮ¬ГўвҖқвӮ¬ Ortak UyarГ„Вұ Hesaplama (Dashboard + Bildirim Zili) ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
function getSistemUyarilari(){
  const araclar=LS.get('araclar'),bakimlar=LS.get('bakimlar'),isemirleri=LS.get('isemirleri'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri');
  const eK=esikKritik(),eU=esikUyari();
  const list=[];
  araclar.forEach(a=>{
    const sg=daysLeft(a.sigorta),mu=daysLeft(a.muayene);
    if(a.sigorta&&sg<=eU)list.push({tip:'Sigorta',baslik:`${a.ad} ГўвӮ¬вҖқ sigorta`,gun:sg,c:sg<=eK?C.red:C.yellow,icon:'ДҹЕёвҖәВЎГҜВёВҸ'});
    if(a.muayene&&mu<=eU)list.push({tip:'Muayene',baslik:`${a.ad} ГўвӮ¬вҖқ muayene`,gun:mu,c:mu<=eK?C.red:C.yellow,icon:'ДҹЕёвҖқВҚ'});
  });
  bakimlar.filter(b=>b.durum==='bekliyor').forEach(b=>{const a=araclar.find(x=>x.id===b.aracId);list.push({tip:'BakГ„Вұm',baslik:`${a?.ad||'ГўвӮ¬вҖқ'} ГўвӮ¬вҖқ ${b.tur||'bakГ„Вұm'} bekliyor`,gun:daysLeft(b.tarih),c:C.yellow,icon:'ДҹЕёвҖқВ§'});});
  isemirleri.filter(i=>i.durum!=='tamamlandi'&&i.oncelik==='acil').forEach(i=>{list.push({tip:'Г„В°Г…Её Emri',baslik:`${i.baslik} (acil)`,gun:daysLeft(i.tarih),c:C.red,icon:'ДҹЕёвҖңЕ’'});});
  (faturalar||[]).forEach(f=>{if(faturaDurum(f,hareketler)==='vadesiGecti')list.push({tip:'Fatura',baslik:`${cariAd(f)} ГўвӮ¬вҖқ vadesi geГғВ§ti`,gun:daysLeft(f.vadeTarih),c:C.red,icon:'ДҹЕёвҖҷВё'});});
  return list.sort((a,b)=>a.gun-b.gun);
}

function Warn({msg,c=C.yellow}){return <div style={S.alert(c)}>ГўЕЎВ ГҜВёВҸ {msg}</div>;}
function FG({label,children}){return <div style={S.fg}><label style={S.lbl}>{label}</label>{children}</div>;}
function StatCard({color,value,label,sub}){return(<div style={S.stat(color)}><div style={S.statVal}>{value}</div><div style={S.statLbl}>{label}</div>{sub&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}</div>);}

function LiveClock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000*30);return()=>clearInterval(id);},[]);
  return(<div className="fp-liveclock" style={{display:'flex',flexDirection:'column',alignItems:'flex-end',marginRight:2}}>
    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{t.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>
    <div style={{fontSize:10,color:C.muted}}>{t.toLocaleDateString('tr-TR',{day:'2-digit',month:'short',weekday:'short'})}</div>
  </div>);
}

function NotificationBell(){
  const [open,setOpen]=useState(false);

    window.addEventListener('fp-settings-changed',refresh);

function GlobalSearch({onNavigate}){

  const results=useMemo(()=>{
    if(q.trim().length<1)return[];
    const s=q.trim().toLocaleLowerCase('tr-TR');
    const out=[];
    LS.get('araclar').forEach(a=>{if((a.ad||'').toLocaleLowerCase('tr-TR').includes(s)||(a.plaka||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'AraГғВ§',icon:'ДҹЕёЕЎЕ“',label:`${a.ad} ${a.plaka?'ГӮВ· '+a.plaka:''}`,page:'arac'});});
    LS.get('operatorler').forEach(o=>{if((o.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'OperatГғВ¶r',icon:'ДҹЕёвҖҳВ·',label:o.ad,page:'operator'});});
    LS.get('isemirleri').forEach(i=>{if((i.baslik||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'Г„В°Г…Её Emri',icon:'ДҹЕёвҖңЕ’',label:i.baslik,page:'isemri'});});
    LS.get('projeler').forEach(p=>{if((p.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'Proje',icon:'ДҹЕёВҸвҖ”ГҜВёВҸ',label:p.ad,page:'proje'});});
    LS.get('musteriler').forEach(m=>{if((m.ad||'').toLocaleLowerCase('tr-TR').includes(s))out.push({tip:'MГғВјГ…Еёteri',icon:'ДҹЕёВ§Вҫ',label:m.ad,page:'muhasebe'});});
    return out.slice(0,8);
  },[q]);
  return(<div style={{position:'relative',flex:'0 1 260px',minWidth:120}}>

    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:12,color:C.muted,pointerEvents:'none'}}>ДҹЕёвҖқВҚ</span>
    {open&&q.trim()&&(<>
      <div style={{position:'fixed',inset:0,zIndex:19}} onClick={()=>setOpen(false)}/>
      <div style={{position:'absolute',left:0,top:'calc(100% + 6px)',width:'min(320px,90vw)',background:C.card,border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 10px 30px -8px rgba(0,0,0,.6)',zIndex:20,maxHeight:320,overflowY:'auto'}} className="fp-fade">
        {results.length===0?<div style={{padding:14,fontSize:12.5,color:C.muted,textAlign:'center'}}>SonuГғВ§ bulunamadГ„Вұ.</div>:results.map((r,i)=>(
          <div key={i} style={{padding:'9px 13px',borderBottom:`1px solid ${C.border}22`,display:'flex',gap:8,alignItems:'center',cursor:'pointer'}}
            onClick={()=>{onNavigate(r.page);setOpen(false);setQ('');}}>
            <span style={{fontSize:14}}>{r.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12.5,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.label}</div>
              <div style={{fontSize:10,color:C.muted}}>{r.tip}</div>
            </div>
          </div>
        ))}
      </div>
    </>)}
  </div>);
}

function Dashboard(){
  const araclar=LS.get('araclar'),bakimlar=LS.get('bakimlar'),yakitlar=LS.get('yakitlar'),operatorler=LS.get('operatorler'),gelirGider=LS.get('gelirGider'),isemirleri=LS.get('isemirleri');
  const aktifArac=araclar.filter(a=>a.durum==='aktif').length,bakimdaArac=araclar.filter(a=>a.durum==='bakimda').length,hurdaArac=araclar.filter(a=>a.durum==='hurda').length,bekleyenBakim=bakimlar.filter(b=>b.durum==='bekliyor').length;
  const buAyYakit=yakitlar.filter(y=>y.tarih?.startsWith(today().slice(0,7))).reduce((s,y)=>s+(+y.toplam||0),0);
  const buAyGelir=gelirGider.filter(g=>g.tur==='gelir'&&g.tarih?.startsWith(today().slice(0,7))).reduce((s,g)=>s+(+g.tutar||0),0);
  const buAyGider=gelirGider.filter(g=>g.tur==='gider'&&g.tarih?.startsWith(today().slice(0,7))).reduce((s,g)=>s+(+g.tutar||0),0);
  const uyarilar=getSistemUyarilari();
  const acikIsler=isemirleri.filter(i=>i.durum!=='tamamlandi');
  const hasRC=!!RC.LineChart;
  const aylikVeri=months().map(ay=>{
    const g=gelirGider.filter(x=>x.tarih?.startsWith(ay)&&x.tur==='gelir').reduce((s,x)=>s+(+x.tutar||0),0);
    const gi=gelirGider.filter(x=>x.tarih?.startsWith(ay)&&x.tur==='gider').reduce((s,x)=>s+(+x.tutar||0),0);
    return{ay:fmtMonth(ay).split(' ')[0],net:g-gi};
  });

      <StatCard color={C.accent} value={fmtTL(buAyYakit)} label="Bu Ay YakГ„Вұt"/>
      <StatCard color={buAyGelir-buAyGider>=0?C.green:C.red} value={fmtTL(buAyGelir-buAyGider)} label="Bu Ay Net" sub={`G:${fmtTL(buAyGelir)} / G:${fmtTL(buAyGider)}`}/>
    </div>
    <div style={S.g2}>
      <div style={S.card}>
        <div style={S.secTitle}>ГўЕЎВ ГҜВёВҸ Sistem UyarГ„ВұlarГ„Вұ {uyarilar.length>0&&<span style={S.badge(C.red)}>{uyarilar.length}</span>}</div>
        {uyarilar.length===0?<div style={{color:C.muted,fontSize:13}}>Aktif uyarГ„Вұ yok, her Г…Еёey yolunda ГўЕ“вҖҰ</div>:uyarilar.slice(0,6).map((u,i)=>(<div key={i} style={S.alert(u.c)}><span>{u.icon}</span><strong>{u.tip}</strong>&nbsp;ГўвӮ¬вҖқ {u.baslik}: {u.gun<=0?'SГғЕ“RESГ„В° DOLDU':`${u.gun} gГғВјn kaldГ„Вұ`}</div>))}
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>ДҹЕёвҖңЕ’ AГғВ§Г„Вұk Г„В°Г…Её Emirleri {acikIsler.length>0&&<span style={S.badge(C.blue)}>{acikIsler.length}</span>}</div>
        {acikIsler.length===0?<div style={{color:C.muted,fontSize:13}}>AГғВ§Г„Вұk iГ…Её emri yok.</div>:acikIsler.slice(0,6).map(i=>{const a=araclar.find(x=>x.id===i.aracId);return(<div key={i.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}22`}}><div><div style={{color:C.white,fontSize:13,fontWeight:600}}>{i.baslik}</div><div style={{fontSize:11,color:C.muted}}>{a?.ad||'ГўвӮ¬вҖқ'}</div></div><Badge d={i.durum}/></div>);})}
      </div>
    </div>
    <div style={S.g2}>
      <div style={S.card}>
        <div style={S.secTitle}>ДҹЕёвҖңЛҶ Son 6 Ay Net KГғВўr/Zarar Trendi</div>

function EvrakTakibi(){

      ):(
        <FG label="TedarikГғВ§i"><select style={S.sel} value={form.tedarikciId||''} onChange={e=>setForm(f=>({...f,tedarikciId:+e.target.value||null}))}><option value="">ГўвӮ¬вҖқ SeГғВ§iniz ГўвӮ¬вҖқ</option>{tedarikciler.map(t=><option key={t.id} value={t.id}>{t.ad}</option>)}</select></FG>

function CariEkstre({kisi,tur,onClose}){
  const idAlan=tur==='kesilen'?'musteriId':'tedarikciId';
  const kategori=tur==='kesilen'?'tahsilat':'odeme';
  const faturalar=LS.get('faturalar').filter(f=>f.tur===tur&&f[idAlan]===kisi.id);
  const hareketler=LS.get('kasaHareketleri').filter(h=>h.kategori===kategori&&h[idAlan]===kisi.id);
  const kayitlar=[
    ...faturalar.map(f=>({tarih:f.tarih,aciklama:`Fatura ${f.no}${f.aciklama?' ГўвӮ¬вҖқ '+f.aciklama:''}`,borc:tur==='kesilen'?(+f.toplam||0):0,alacak:tur==='alinan'?(+f.toplam||0):0})),
    ...hareketler.map(h=>({tarih:h.tarih,aciklama:`${tur==='kesilen'?'Tahsilat':'ГғвҖ“deme'} ${h.belgeNo}${h.aciklama?' ГўвӮ¬вҖқ '+h.aciklama:''}`,borc:tur==='alinan'?(+h.tutar||0):0,alacak:tur==='kesilen'?(+h.tutar||0):0})),
  ].sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  let bakiye=0;
  const satirlar=kayitlar.map(k=>{bakiye+=k.borc-k.alacak;return{...k,bakiye};});
  const sonBakiye=satirlar.length?satirlar[satirlar.length-1].bakiye:0;
  return(<Modal title={`ДҹЕёвҖңвҖһ Cari Hesap Ekstresi ГўвӮ¬вҖқ ${kisi.ad}`} onClose={onClose}>
    <div style={{overflowX:'auto'}}><table style={S.tbl}><thead><tr><th style={S.th}>Tarih</th><th style={S.th}>AГғВ§Г„Вұklama</th><th style={S.th}>BorГғВ§</th><th style={S.th}>Alacak</th><th style={S.th}>Bakiye</th></tr></thead>
    <tbody>{satirlar.length===0?(<tr><td style={S.td} colSpan={5}><span style={{color:C.muted}}>KayГ„Вұt yok.</span></td></tr>):satirlar.map((s,i)=>(<tr key={i}><td style={S.td}>{fmtDate(s.tarih)}</td><td style={S.td}><span style={{fontSize:12}}>{s.aciklama}</span></td><td style={S.td}>{s.borc?fmtTL(s.borc):'ГўвӮ¬вҖқ'}</td><td style={S.td}>{s.alacak?fmtTL(s.alacak):'ГўвӮ¬вҖқ'}</td><td style={S.td}><strong>{fmtTL(s.bakiye)}</strong></td></tr>))}</tbody></table></div>
    <div style={{...S.alert(sonBakiye>0?C.yellow:C.green),marginTop:14}}>{tur==='kesilen'?'GГғВјncel Alacak':'GГғВјncel BorГғВ§'}: <strong>{fmtTL(sonBakiye)}</strong></div>
  </Modal>);
}

  return(<Modal title={`ДҹЕёВ§Вҫ ${f.no}`} onClose={onClose} width={620}>
    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10,marginBottom:16}}>

    <div style={S.g3}>
      <StatCard color={C.blue} value={fmtDate(f.tarih)} label="Fatura Tarihi"/>
      <StatCard color={daysLeft(f.vadeTarih)<0&&kalan>0?C.red:C.purple} value={fmtDate(f.vadeTarih)} label="Vade Tarihi"/>
      <StatCard color={f.projeId?C.teal:C.muted} value={LS.get('projeler').find(p=>p.id===f.projeId)?.ad||'ГўвӮ¬вҖқ'} label="Г„В°lgili Proje"/>
    </div>
    <div style={S.card}>
      <table style={S.tbl}><tbody>
        <tr><td style={S.td}>Ara Toplam</td><td style={{...S.td,textAlign:'right'}}>{fmtTL(f.tutar)}</td></tr>
        <tr><td style={S.td}>KDV</td><td style={{...S.td,textAlign:'right'}}>{fmtTL(f.kdv)}</td></tr>
        <tr><td style={{...S.td,fontWeight:700,color:C.white,borderTop:`2px solid ${C.border}`}}>Genel Toplam</td><td style={{...S.td,textAlign:'right',borderTop:`2px solid ${C.border}`}}><strong style={{color:C.accent,fontSize:15}}>{fmtTL(f.toplam)}</strong></td></tr>
        <tr><td style={S.td}>{f.tur==='kesilen'?'Tahsil Edilen':'ГғвҖ“denen'}</td><td style={{...S.td,textAlign:'right',color:C.green}}>{fmtTL((+f.toplam||0)-kalan)}</td></tr>
        <tr><td style={S.td}>Kalan</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:kalan>0?C.yellow:C.green}}>{fmtTL(kalan)}</strong></td></tr>
      </tbody></table>
    </div>
    <div style={S.secTitle}>ДҹЕёвҖҷВі ГғвҖ“deme / Tahsilat GeГғВ§miГ…Еёi</div>
    {odemeler.length===0?<div style={{color:C.muted,fontSize:13,marginBottom:14}}>Bu faturaya ait kayГ„ВұtlГ„Вұ ГғВ¶deme yok.</div>:(
      <div style={{...S.card,padding:0}}><table style={S.tbl}><thead><tr><th style={S.th}>Belge No</th><th style={S.th}>Tarih</th><th style={S.th}>YГғВ¶ntem</th><th style={S.th}>Tutar</th></tr></thead>
      <tbody>{odemeler.map(h=>(<tr key={h.id}><td style={S.td}><code style={{fontSize:11,color:C.muted}}>{h.belgeNo}</code></td><td style={S.td}>{fmtDate(h.tarih)}</td><td style={S.td}>{YONTEM_LABEL[h.yontem]||h.yontem||'ГўвӮ¬вҖқ'}</td><td style={S.td}><strong style={{color:C.green}}>{fmtTL(h.tutar)}</strong></td></tr>))}</tbody></table></div>
    )}

      <button style={S.btnO} onClick={()=>printInvoice(f,hareketler)}>ДҹЕёвҖ“ВЁГҜВёВҸ YazdГ„Вұr / PDF</button>

function Musteriler(){
  const [musteriler,setMusteriler]=useState(LS.get('musteriler'));
  const faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri');
  const [modal,setModal]=useState(false),[form,setForm]=useState({});
  const [ekstreId,setEkstreId]=useState(null);
  const save=()=>{const n=form.id?musteriler.map(m=>m.id===form.id?form:m):[...musteriler,{...form,id:uid()}];LS.set('musteriler',n);setMusteriler(n);setModal(false);};
  const del=(id)=>{
    if(faturalar.some(f=>f.tur==='kesilen'&&f.musteriId===id)){alert('Bu mГғВјГ…Еёteriye ait faturalar var. ГғвҖ“nce ilgili faturalarГ„Вұ silin veya dГғВјzenleyin.');return;}
    const n=musteriler.filter(m=>m.id!==id);LS.set('musteriler',n);setMusteriler(n);
  };
  const zengin=musteriler.map(m=>({...m,...musteriBakiye(m.id,faturalar,hareketler)}));
  const toplamAlacak=zengin.reduce((s,m)=>s+Math.max(0,m.bakiye),0);
  const ekstreMusteri=ekstreId?musteriler.find(m=>m.id===ekstreId):null;
  return(<div>
    <div style={S.g3}><StatCard color={C.blue} value={musteriler.length} label="KayГ„ВұtlГ„Вұ MГғВјГ…Еёteri"/><StatCard color={C.green} value={fmtTL(zengin.reduce((s,m)=>s+m.toplamFatura,0))} label="Toplam Fatura TutarГ„Вұ"/><StatCard color={C.yellow} value={fmtTL(toplamAlacak)} label="Toplam AГғВ§Г„Вұk Alacak"/></div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}><button style={S.btn()} onClick={()=>{setForm({});setModal(true);}}>ГҜВјвҖ№ MГғВјГ…Еёteri Ekle</button></div>
    <div style={S.card}><table style={S.tbl}><thead><tr><th style={S.th}>MГғВјГ…Еёteri</th><th style={S.th}>Yetkili</th><th style={S.th}>Telefon</th><th style={S.th}>Toplam Fatura</th><th style={S.th}>Tahsil Edilen</th><th style={S.th}>Bakiye (Alacak)</th><th style={S.th}></th></tr></thead>
    <tbody>{zengin.map(m=>(<tr key={m.id}>
      <td style={S.td}><strong style={{color:C.white}}>{m.ad}</strong></td>
      <td style={S.td}>{m.yetkili||'ГўвӮ¬вҖқ'}</td>
      <td style={S.td}>{m.tel||'ГўвӮ¬вҖқ'}</td>
      <td style={S.td}>{fmtTL(m.toplamFatura)}</td>
      <td style={S.td}>{fmtTL(m.toplamTahsilat)}</td>
      <td style={S.td}><strong style={{color:m.bakiye>0?C.yellow:C.green}}>{fmtTL(m.bakiye)}</strong></td>
      <td style={S.td}><div style={{display:'flex',gap:5}}><button style={S.btnO} onClick={()=>setEkstreId(m.id)}>ДҹЕёвҖңвҖһ Ekstre</button><button style={S.btnO} onClick={()=>{setForm(m);setModal(true);}}>ГўЕ“ВҸГҜВёВҸ</button><button style={S.btnR} onClick={()=>del(m.id)}>ДҹЕёвҖ”вҖҳ</button></div></td>
    </tr>))}</tbody></table></div>
    {modal&&(<Modal title={form.id?'MГғВјГ…Еёteri DГғВјzenle':'Yeni MГғВјГ…Еёteri'} onClose={()=>setModal(false)}>
      <FG label="MГғВјГ…Еёteri AdГ„Вұ / ГғЕ“nvanГ„Вұ"><input style={S.inp} value={form.ad||''} onChange={e=>setForm(f=>({...f,ad:e.target.value}))}/></FG>
      <div style={S.g2}><FG label="Yetkili KiГ…Еёi"><input style={S.inp} value={form.yetkili||''} onChange={e=>setForm(f=>({...f,yetkili:e.target.value}))}/></FG><FG label="Telefon"><input style={S.inp} value={form.tel||''} onChange={e=>setForm(f=>({...f,tel:e.target.value}))}/></FG></div>
      <div style={S.g2}><FG label="E-posta"><input style={S.inp} value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></FG><FG label="Vergi No"><input style={S.inp} value={form.vergiNo||''} onChange={e=>setForm(f=>({...f,vergiNo:e.target.value}))}/></FG></div>
      <div style={S.g2}><FG label="Vergi Dairesi"><input style={S.inp} value={form.vergiDaire||''} onChange={e=>setForm(f=>({...f,vergiDaire:e.target.value}))}/></FG><FG label="Adres"><input style={S.inp} value={form.adres||''} onChange={e=>setForm(f=>({...f,adres:e.target.value}))}/></FG></div>
      <FG label="Notlar"><textarea style={S.ta} value={form.notlar||''} onChange={e=>setForm(f=>({...f,notlar:e.target.value}))}/></FG>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setModal(false)}>Г„В°ptal</button><button style={S.btn()} onClick={save}>Kaydet</button></div>
    </Modal>)}
    {ekstreMusteri&&<CariEkstre kisi={ekstreMusteri} tur="kesilen" onClose={()=>setEkstreId(null)}/>}
  </div>);

function Tedarikciler(){
  const [tedarikciler,setTedarikciler]=useState(LS.get('tedarikciler'));
  const faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri');
  const [modal,setModal]=useState(false),[form,setForm]=useState({});
  const [ekstreId,setEkstreId]=useState(null);
  const save=()=>{const n=form.id?tedarikciler.map(t=>t.id===form.id?form:t):[...tedarikciler,{...form,id:uid()}];LS.set('tedarikciler',n);setTedarikciler(n);setModal(false);};
  const del=(id)=>{
    if(faturalar.some(f=>f.tur==='alinan'&&f.tedarikciId===id)){alert('Bu tedarikГғВ§iye ait faturalar var. ГғвҖ“nce ilgili faturalarГ„Вұ silin veya dГғВјzenleyin.');return;}
    const n=tedarikciler.filter(t=>t.id!==id);LS.set('tedarikciler',n);setTedarikciler(n);
  };
  const zengin=tedarikciler.map(t=>({...t,...tedarikciBakiye(t.id,faturalar,hareketler)}));
  const toplamBorc=zengin.reduce((s,t)=>s+Math.max(0,t.bakiye),0);
  const ekstreTedarikci=ekstreId?tedarikciler.find(t=>t.id===ekstreId):null;

    const dump={};ALL_DATA_KEYS.forEach(k=>{dump[k]=k==='ayarlar'?getSettings():LS.get(k);});

        <div style={S.secTitle}>ДҹЕёвҖңЕ  Veri TablolarГ„Вұ</div>

        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button style={S.btnO} onClick={varsayilanaDon}>ГўвҖ Вә AyarlarГ„Вұ SГ„ВұfГ„Вұrla</button>
          <button style={S.btnO} onClick={demoyeDon}>ДҹЕёвҖқвҖһ Demo Verilerle DeГ„ЕёiГ…Еёtir</button>

      <div style={{fontSize:13,color:C.text,lineHeight:1.9}}>

        <div><strong style={{color:C.white}}>Veri Depolama:</strong> TarayГ„ВұcГ„Вұ localStorage (ГғВ§evrimdГ„ВұГ…ЕёГ„Вұ ГғВ§alГ„ВұГ…ЕёГ„Вұr)</div>
        <div><strong style={{color:C.white}}>ModГғВјl SayГ„ВұsГ„Вұ:</strong> {ALL_PAGES?.length||'ГўвӮ¬вҖқ'}</div>
      </div>
      <InfoBox color={C.blue}>ГўвҖһВ№ГҜВёВҸ TГғВјm veriler yalnГ„Вұzca bu tarayГ„ВұcГ„Вұda saklanГ„Вұr. FarklГ„Вұ bir cihaz veya tarayГ„ВұcГ„Вұda kullanmak iГғВ§in Veri YГғВ¶netimi sekmesinden yedek alГ„Вұp geri yГғВјkleyin.</InfoBox>
    </div>)}
  </div>);
}

function App(){
  useEffect(()=>{seed();ensureSettings();},[]);
  const [active,setActive]=useState(()=>{const h=window.location.hash.replace('#','');return ALL_PAGES.some(p=>p.id===h)?h:'dashboard';});
  const [menuOpen,setMenuOpen]=useState(false);
  const [,forceThemeRender]=useState(0);

  useEffect(()=>{
    const applyTheme=()=>{
      const st=getSettings();
      C.accent=ACCENT_MAP[st.vurguRenk]||'#f59e0b';
      document.documentElement.style.setProperty('--accent',C.accent);
      document.documentElement.style.setProperty('--accent-soft',hexA(C.accent,.16));
      forceThemeRender(x=>x+1);
    };
    applyTheme();
    window.addEventListener('fp-settings-changed',applyTheme);
    return ()=>window.removeEventListener('fp-settings-changed',applyTheme);
  },[]);
  const sidebarKompakt=getSettings().sidebarKompakt;

  useEffect(()=>{window.location.hash=active;},[active]);

  useEffect(()=>{
    const sb=document.getElementById('fp-sidebar'),ov=document.getElementById('fp-overlay');
    if(sb)sb.classList.toggle('open',menuOpen);
    if(ov)ov.classList.toggle('show',menuOpen);
  },[menuOpen]);

  const navigate=(id)=>{setActive(id);setMenuOpen(false);};
  const current=ALL_PAGES.find(p=>p.id===active)||ALL_PAGES[0];
  const CurrentComp=current.comp;

  return(
    <div style={S.app}>
      <div id="fp-overlay" onClick={()=>setMenuOpen(false)}/>
      <aside id="fp-sidebar" style={{...S.sidebar,width:sidebarKompakt?70:240}}>
        <div style={S.logo}>
          <div style={S.logoText}>{sidebarKompakt?'ДҹЕёЕЎЕ“':'ДҹЕёЕЎЕ“ FiloPro'}</div>
          {!sidebarKompakt&&<div style={S.logoSub}>Г„В°Г…Её Makinesi YГғВ¶netim Sistemi</div>}
        </div>
        <nav style={{flex:1,paddingBottom:16}}>
          {PAGES.map(group=>(<div key={group.group}>
            {!sidebarKompakt&&<div style={S.navGroup}>{group.group}</div>}
            {group.items.map(item=>(<div key={item.id} style={S.navItem(active===item.id)} onClick={()=>navigate(item.id)} title={item.label}><span>{item.icon}</span>{!sidebarKompakt&&<span>{item.label}</span>}</div>))}
          </div>))}
        </nav>
        {!sidebarKompakt&&<div style={{padding:'14px 16px',borderTop:`1px solid ${C.border}`,fontSize:10,color:C.muted,flexShrink:0}}>
          Faz 1 + 2 + 3 + 4 + Ayarlar ГўвӮ¬вҖқ v4.1.0
        </div>}
      </aside>
      <main style={S.main}>
        <header style={S.header}>
          <button id="fp-menu-btn" onClick={()=>setMenuOpen(true)}>ГўЛңВ°</button>
          <div style={S.headerTitle}><span>{current.icon}</span><span className="fp-headertitle-text">{current.label}</span></div>
          <GlobalSearch onNavigate={navigate}/>
          <NotificationBell/>
          <div style={{width:1,height:26,background:C.border,margin:'0 2px'}}/>
          <LiveClock/>
        </header>
        <div style={S.content}>
          <div key={active} className="fp-fade">
            <CurrentComp/>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
