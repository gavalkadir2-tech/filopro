    const cTel=cariTel(i.cariId);
    const turAdi=servisIdSet.has(i.tur)?servisLabelMap[i.tur]:'Genel İş Emri';
    const sebepLabel=SERVIS_SEBEP_LABEL[i.tur]?.[i.servisSebep];
    const satirlar=[
      `📌 İş Emri: ${i.baslik}`,
      `Öncelik: ${oncLabel[i.oncelik]||i.oncelik||'—'}`,
      `İş Türü: ${turAdi}`,
      c?`Cari: ${c.ad}${cTel?` — 📞 ${cTel}`:''} (${i.cariTipi==='tedarikci'?'Tedarikçi':'Müşteri'})`:null,
      a?`Hizmet Aracı: ${a.ad}${a.plaka?` — ${a.plaka}`:''}`:null,
      i.fisNo?`Fiş No: ${i.fisNo}`:null,
      sebepLabel?`Talep Detayı/Sebebi: ${sebepLabel}`:null,
      i.talepSaati?`Talep Saati: ${i.talepSaati}`:null,
      i.olayYeri?`Olay Yeri / Hizmet Adresi: ${i.olayYeri}`:null,
      i.hedefYer?`Hedef Yer: ${i.hedefYer}`:null,
      (i.musteriPlaka||i.musteriAracModel)?`Müşteri Aracı/Ekipmanı: ${i.musteriPlaka||'—'}${i.musteriAracModel?` — ${i.musteriAracModel}`:''}`:null,
      i.bitis?`Bitiş: ${fmtDate(i.bitis)}`:null,
      i.aciklama?`Açıklama: ${i.aciklama}`:null,
    ].filter(Boolean);
    return satirlar.join('\n');
  };
  const isEmriWaLink=(i)=>{const per=personel.find(p=>p.id===i.opId);return per?.tel?whatsappLinkOlustur(per.tel,isEmriMesaji(i)):null;};
  const otoBaslik=(f)=>{
    if(servisIdSet.has(f.tur)){
      const sebepLabel=SERVIS_SEBEP_LABEL[f.tur]?.[f.servisSebep];
      return `${servisLabelMap[f.tur]}${sebepLabel?` — ${sebepLabel}`:''}`;
    }
    return 'Genel İş Emri';
  };
  const save=()=>{
    const hata=validate(form,{
      cariId:[f=>!!(f.cariTipi&&f.cariId),'Cari (müşteri/tedarikçi) seçimi zorunludur.'],
      aracId:[f=>!!f.aracId,'Araç seçimi zorunludur.'],
      opId:[f=>!!f.opId,'Sorumlu personel/şoför seçimi zorunludur.'],
      olayYeri:[f=>!servisIdSet.has(f.tur)||!!f.olayYeri?.trim(),'Olay yeri / hizmet adresi zorunludur.'],
    });
    if(hata){setErr(hata);return;}
    setErr('');
    const formNihai={...form,baslik:otoBaslik(form)};
    const yeniKayit=form.id?null:{...formNihai,id:uid(),durum:form.durum||'acik'};
    const n=form.id?isler.map(i=>i.id===form.id?formNihai:i):[...isler,yeniKayit];LS.set('isemirleri',n);setIsler(n);setModal(false);
    if(yeniKayit&&getSettings().bildirimOtomatikGonder){
      setBildirimGonderiliyor(true);
      isEmriBildirimGonder(yeniKayit,personel).then(sonuc=>{setBildirimSonuc(sonuc);setBildirimGonderiliyor(false);});
    }
  };
  const move=(id,durum)=>{const n=isler.map(i=>i.id===id?{...i,durum}:i);LS.set('isemirleri',n);setIsler(n);};
  const del=async(id)=>{if(!(await fpConfirm('Bu iş emri silinsin mi?')))return;const n=isler.filter(i=>i.id!==id);LS.set('isemirleri',n);setIsler(n);};
  // İş emri tamamlanınca: cari + tutar bilgisiyle otomatik fatura oluşturup muhasebeye gönderir.
  const tamamlaVeFaturalastir=(i)=>{
    if(i.faturaId){move(i.id,'tamamlandi');return;}
    if(!i.cariTipi||!i.cariId){fpToast('Faturalandırmak için önce bir müşteri veya tedarikçi seçmelisiniz.');return;}
    if(!(+i.tutar>0)){fpToast("Faturalandırmak için tutar 0'dan büyük olmalıdır. Lütfen iş emrini düzenleyip tutar girin.");return;}
    const tur=i.cariTipi==='tedarikci'?'alinan':'kesilen';
    const faturalar=LS.get('faturalar');
    const toplam=(+i.tutar||0)+(+i.kdv||0);
    const kayit={
      id:uid(),tur,
      musteriId:tur==='kesilen'?i.cariId:null,
      tedarikciId:tur==='alinan'?i.cariId:null,
      tarih:today(),tutar:+i.tutar||0,kdv:+i.kdv||0,toplam,
      aciklama:`${i.baslik}${i.fisNo?` (Fiş No: ${i.fisNo})`:''}`,
      no:`${tur==='kesilen'?'F':'AF'}-${today().slice(0,7)}-${String(faturalar.length+1).padStart(3,'0')}`,
      isEmriId:i.id,
    };
    LS.set('faturalar',[...faturalar,kayit]);
    const n=isler.map(x=>x.id===i.id?{...x,durum:'tamamlandi',faturaId:kayit.id}:x);LS.set('isemirleri',n);setIsler(n);
    const loglar=LS.get('islemLoglari');
    LS.set('islemLoglari',[{id:uid(),kullanici:'Sistem',islem:'İş Emri Faturalandı',detay:`${i.baslik} → ${kayit.no} (${fmtTL(toplam)}), Cari: ${cariAdi(i)}`,tarih:new Date().toLocaleString('tr-TR')},...loglar]);
    fpToast(`✅ İş emri tamamlandı ve ${kayit.no} numaralı fatura ile muhasebeye gönderildi.`);
  };
  const kolonlar=[['acik','🆕 Açık',C.muted],['devamediyor','🔄 Devam',C.yellow],['tamamlandi','✅ Tamamlandı',C.green]];
  const oncRenk={kritik:C.red,normal:C.blue,dusuk:C.muted};
  const oncLabel={kritik:'Kritik',normal:'Normal',dusuk:'Düşük'};
  const durumLabel={acik:'Açık',devamediyor:'Devam Ediyor',tamamlandi:'Tamamlandı'};
  const turLabel={genel:'📌 Genel İş Emri',...servisLabelMap};
  const islerFiltreli=turFiltre==='tumu'?isler:isler.filter(i=>(i.tur||'genel')===turFiltre);
  const disaAktarSatirlar=isler.map(i=>{const a=araclar.find(x=>x.id===i.aracId),per=personel.find(x=>x.id===i.opId),sh=servisIdSet.has(i.tur);return[turLabel[i.tur||'genel'],i.baslik,cariAdi(i),a?.ad||'—',per?.ad||'—',sh?(i.olayYeri||''):'',sh?(i.musteriPlaka||''):'',i.fisNo||'',+i.tutar||0,oncLabel[i.oncelik]||i.oncelik,durumLabel[i.durum]||i.durum,fmtDate(i.bitis),i.aciklama||''];});
  return(<div>
    {bildirimGonderiliyor&&<InfoBox color={C.blue}>⏳ İş emri bildirimi gönderiliyor...</InfoBox>}
    {bildirimSonuc&&(<div style={S.card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={S.secTitle}>📨 İş Emri Bildirimi</div><button style={S.btnO} onClick={()=>setBildirimSonuc(null)}>✕ Kapat</button></div>
      {bildirimSonuc.telegram.length===0&&bildirimSonuc.whatsapp.length===0&&<div style={{fontSize:12,color:C.muted}}>Personel veya muhasebe için WhatsApp telefonu / Telegram Chat ID tanımlı değil. Ayarlar &gt; Bildirimler ve Personel kartlarından tanımlayabilirsiniz.</div>}
      {bildirimSonuc.telegram.map((t,i)=>(<div key={i} style={{fontSize:12,color:t.basarili?C.green:C.red,marginTop:6}}>{t.basarili?'✅':'❌'} Telegram — {t.ad}{!t.basarili&&t.hata?`: ${t.hata}`:''}</div>))}
      {bildirimSonuc.whatsapp.length>0&&<div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>{bildirimSonuc.whatsapp.map((w,i)=>(<a key={i} href={w.link} target="_blank" rel="noopener noreferrer" style={{...S.btn(C.green),textDecoration:'none',display:'inline-block'}}>📲 {w.ad} — WhatsApp'tan Gönder</a>))}</div>}
      {bildirimSonuc.whatsapp.length>0&&<div style={{fontSize:11,color:C.muted,marginTop:8}}>ℹ️ WhatsApp'ta otomatik gönderim yoktur (Meta onaylı Business API gerekir); mesaj hazır şekilde açılır, göndermek için WhatsApp içinde tek tıklama gerekir.</div>}
    </div>)}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{[['tumu','Tümü'],['genel','📌 Genel'],...servisTipleri.map(([k,icon,l])=>[k,`${icon} ${l}`])].map(([k,l])=>(<button key={k} style={{...S.btn(turFiltre===k?C.accent:'transparent'),border:`1px solid ${turFiltre===k?C.accent:C.border}`,color:turFiltre===k?'#000':C.muted,fontSize:12}} onClick={()=>setTurFiltre(k)}>{l} ({k==='tumu'?isler.length:isler.filter(i=>(i.tur||'genel')===k).length})</button>))}</div>
      <div style={{display:'flex',gap:8}}>
        <ExportMenu headers={['İş Türü','Yapılacak İş','Cari','Araç','Sorumlu Personel','Olay Yeri','Müşteri Aracı (Plaka)','Fiş No','Tutar','Öncelik','Durum','Bitiş Tarihi','Açıklama']} rows={disaAktarSatirlar} filename="filopro-isemirleri" sheetName="İş Emirleri"/>
        <button style={S.btnO} onClick={()=>{setForm({tarih:today(),talepSaati:nowTime(),oncelik:'kritik',tur:'kurtarici',olayYeri:'Akhisar',hedefYer:'Akhisar'});setErr('');setModal(true);}}>🚨 Saha Hizmeti Talebi</button>
        <button style={S.btn()} onClick={()=>{setForm({tarih:today(),oncelik:'normal',tur:'genel',olayYeri:'Akhisar',hedefYer:'Akhisar'});setErr('');setModal(true);}}>＋ İş Emri Oluştur</button>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:16}}>
      {kolonlar.map(([durum,label,renk])=>(<div key={durum}><div style={{...S.secTitle,color:renk,marginBottom:12}}>{label} ({islerFiltreli.filter(i=>i.durum===durum).length})</div>
      {islerFiltreli.filter(i=>i.durum===durum).map(i=>{const a=araclar.find(x=>x.id===i.aracId),per=personel.find(x=>x.id===i.opId);const sahaServisi=servisIdSet.has(i.tur);const servisIcon=servisTipleri.find(([k])=>k===i.tur)?.[1]||'🚨';return(<div key={i.id} style={{...S.card,marginBottom:10,borderLeft:`3px solid ${sahaServisi?C.red:oncRenk[i.oncelik]}`,cursor:'pointer'}} onClick={()=>{setForm(i);setErr('');setModal(true);}}><div style={{fontWeight:700,color:C.white,fontSize:13}}>{sahaServisi&&`${servisIcon} `}{i.baslik}</div><div style={{fontSize:11,color:C.accent,marginTop:4}}>{i.cariTipi==='tedarikci'?'🏭':'🧾'} {cariAdi(i)}</div><div style={{fontSize:11,color:C.muted,marginTop:4}}>{a?.ad||'—'}{per?` · 🧑‍💼 ${per.ad}`:''}</div>{sahaServisi&&i.olayYeri&&<div style={{fontSize:11,color:C.red,marginTop:2}}>📍 {i.olayYeri}</div>}{sahaServisi&&i.musteriPlaka&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>🚗 {i.musteriPlaka}{i.musteriAracModel?` · ${i.musteriAracModel}`:''}</div>}{i.fisNo&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>🧾 Fiş No: {i.fisNo}</div>}{+i.tutar>0&&<div style={{fontSize:11,color:C.text,marginTop:2}}>💰 {fmtTL(i.tutar)}</div>}<div style={{fontSize:11,color:C.muted,marginTop:4}}>📅 {fmtDate(i.bitis)}</div>{i.faturaId&&<div style={{fontSize:11,color:C.green,marginTop:4}}>✅ Faturalandı</div>}{(i.evraklar||[]).length>0&&<div style={{fontSize:11,color:C.blue,marginTop:4}}>📎 {i.evraklar.length} evrak</div>}<div style={{display:'flex',gap:5,marginTop:10,flexWrap:'wrap'}} onClick={e=>e.stopPropagation()}>{durum!=='devamediyor'&&durum!=='tamamlandi'&&<button style={S.btnO} onClick={()=>move(i.id,'devamediyor')}>🔄</button>}{durum!=='tamamlandi'&&<button style={S.btn(C.green)} onClick={()=>tamamlaVeFaturalastir(i)} title="Tamamla ve muhasebeye gönder">✓</button>}{isEmriWaLink(i)&&<a href={isEmriWaLink(i)} target="_blank" rel="noopener noreferrer" style={{...S.btnO,textDecoration:'none',display:'inline-block'}} title="Personele WhatsApp'tan Gönder">📲</a>}<button style={S.btnR} onClick={()=>del(i.id)}>🗑</button></div></div>);})}</div>))}
    </div>
    {modal&&(<Modal title={form.id?(servisIdSet.has(form.tur)?'Saha Hizmeti Talebi Düzenle':'İş Emri Düzenle'):(servisIdSet.has(form.tur)?'Yeni Saha Hizmeti Talebi':'Yeni İş Emri')} onClose={()=>setModal(false)}>
      <FG label="İş Türü"><select style={S.sel} value={form.tur||'genel'} onChange={e=>{const yeniTur=e.target.value;setForm(f=>({...f,tur:yeniTur,servisSebep:null,aracId:null,talepSaati:servisIdSet.has(yeniTur)?(f.talepSaati||nowTime()):f.talepSaati}));}}><option value="genel">📌 Genel İş Emri</option>{servisTipleri.map(([k,icon,l])=><option key={k} value={k}>{icon} {l}</option>)}</select></FG>
      {servisIdSet.has(form.tur)&&(<div style={{...S.card,background:`${C.red}11`,borderColor:`${C.red}44`,marginBottom:16}}>
        <div style={{...S.secTitle,color:C.red,marginBottom:10}}>{servisLabelMap[form.tur]} Bilgileri</div>
        <div style={S.g2}>
          <FG label="Talep Detayı/Sebebi"><select style={S.sel} value={form.servisSebep||''} onChange={e=>setForm(f=>({...f,servisSebep:e.target.value}))}><option value="">— Seçiniz —</option>{Object.entries(SERVIS_SEBEP_LABEL[form.tur]||{diger:'Diğer'}).map(([k,l])=><option key={k} value={k}>{l}</option>)}</select></FG>
          <FG label="Talep Saati"><input type="time" style={S.inp} value={form.talepSaati||''} onChange={e=>setForm(f=>({...f,talepSaati:e.target.value}))}/></FG>
        </div>
        <FG label="Olay Yeri / Hizmet Adresi"><input style={S.inp} value={form.olayYeri||''} onChange={e=>setForm(f=>({...f,olayYeri:e.target.value}))} placeholder="Örn: D-100 Karayolu 45. km"/></FG>
        <FG label="Hedef Yer (varış/teslim noktası)"><input style={S.inp} value={form.hedefYer||''} onChange={e=>setForm(f=>({...f,hedefYer:e.target.value}))} placeholder="Opsiyonel"/></FG>
        <div style={S.g2}>
          <FG label="Müşteri Aracı/Ekipmanı — Plaka veya Tanım"><input style={S.inp} value={form.musteriPlaka||''} onChange={e=>setForm(f=>({...f,musteriPlaka:e.target.value}))} placeholder="34 ABC 123 / Ekipman adı"/></FG>
          <FG label="Marka/Model / Ek Bilgi"><input style={S.inp} value={form.musteriAracModel||''} onChange={e=>setForm(f=>({...f,musteriAracModel:e.target.value}))} placeholder="Opsiyonel"/></FG>
        </div>
      </div>)}
      <FG label="Cari (Müşteri / Tedarikçi)"><div style={S.selRow}><select style={S.sel} value={form.cariId||''} onChange={e=>{const cid=idVal(e.target.value);const c=cariler.find(x=>x.id===cid);const tipler=c?.tipler||[];const cariTipi=tipler.includes('musteri')?'musteri':(tipler.includes('tedarikci')?'tedarikci':'musteri');setForm(f=>({...f,cariId:cid,cariTipi}));}}><option value="">— Seçiniz —</option>{cariler.map(c=><option key={c.id} value={c.id}>{c.ad}{(c.tipler||[]).length>1?' (Müşteri+Tedarikçi)':''}</option>)}</select><button type="button" style={S.btnAdd} title="Yeni Cari Ekle" onClick={()=>setHizliEkle(true)}>＋</button></div></FG>
      <div style={S.g2}><FG label={servisIdSet.has(form.tur)?`${servisLabelMap[form.tur]} Aracı`:'Araç'}><select style={S.sel} value={form.aracId||''} onChange={e=>setForm(f=>({...f,aracId:idVal(e.target.value)}))}><option value="">— Seçiniz —</option>{araclarFiltreli(form.tur).map(a=><option key={a.id} value={a.id}>{a.ad}</option>)}</select>{servisIdSet.has(form.tur)&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>ℹ️ Araç listesi "{servisLabelMap[form.tur]}" kategorisine göre daraltılmıştır (uygun araç bulunamazsa tüm araçlar gösterilir).</div>}</FG><FG label="Sorumlu Personel / Şoför"><select style={S.sel} value={form.opId||''} onChange={e=>setForm(f=>({...f,opId:idVal(e.target.value)}))}><option value="">— Seçiniz —</option>{personel.map(o=><option key={o.id} value={o.id}>{o.ad}</option>)}</select></FG></div>
      <div style={S.g2}><FG label="Bitiş Tarihi"><input type="date" style={S.inp} value={form.bitis||''} onChange={e=>setForm(f=>({...f,bitis:e.target.value}))}/></FG><FG label="Öncelik"><select style={S.sel} value={form.oncelik||'normal'} onChange={e=>setForm(f=>({...f,oncelik:e.target.value}))}><option value="kritik">🔴 Kritik</option><option value="normal">🔵 Normal</option><option value="dusuk">⚪ Düşük</option></select></FG></div>
      <FG label="Fiş No"><input style={S.inp} value={form.fisNo||''} onChange={e=>setForm(f=>({...f,fisNo:e.target.value}))} placeholder="Örn: 000123"/></FG>
      <TutarKdvAlani form={form} setForm={setForm}/>
      {form.faturaId&&<div style={S.alert(C.green)}>✅ Bu iş emri faturalandırılmış durumda. Muhasebe &gt; Faturalar bölümünden görüntüleyebilirsiniz.</div>}
      {form.id&&(isEmriWaLink(form)?<div style={{marginBottom:12}}><a href={isEmriWaLink(form)} target="_blank" rel="noopener noreferrer" style={{...S.btn(C.green),textDecoration:'none',display:'inline-block'}}>📲 Personele WhatsApp'tan Gönder</a></div>:<div style={{fontSize:11,color:C.muted,marginBottom:12}}>ℹ️ Sorumlu personelin telefon numarası tanımlı değil, bu yüzden WhatsApp gönderilemiyor.</div>)}
      <FG label="Açıklama"><textarea style={S.ta} value={form.aciklama||''} onChange={e=>setForm(f=>({...f,aciklama:e.target.value}))} placeholder="Yapılacak işin detayları..."/></FG>
      <FG label="Evraklar (Fotoğraf, Fiş, Sözleşme vb.)">
        <input type="file" style={S.inp} onChange={e=>{
          const dosya=e.target.files[0];
          if(!dosya)return;
          const r=new FileReader();
          r.onload=async()=>{
            const cfg=getSyncCfg();
            if(cfg.token && cfg.url){
              try {
                fpToast('Dosya sunucuya yükleniyor...');
                const uploadRes = await fetch(`${cfg.url}/api/uploads`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${cfg.token}`
                  },
                  body: JSON.stringify({ fileName: dosya.name, fileData: r.result })
                });
                const uploadData = await uploadRes.json();
                if(!uploadRes.ok) throw new Error(uploadData.error || 'Yüklenemedi');
                
                const absoluteUrl = `${cfg.url}${uploadData.url}`;
                setForm(f=>({...f,evraklar:[...(f.evraklar||[]),{id:uid(),ad:dosya.name,veri:absoluteUrl,tarih:today(),isServerFile:true}]}));
                fpToast('✅ Dosya yüklendi.', 'success');
              } catch(err) {
                fpToast('Dosya sunucuya yüklenemedi: ' + err.message, 'error');
              }
            } else {
              setForm(f=>({...f,evraklar:[...(f.evraklar||[]),{id:uid(),ad:dosya.name,veri:r.result,tarih:today()}]}));
            }
          };
          r.readAsDataURL(dosya);
        }}/>
        {(form.evraklar||[]).length>0&&<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>{form.evraklar.map(b=>{
          const fileLink = b.isServerFile ? `${b.veri}?token=${getSyncCfg().token}` : b.veri;
          return (
            <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,background:C.input,borderRadius:6,padding:'6px 10px'}}>
              <a href={fileLink} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:'none'}}>📎 {b.ad}</a>
              <button type="button" style={S.btnR} onClick={()=>setForm(f=>({...f,evraklar:f.evraklar.filter(x=>x.id!==b.id)}))}>🗑</button>
            </div>
          );
        })}</div>}
      </FG>
      <FormError msg={err}/>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setModal(false)}>İptal</button><button style={S.btn()} onClick={save}>Kaydet</button></div>
    </Modal>)}
    {hizliEkle&&<HizliCariEkle tip="musteri" onClose={()=>setHizliEkle(false)} onEklendi={(yeni,n)=>{setCariler(n);setForm(f=>({...f,cariId:yeni.id,cariTipi:(yeni.tipler||[]).includes('musteri')?'musteri':'tedarikci'}));setHizliEkle(false);}}/>}
  </div>);
}

// ── Görevler (Genel Görev Takip Modülü) ────────────────────────────────────────
function Gorevler(){
  const [gorevler,setGorevler]=useState(LS.get('gorevler')),[modal,setModal]=useState(false),[form,setForm]=useState({}),[err,setErr]=useState('');
  const personel=LS.get('personel')||[];
  const save=()=>{
    const hata=validate(form,{baslik:[f=>!!f.baslik?.trim(),'Görev başlığı zorunludur.']});
    if(hata){setErr(hata);return;}
    setErr('');
    const n=form.id?gorevler.map(g=>g.id===form.id?form:g):[...gorevler,{...form,id:uid(),durum:form.durum||'acik'}];LS.set('gorevler',n);setGorevler(n);setModal(false);
  };

  const [err,setErr]=useState('');
  const save=()=>{
    const hata=validate(form,{musteriId:[f=>!!(f.musteriId||f.tedarikciId),'Cari (müşteri/tedarikçi) seçimi zorunludur.'],tutar:[f=>+f.tutar>0,'Tutar 0\'dan büyük olmalıdır.']});
    if(hata){setErr(hata);return;}
    setErr('');
    const toplam=(+form.tutar||0)+(+form.kdv||0);
    const n=form.id?faturalar.map(f=>f.id===form.id?{...form,toplam}:f):[...faturalar,{...form,id:uid(),toplam,no:form.no||sonrakiFaturaNo(form.tur,faturalar)}];
    LS.set('faturalar',n);setFaturalar(n);setModal(false);
  };
  const del=(id)=>{const n=faturalar.filter(f=>f.id!==id);LS.set('faturalar',n);setFaturalar(n);};
  const eK=esikKritik();
  const filtreli=faturalar.filter(f=>f.tur===tab);
  const zenginTum=filtreli.map(f=>({...f,kalan:faturaKalan(f,hareketler),durum:faturaDurum(f,hareketler)}));
  const bekleyenToplam=zenginTum.filter(f=>f.durum!=='odendi').reduce((s,f)=>s+f.kalan,0);
  const odenenToplam=zenginTum.reduce((s,f)=>s+((+f.toplam||0)-f.kalan),0);
  const toplamKdv=zenginTum.reduce((s,f)=>s+(+f.kdv||0),0);
  const vadesiYaklasan=zenginTum.filter(f=>f.durum!=='odendi'&&daysLeft(f.vadeTarih)<=eK);
  const q=arama.trim().toLocaleLowerCase('tr-TR');
  const filtreliZengin=zenginTum.filter(f=>{
    if(q&&!(`${f.no} ${cariAd(f)} ${f.aciklama||''}`.toLocaleLowerCase('tr-TR').includes(q)))return false;
    if(durumFiltre&&f.durum!==durumFiltre)return false;
    if(tarihBas&&(!f.tarih||f.tarih<tarihBas))return false;
    if(tarihBit&&(!f.tarih||f.tarih>tarihBit))return false;
    return true;
  });
  const sirali=[...filtreliZengin].sort((a,b)=>{
    let va,vb;
    if(sortKey==='cari'){va=cariAd(a);vb=cariAd(b);}
    else{va=a[sortKey];vb=b[sortKey];}
    if(typeof va==='string'||typeof vb==='string'){
      va=va||'';vb=vb||'';
      return sortDir==='asc'?String(va).localeCompare(String(vb),'tr-TR'):String(vb).localeCompare(String(va),'tr-TR');
    }
    va=+va||0;vb=+vb||0;
    return sortDir==='asc'?va-vb:vb-va;
  });
  const toplamSayfa=Math.max(1,Math.ceil(sirali.length/sayfaBoyu));
  const gecerliSayfa=Math.min(sayfa,toplamSayfa);
  const sayfalanan=sirali.slice((gecerliSayfa-1)*sayfaBoyu,gecerliSayfa*sayfaBoyu);
  useEffect(()=>{setSayfa(1);},[tab,arama,durumFiltre,tarihBas,tarihBit,sayfaBoyu]);
  const toggleSort=(k)=>{if(sortKey===k)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortKey(k);setSortDir(k==='tarih'||k==='vadeTarih'?'desc':'asc');}};
  const SortTh=({label,k})=>(<th style={{...S.th,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} onClick={()=>toggleSort(k)}>{label}{sortKey===k?(sortDir==='asc'?' ▲':' ▼'):''}</th>);
  const filtreTemizle=()=>{setArama('');setDurumFiltre('');setTarihBas('');setTarihBit('');};
  const filtreAktif=arama||durumFiltre||tarihBas||tarihBit;
  const dosyaAdi=(uzanti)=>`faturalar-${tab==='kesilen'?'kesilen':'alinan'}-${today()}.${uzanti}`;
  const csvIndir=()=>{exportCSV(FATURA_BASLIKLAR,faturaSatirlari(sirali),dosyaAdi('csv'));setExportOpen(false);};
  const xlsxIndir=()=>{exportXLSX(FATURA_BASLIKLAR,faturaSatirlari(sirali),dosyaAdi('xlsx'),tab==='kesilen'?'Kesilen Faturalar':'Alınan Faturalar');setExportOpen(false);};
  const openPay=(f)=>{setPayForm({faturaId:f.id,tutar:faturaKalan(f,hareketler),tarih:today(),hesapId:hesaplar.find(h=>h.tur==='aktif')?.id,personelId:f.personelId||null,yontem:'havale'});setPayModal(true);};
  const savePay=()=>{
    const f=faturalar.find(x=>x.id===payForm.faturaId);if(!f)return;
    const kategori=f.tur==='kesilen'?'tahsilat':'odeme';
    const tur=f.tur==='kesilen'?'giris':'cikis';
    const {hareketler:nH}=recordHareket({hesapId:payForm.hesapId,tur,tutar:payForm.tutar,tarih:payForm.tarih,aciklama:`${f.tur==='kesilen'?'Tahsilat':'Ödeme'} — ${f.no}`,kategori,musteriId:f.tur==='kesilen'?f.musteriId:null,tedarikciId:f.tur==='alinan'?f.tedarikciId:null,personelId:payForm.personelId||null,faturaId:f.id,yontem:payForm.yontem});
    setHareketler(nH);setPayModal(false);
  };
  const payingFatura=payModal?faturalar.find(x=>x.id===payForm.faturaId):null;
  return(<div>
    <TabBar tabs={[['kesilen','📤 Kesilen (Satış)'],['alinan','📥 Alınan (Alış)']]} active={tab} onChange={setTab}/>
    <div style={S.g4}><StatCard color={C.yellow} value={fmtTL(bekleyenToplam)} label={tab==='kesilen'?'Tahsil Edilecek':'Ödenecek'}/><StatCard color={C.green} value={fmtTL(odenenToplam)} label={tab==='kesilen'?'Tahsil Edilen':'Ödenen'}/><StatCard color={C.purple} value={fmtTL(toplamKdv)} label="Toplam KDV"/><StatCard color={C.red} value={vadesiYaklasan.length} label="Vadesi Yaklaşan/Geçen"/></div>
    {vadesiYaklasan.length>0&&<Warn msg={`${vadesiYaklasan.length} fatura vade tarihine ${eK} günden az kaldı veya geçti!`} c={C.red}/>}

    <div style={S.card}>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end',marginBottom:14}}>
        <div style={{flex:'2 1 200px',minWidth:180}}><label style={S.lbl}>Ara (No, Cari, Açıklama)</label><input style={S.inp} placeholder="🔍 Ara..." value={arama} onChange={e=>setArama(e.target.value)}/></div>
        <div style={{flex:'1 1 150px',minWidth:150}}><label style={S.lbl}>Durum</label><select style={S.sel} value={durumFiltre} onChange={e=>setDurumFiltre(e.target.value)}><option value="">Tümü</option><option value="bekliyor">Bekliyor</option><option value="kismiOdendi">Kısmi Ödendi</option><option value="odendi">Ödendi</option><option value="vadesiGecti">Vadesi Geçti</option></select></div>
        <div style={{flex:'1 1 140px',minWidth:140}}><label style={S.lbl}>Başlangıç Tarihi</label><input type="date" style={S.inp} value={tarihBas} onChange={e=>setTarihBas(e.target.value)}/></div>
        <div style={{flex:'1 1 140px',minWidth:140}}><label style={S.lbl}>Bitiş Tarihi</label><input type="date" style={S.inp} value={tarihBit} onChange={e=>setTarihBit(e.target.value)}/></div>
        {filtreAktif&&<button style={S.btnO} onClick={filtreTemizle}>✕ Filtreleri Temizle</button>}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:12,color:C.muted}}>{sirali.length} kayıt bulundu{filtreAktif?` (${zenginTum.length} toplam içinden)`:''}</div>
        <div style={{display:'flex',gap:8,position:'relative'}}>
          <div style={{position:'relative'}}>
            <button style={S.btnO} onClick={()=>setExportOpen(o=>!o)}>⬇ Dışa Aktar {exportOpen?'▲':'▼'}</button>
            {exportOpen&&(<div style={{position:'absolute',top:'110%',right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:20,minWidth:170,boxShadow:'0 6px 18px rgba(0,0,0,.4)'}}>
              <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text}} onMouseDown={csvIndir}>📄 CSV olarak indir</div>
              <div style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:C.text,borderTop:`1px solid ${C.border}`}} onMouseDown={xlsxIndir}>📊 Excel (.xlsx) olarak indir</div>
            </div>)}
          </div>
          <button style={S.btn()} onClick={()=>{const t=today();setForm({tur:tab,tarih:t,vadeTarih:addDays(t,getSettings().faturaVadeGunuVarsayilan??30)});setErr('');setModal(true);}}>＋ Fatura Ekle</button>
        </div>
      </div>
    </div>

    <div style={S.card}><table style={S.tbl}><thead><tr>
      <SortTh label="No" k="no"/><SortTh label={tab==='kesilen'?'Müşteri':'Tedarikçi'} k="cari"/><SortTh label="Tarih" k="tarih"/><SortTh label="Vade" k="vadeTarih"/><SortTh label="Toplam" k="toplam"/><SortTh label="Kalan" k="kalan"/><SortTh label="Durum" k="durum"/><th style={S.th}></th>
    </tr></thead>
    <tbody>{sayfalanan.length===0&&(<tr><td style={{...S.td,textAlign:'center',color:C.muted,padding:'24px 12px'}} colSpan={8}>Kayıt bulunamadı.</td></tr>)}
    {sayfalanan.map(f=>(<tr key={f.id}>
      <td style={S.td}><code style={{fontSize:11,color:C.accent}}>{f.no}</code></td>
      <td style={S.td}><strong style={{color:C.white}}>{cariAd(f)}</strong></td>
      <td style={S.td}>{fmtDate(f.tarih)}</td>
      <td style={S.td}><span style={{color:f.durum!=='odendi'&&daysLeft(f.vadeTarih)<=eK?C.red:C.text}}>{fmtDate(f.vadeTarih)}</span></td>
      <td style={S.td}><strong style={{color:C.accent}}>{fmtTL(f.toplam)}</strong></td>
      <td style={S.td}>{f.kalan>0?<strong style={{color:C.yellow}}>{fmtTL(f.kalan)}</strong>:<span style={{color:C.muted}}>—</span>}</td>
      <td style={S.td}><Badge d={f.durum}/></td>
      <td style={S.td}><div style={{display:'flex',gap:5,flexWrap:'wrap'}}><button style={S.btnO} onClick={()=>setDetayFatura(f)}>👁️</button>{f.kalan>0&&<button style={S.btn(C.green)} onClick={()=>openPay(f)}>{f.tur==='kesilen'?'💵 Tahsil':'💸 Öde'}</button>}{faturaWaLink(f,hareketler)&&<a href={faturaWaLink(f,hareketler)} target="_blank" rel="noopener noreferrer" style={{...S.btnO,textDecoration:'none',display:'inline-block'}} title="WhatsApp'tan Gönder">📲</a>}<button style={S.btnO} onClick={()=>printInvoice(f,hareketler)}>🖨️</button><button style={S.btnO} onClick={()=>{setForm(f);setErr('');setModal(true);}}>✏️</button><button style={S.btnR} onClick={()=>del(f.id)}>🗑</button></div></td>
    </tr>))}</tbody></table>
    {sirali.length>0&&(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:C.muted}}>Sayfa başına:
        <select style={{...S.sel,width:'auto',padding:'5px 10px'}} value={sayfaBoyu} onChange={e=>setSayfaBoyu(+e.target.value)}>
          <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option>
        </select>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button style={S.btnO} disabled={gecerliSayfa<=1} onClick={()=>setSayfa(p=>Math.max(1,p-1))}>‹ Önceki</button>
        <span style={{fontSize:12,color:C.muted}}>Sayfa {gecerliSayfa} / {toplamSayfa}</span>
        <button style={S.btnO} disabled={gecerliSayfa>=toplamSayfa} onClick={()=>setSayfa(p=>Math.min(toplamSayfa,p+1))}>Sonraki ›</button>
      </div>
    </div>)}
    </div>
    {modal&&(<Modal title={form.id?'Fatura Düzenle':'Yeni Fatura'} onClose={()=>setModal(false)}>
      <FG label="Tür"><select style={S.sel} value={form.tur||'kesilen'} onChange={e=>setForm(f=>({...f,tur:e.target.value,musteriId:null,tedarikciId:null}))}><option value="kesilen">Kesilen (Satış)</option><option value="alinan">Alınan (Alış)</option></select></FG>
      {form.tur!=='alinan'?(
        <FG label="Müşteri"><div style={S.selRow}><select style={S.sel} value={form.musteriId||''} onChange={e=>{const cid=idVal(e.target.value);const c=musteriler.find(m=>m.id===cid);setForm(f=>({...f,musteriId:cid,personelId:f.personelId||c?.sorumluId||null}));}}><option value="">— Seçiniz —</option>{musteriler.map(m=><option key={m.id} value={m.id}>{m.ad}</option>)}</select><button type="button" style={S.btnAdd} title="Yeni Müşteri Ekle" onClick={()=>setHizliEkle('musteri')}>＋</button></div></FG>
      ):(
        <FG label="Tedarikçi"><div style={S.selRow}><select style={S.sel} value={form.tedarikciId||''} onChange={e=>{const cid=idVal(e.target.value);const c=tedarikciler.find(t=>t.id===cid);setForm(f=>({...f,tedarikciId:cid,personelId:f.personelId||c?.sorumluId||null}));}}><option value="">— Seçiniz —</option>{tedarikciler.map(t=><option key={t.id} value={t.id}>{t.ad}</option>)}</select><button type="button" style={S.btnAdd} title="Yeni Tedarikçi Ekle" onClick={()=>setHizliEkle('tedarikci')}>＋</button></div></FG>
      )}
      {(()=>{const c=form.tur!=='alinan'?musteriler.find(m=>m.id===form.musteriId):tedarikciler.find(t=>t.id===form.tedarikciId);if(!c)return null;const sorumlu=personel.find(p=>p.id===c.sorumluId);const bk=form.tur!=='alinan'?musteriBakiye(c.id,faturalar,hareketler):tedarikciBakiye(c.id,faturalar,hareketler);return(<InfoBox color={C.blue}>{sorumlu?`👤 Sorumlu: ${sorumlu.ad}`:'👤 Sorumlu personel tanımlı değil'} · {form.tur!=='alinan'?'Açık Alacak':'Açık Borç'}: <strong>{fmtTL(bk.bakiye)}</strong></InfoBox>);})()}
      <FG label="Sorumlu Personel (opsiyonel)"><select style={S.sel} value={form.personelId??''} onChange={e=>setForm(f=>({...f,personelId:idVal(e.target.value)}))}><option value="">— Seçiniz —</option>{personel.map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}</select></FG>
      <FG label="Açıklama"><input style={S.inp} value={form.aciklama||''} onChange={e=>setForm(f=>({...f,aciklama:e.target.value}))}/></FG>
      <div style={S.g2}><FG label="Fatura Tarihi"><input type="date" style={S.inp} value={form.tarih||''} onChange={e=>setForm(f=>({...f,tarih:e.target.value}))}/></FG><FG label="Vade Tarihi"><input type="date" style={S.inp} value={form.vadeTarih||''} onChange={e=>setForm(f=>({...f,vadeTarih:e.target.value}))}/></FG></div>
      <TutarKdvAlani form={form} setForm={setForm}/>
      <FG label="İlgili Proje"><select style={S.sel} value={form.projeId||''} onChange={e=>setForm(f=>({...f,projeId:idVal(e.target.value)}))}><option value="">— Yok —</option>{projeler.map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}</select></FG>
      <FormError msg={err}/>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setModal(false)}>İptal</button><button style={S.btn()} onClick={save}>Kaydet</button></div>
    </Modal>)}
    {payModal&&payingFatura&&(<Modal title={payingFatura.tur==='kesilen'?'💵 Tahsilat Kaydet':'💸 Ödeme Kaydet'} onClose={()=>setPayModal(false)}>
      <InfoBox color={C.blue}>{payingFatura.no} — {cariAd(payingFatura)} — Kalan: <strong>{fmtTL(faturaKalan(payingFatura,hareketler))}</strong></InfoBox>
      <FG label="Hesap (Kasa/Banka)"><select style={S.sel} value={payForm.hesapId||''} onChange={e=>setPayForm(p=>({...p,hesapId:idVal(e.target.value)}))}><option value="">— Seçiniz —</option>{hesaplar.filter(h=>h.tur==='aktif').map(h=><option key={h.id} value={h.id}>{h.ad}</option>)}</select></FG>
      <FG label="Sorumlu Personel (opsiyonel)"><select style={S.sel} value={payForm.personelId??''} onChange={e=>setPayForm(p=>({...p,personelId:idVal(e.target.value)}))}><option value="">— Seçiniz —</option>{personel.map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}</select></FG>
      <div style={S.g2}><FG label="Tutar (₺)"><input type="number" style={S.inp} value={payForm.tutar||''} onChange={e=>setPayForm(p=>({...p,tutar:+e.target.value}))}/></FG><FG label="Tarih"><input type="date" style={S.inp} value={payForm.tarih||''} onChange={e=>setPayForm(p=>({...p,tarih:e.target.value}))}/></FG></div>
      <FG label="Yöntem"><select style={S.sel} value={payForm.yontem||'havale'} onChange={e=>setPayForm(p=>({...p,yontem:e.target.value}))}><option value="havale">Havale/EFT</option><option value="nakit">Nakit</option><option value="cek">Çek</option><option value="senet">Senet</option><option value="kart">Kredi Kartı</option></select></FG>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}><button style={S.btnO} onClick={()=>setPayModal(false)}>İptal</button><button style={S.btn(C.green)} onClick={savePay}>Kaydet</button></div>
    </Modal>)}
    {detayFatura&&<FaturaDetay f={detayFatura} onClose={()=>setDetayFatura(null)} onOde={openPay} onDuzenle={(ff)=>{setForm(ff);setModal(true);}} onSil={del}/>}
    {hizliEkle&&<HizliCariEkle tip={hizliEkle} onClose={()=>setHizliEkle(false)} onEklendi={(yeni,n)=>{setMusteriler(n.filter(c=>(c.tipler||[]).includes('musteri')));setTedarikciler(n.filter(c=>(c.tipler||[]).includes('tedarikci')));setForm(f=>({...f,[hizliEkle==='tedarikci'?'tedarikciId':'musteriId']:yeni.id}));setHizliEkle(false);}}/>}
  </div>);
}

function CariEkstre({kisi,tur,onClose}){
  const idAlan=tur==='kesilen'?'musteriId':'tedarikciId';
  const kategori=tur==='kesilen'?'tahsilat':'odeme';
  const faturalar=LS.get('faturalar').filter(f=>f.tur===tur&&f[idAlan]===kisi.id);
  const hareketler=LS.get('kasaHareketleri').filter(h=>h.kategori===kategori&&h[idAlan]===kisi.id);
  const kayitlar=[
    ...faturalar.map(f=>({tarih:f.tarih,aciklama:`Fatura ${f.no}${f.aciklama?' — '+f.aciklama:''}`,borc:tur==='kesilen'?(+f.toplam||0):0,alacak:tur==='alinan'?(+f.toplam||0):0})),
    ...hareketler.map(h=>({tarih:h.tarih,aciklama:`${tur==='kesilen'?'Tahsilat':'Ödeme'} ${h.belgeNo}${h.aciklama?' — '+h.aciklama:''}`,borc:tur==='alinan'?(+h.tutar||0):0,alacak:tur==='kesilen'?(+h.tutar||0):0})),
  ].sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  let bakiye=0;
  const satirlar=kayitlar.map(k=>{bakiye+=k.borc-k.alacak;return{...k,bakiye};});
  const sonBakiye=satirlar.length?satirlar[satirlar.length-1].bakiye:0;
  return(<Modal title={`📄 Cari Hesap Ekstresi — ${kisi.ad}`} onClose={onClose}>
    <div style={{overflowX:'auto'}}><table style={S.tbl}><thead><tr><th style={S.th}>Tarih</th><th style={S.th}>Açıklama</th><th style={S.th}>Borç</th><th style={S.th}>Alacak</th><th style={S.th}>Bakiye</th></tr></thead>
    <tbody>{satirlar.length===0?(<tr><td style={S.td} colSpan={5}><span style={{color:C.muted}}>Kayıt yok.</span></td></tr>):satirlar.map((s,i)=>(<tr key={i}><td style={S.td}>{fmtDate(s.tarih)}</td><td style={S.td}><span style={{fontSize:12}}>{s.aciklama}</span></td><td style={S.td}>{s.borc?fmtTL(s.borc):'—'}</td><td style={S.td}>{s.alacak?fmtTL(s.alacak):'—'}</td><td style={S.td}><strong>{fmtTL(s.bakiye)}</strong></td></tr>))}</tbody></table></div>
    <div style={{...S.alert(sonBakiye>0?C.yellow:C.green),marginTop:14}}>{tur==='kesilen'?'Güncel Alacak':'Güncel Borç'}: <strong>{fmtTL(sonBakiye)}</strong></div>
  </Modal>);
}

function FaturaDetay({f,onClose,onOde,onDuzenle,onSil}){
  const [hareketler]=useState(()=>LS.get('kasaHareketleri'));
  const kalan=faturaKalan(f,hareketler);
  const durum=faturaDurum(f,hareketler);
  const odemeler=hareketler.filter(h=>h.faturaId===f.id).sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  const YONTEM_LABEL={havale:'Havale/EFT',nakit:'Nakit',cek:'Çek',senet:'Senet',kart:'Kredi Kartı'};
  return(<Modal title={`🧾 ${f.no}`} onClose={onClose} width={620}>
    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10,marginBottom:16}}>
      <div>
        <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:'.5px'}}>{f.tur==='kesilen'?'Müşteri':'Tedarikçi'}</div>
        <div style={{fontSize:16,fontWeight:700,color:C.white}}>{cariAd(f)}</div>
      </div>
      <Badge d={durum}/>
    </div>
    {f.aciklama&&<InfoBox color={C.blue}>{f.aciklama}</InfoBox>}
    <div style={S.g3}>
      <StatCard color={C.blue} value={fmtDate(f.tarih)} label="Fatura Tarihi"/>
      <StatCard color={daysLeft(f.vadeTarih)<0&&kalan>0?C.red:C.purple} value={fmtDate(f.vadeTarih)} label="Vade Tarihi"/>
      <StatCard color={f.projeId?C.teal:C.muted} value={LS.get('projeler').find(p=>p.id===f.projeId)?.ad||'—'} label="İlgili Proje"/>

function Cariler(){

function FinansalRaporlar(){
  const gelirGider=LS.get('gelirGider'),projeler=LS.get('projeler'),faturalar=LS.get('faturalar'),hareketler=LS.get('kasaHareketleri'),musteriler=LS.get('cariler').filter(c=>(c.tipler||[]).includes('musteri')),tedarikciler=LS.get('cariler').filter(c=>(c.tipler||[]).includes('tedarikci'));
  const PIE_COLORS=[C.accent,C.blue,C.green,C.purple,C.red,C.yellow,C.teal,C.pink,C.orange];
  const aylikVeri=useMemo(()=>months().map(m=>{const gelir=gelirGider.filter(g=>g.tur==='gelir'&&g.tarih?.startsWith(m)).reduce((s,g)=>s+(+g.tutar||0),0),gider=gelirGider.filter(g=>g.tur==='gider'&&g.tarih?.startsWith(m)).reduce((s,g)=>s+(+g.tutar||0),0);return{ay:fmtMonth(m).split(' ')[0],gelir,gider,net:gelir-gider};}),[gelirGider]);
  const giderDagilimi=useMemo(()=>{const map={};gelirGider.filter(g=>g.tur==='gider').forEach(g=>{map[g.kategori]=(map[g.kategori]||0)+(+g.tutar||0);});return Object.entries(map).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);},[gelirGider]);
  const projeKarliligi=useMemo(()=>projeler.map(p=>{const gelir=gelirGider.filter(g=>g.tur==='gelir'&&g.projeId===p.id).reduce((s,g)=>s+(+g.tutar||0),0),gider=gelirGider.filter(g=>g.tur==='gider'&&g.projeId===p.id).reduce((s,g)=>s+(+g.tutar||0),0);return{proje:p.ad.length>14?p.ad.slice(0,14)+'…':p.ad,gelir,gider,kar:gelir-gider};}).filter(p=>p.gelir>0||p.gider>0),[gelirGider,projeler]);
  const toplamGelir=gelirGider.filter(g=>g.tur==='gelir').reduce((s,g)=>s+(+g.tutar||0),0),toplamGider=gelirGider.filter(g=>g.tur==='gider').reduce((s,g)=>s+(+g.tutar||0),0);
  const tahsilEdilecek=faturalar.filter(f=>f.tur==='kesilen').reduce((s,f)=>s+Math.max(0,faturaKalan(f,hareketler)),0),odenecek=faturalar.filter(f=>f.tur==='alinan').reduce((s,f)=>s+Math.max(0,faturaKalan(f,hareketler)),0);
  const eK=esikKritik();
  const vadesiGecenAlacak=faturalar.filter(f=>f.tur==='kesilen'&&faturaKalan(f,hareketler)>0&&daysLeft(f.vadeTarih)<0).reduce((s,f)=>s+faturaKalan(f,hareketler),0);
  const vadesiGecenBorc=faturalar.filter(f=>f.tur==='alinan'&&faturaKalan(f,hareketler)>0&&daysLeft(f.vadeTarih)<0).reduce((s,f)=>s+faturaKalan(f,hareketler),0);
  const enBorcluMusteriler=musteriler.map(m=>({ad:m.ad,bakiye:musteriBakiye(m.id,faturalar,hareketler).bakiye})).filter(m=>m.bakiye>0).sort((a,b)=>b.bakiye-a.bakiye).slice(0,5);
  const enBorcluTedarikciler=tedarikciler.map(t=>({ad:t.ad,bakiye:tedarikciBakiye(t.id,faturalar,hareketler).bakiye})).filter(t=>t.bakiye>0).sort((a,b)=>b.bakiye-a.bakiye).slice(0,5);
  const tooltipStyle={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,color:C.text};
  const hasRecharts=!!RC.LineChart;
  return(<div>
    <div style={S.g4}><StatCard color={C.green} value={fmtTL(toplamGelir)} label="Toplam Gelir"/><StatCard color={C.red} value={fmtTL(toplamGider)} label="Toplam Gider"/><StatCard color={C.blue} value={fmtTL(tahsilEdilecek)} label="Tahsil Edilecek"/><StatCard color={C.purple} value={fmtTL(odenecek)} label="Ödenecek"/></div>
    {hasRecharts?(<>
    <div style={S.card}><div style={S.secTitle}>📈 6 Aylık Gelir / Gider Trendi</div>
    <ResponsiveContainer width="100%" height={260}><LineChart data={aylikVeri}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="ay" tick={{fill:C.muted,fontSize:12}}/><YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v=>(v/1000)+'K'}/><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/><Legend wrapperStyle={{fontSize:12}}/><Line type="monotone" dataKey="gelir" name="Gelir" stroke={C.green} strokeWidth={2.5} dot={{r:3}}/><Line type="monotone" dataKey="gider" name="Gider" stroke={C.red} strokeWidth={2.5} dot={{r:3}}/><Line type="monotone" dataKey="net" name="Net" stroke={C.accent} strokeWidth={2} strokeDasharray="4 3" dot={false}/></LineChart></ResponsiveContainer></div>
    <div style={S.g2}>
      <div style={S.card}><div style={S.secTitle}>🥧 Gider Kategorileri Dağılımı</div>{giderDagilimi.length===0?<div style={{color:C.muted,fontSize:13}}>Henüz gider kaydı yok.</div>:(<ResponsiveContainer width="100%" height={240}><PieChart><Pie data={giderDagilimi} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label={({name,percent})=>`${name} %${(percent*100).toFixed(0)}`} labelLine={false} fontSize={11}>{giderDagilimi.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}</Pie><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/></PieChart></ResponsiveContainer>)}</div>
      <div style={S.card}><div style={S.secTitle}>🏗️ Proje Bazlı Kârlılık</div>{projeKarliligi.length===0?<div style={{color:C.muted,fontSize:13}}>Proje bazlı kayıt yok.</div>:(<ResponsiveContainer width="100%" height={240}><BarChart data={projeKarliligi}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="proje" tick={{fill:C.muted,fontSize:10}}/><YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v=>(v/1000)+'K'}/><Tooltip contentStyle={tooltipStyle} formatter={v=>fmtTL(v)}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="gelir" name="Gelir" fill={C.green} radius={[4,4,0,0]}/><Bar dataKey="gider" name="Gider" fill={C.red} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>)}</div>
    </div>
    </>):(<div style={S.alert(C.yellow)}>⚠️ Grafik kütüphanesi yüklenemedi. İnternet bağlantısı gereklidir.</div>)}
    {(vadesiGecenAlacak>0||vadesiGecenBorc>0)&&<Warn msg={`Vadesi geçmiş alacak: ${fmtTL(vadesiGecenAlacak)} · Vadesi geçmiş borç: ${fmtTL(vadesiGecenBorc)}`} c={C.red}/>}
    <div style={S.g2}>
      <div style={S.card}><div style={S.secTitle}>👥 En Çok Alacaklı Olduğumuz Müşteriler</div>{enBorcluMusteriler.length===0?<div style={{color:C.muted,fontSize:13}}>Açık alacak yok.</div>:enBorcluMusteriler.map((m,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}22`}}><span style={{fontSize:13,color:C.text}}>{m.ad}</span><strong style={{color:C.yellow,fontSize:13}}>{fmtTL(m.bakiye)}</strong></div>))}</div>
      <div style={S.card}><div style={S.secTitle}>🏭 En Çok Borçlu Olduğumuz Tedarikçiler</div>{enBorcluTedarikciler.length===0?<div style={{color:C.muted,fontSize:13}}>Açık borç yok.</div>:enBorcluTedarikciler.map((t,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}22`}}><span style={{fontSize:13,color:C.text}}>{t.ad}</span><strong style={{color:C.red,fontSize:13}}>{fmtTL(t.bakiye)}</strong></div>))}</div>
    </div>
    <div style={S.card}><div style={S.secTitle}>📑 Özet Kâr/Zarar Tablosu</div><table style={S.tbl}><tbody><tr><td style={S.td}>Toplam Gelir</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.green}}>{fmtTL(toplamGelir)}</strong></td></tr><tr><td style={S.td}>Toplam Gider</td><td style={{...S.td,textAlign:'right'}}><strong style={{color:C.red}}>−{fmtTL(toplamGider)}</strong></td></tr><tr><td style={{...S.td,borderTop:`2px solid ${C.border}`,fontWeight:700,color:C.white}}>Net Kâr/Zarar</td><td style={{...S.td,borderTop:`2px solid ${C.border}`,textAlign:'right'}}><strong style={{color:toplamGelir-toplamGider>=0?C.green:C.red,fontSize:16}}>{fmtTL(toplamGelir-toplamGider)}</strong></td></tr></tbody></table></div>
  </div>);

function TelegramMasrafGirisleri(){
  const [hesaplar]=useState(LS.get('hesaplar'));
  const [bildirimler,setBildirimler]=useState(LS.get('telegramMasrafBildirimleri'));
  const [yukleniyor,setYukleniyor]=useState(false);
  const [mesaj,setMesaj]=useState('');
  const backendVar=backendYapilandirildiMi();
  const senkronizeEt=async()=>{
    setYukleniyor(true);setMesaj('');
    const sonuc=backendVar?await backendMasraflariGetir():await telegramGuncellemeleriAl();
    setYukleniyor(false);
    if(!sonuc.basarili){setMesaj(`❌ ${sonuc.hata}`);return;}
    setBildirimler(LS.get('telegramMasrafBildirimleri'));
    setMesaj(sonuc.yeni>0?`✅ ${sonuc.yeni} bekleyen bildirim var.`:'ℹ️ Yeni mesaj yok.');
  };
  const reddet=(id)=>{
    const n=bildirimler.map(b=>b.id===id?{...b,durum:'reddedildi'}:b);LS.set('telegramMasrafBildirimleri',n);setBildirimler(n);
    if(backendVar)backendDurumGuncelle(id,'reddedildi');
  };
  const onayla=(id,hesapId,kategori,tutar,aciklama)=>{
    if(!hesapId){fpToast('Lütfen kasa/banka hesabı seçin.');return;}
    if(!(+tutar>0)){fpToast("Tutar 0'dan büyük olmalıdır.");return;}
    const hareketler=LS.get('kasaHareketleri');
    const gonderen=bildirimler.find(b=>b.id===id);
    const yeni={id:uid(),hesapId,tur:'cikis',kategori:kategori||'Genel Gider',tutar:+tutar,aciklama:aciklama||`Telegram üzerinden gönderilen masraf (${gonderen?.gonderen||''})`,tarih:today(),belgeNo:`KH-${String(hareketler.length+1).padStart(3,'0')}`,belgeUrl:gonderen?.dosyaUrl||null,kaynak:'telegram'};
    LS.set('kasaHareketleri',[...hareketler,yeni]);
    const hn=hesaplar.map(h=>h.id===hesapId?{...h,bakiye:h.bakiye-(+tutar)}:h);
    LS.set('hesaplar',hn);
    const n=bildirimler.map(b=>b.id===id?{...b,durum:'onaylandi',kasaHareketiId:yeni.id}:b);
    LS.set('telegramMasrafBildirimleri',n);setBildirimler(n);
    if(backendVar)backendDurumGuncelle(id,'onaylandi');
  };
  const bekleyenler=bildirimler.filter(b=>b.durum==='bekliyor');
  const gecmis=bildirimler.filter(b=>b.durum!=='bekliyor');
  return(<div>
    <InfoBox color={backendVar?C.green:C.blue}>{backendVar?"✅ Webhook backend bağlı — personelin gönderdiği mesajlar arka planda anında toplanıyor; bu buton sadece listeyi tazeler.":"ℹ️ Personel, Telegram'da Ayarlar > Bildirimler bölümünde tanımladığınız bota mesaj, fotoğraf veya belge göndererek masraf bildirebilir. Bu buton tıklanınca sistem o ana kadar birikmiş yeni mesajları Telegram'dan çeker — otomatik/anlık senkronizasyon yoktur, bu ekranı düzenli kontrol edin. (Gerçek zamanlı almak için Ayarlar > Bildirimler'den bir Backend API URL tanımlayabilirsiniz.)"}</InfoBox>
    <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:16}}>
      <button style={S.btn()} onClick={senkronizeEt} disabled={yukleniyor}>{yukleniyor?'⏳ Alınıyor...':"🔄 Telegram'dan Al"}</button>
      {mesaj&&<span style={{fontSize:12,color:mesaj.startsWith('❌')?C.red:C.green}}>{mesaj}</span>}
    </div>
    <div style={S.g3}><StatCard color={C.yellow} value={bekleyenler.length} label="Bekleyen Bildirim"/><StatCard color={C.green} value={bildirimler.filter(b=>b.durum==='onaylandi').length} label="Onaylanan"/><StatCard color={C.muted} value={bildirimler.filter(b=>b.durum==='reddedildi').length} label="Reddedilen"/></div>
    <div style={S.card}>
      <div style={S.secTitle}>⏳ Bekleyen Bildirimler</div>
      {bekleyenler.length===0&&<div style={{color:C.muted,fontSize:13}}>Bekleyen bildirim yok.</div>}
      {bekleyenler.map(b=>(<TelegramBildirimSatiri key={b.id} b={b} hesaplar={hesaplar} onOnayla={onayla} onReddet={reddet}/>))}
    </div>
    {gecmis.length>0&&(<div style={S.card}>
      <div style={S.secTitle}>📜 Geçmiş</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Gönderen</th><th style={S.th}>Tarih</th><th style={S.th}>Mesaj</th><th style={S.th}>Durum</th></tr></thead>

function EkipYonetimi(){
  const [users,setUsers]=useState(null);
  const [yukleniyor,setYukleniyor]=useState(true);
  const [yeniKadi,setYeniKadi]=useState('');
  const [yeniSifre,setYeniSifre]=useState('');
  const [yeniRol,setYeniRol]=useState('kullanici');
  const [ekleniyor,setEkleniyor]=useState(false);
  const [hata,setHata]=useState('');
  const cfg=getSyncCfg();

  const yukle=async()=>{
    setYukleniyor(true);
    try{setUsers(await fpSyncListUsers());}
    catch(e){fpToast(e.message,'error');}
    finally{setYukleniyor(false);}
  };
  useEffect(()=>{yukle();},[]);

  const ekle=async(e)=>{
    e.preventDefault();
    setHata('');setEkleniyor(true);
    try{
      await fpSyncAddUser(yeniKadi,yeniSifre,yeniRol);
      fpToast(`✅ ${yeniKadi} ekibe eklendi.`);
      setYeniKadi('');setYeniSifre('');setYeniRol('kullanici');
      yukle();
    }catch(err){
      setHata(err.message||'Kullanıcı eklenemedi.');
    }finally{
      setEkleniyor(false);
    }
  };

  const sil=async(username)=>{
    if(!(await fpConfirm(`${username} adlı kullanıcı ekipten çıkarılsın mı?`)))return;
    try{
      await fpSyncRemoveUser(username);
      fpToast('Kullanıcı ekipten çıkarıldı.');
      yukle();
    }catch(e){
      fpToast(e.message,'error');
    }
  };

  if(cfg.role!=='admin'){
    return <InfoBox color={C.blue}>ℹ️ Ekip üyelerini görmek ve yönetmek için yönetici (admin) hesabıyla giriş yapmış olmanız gerekir.</InfoBox>;
  }

  return (
    <div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>👥 Ekip Üyeleri — {cfg.companyName}</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:14,lineHeight:1.6}}>Buraya eklediğin herkes kendi kullanıcı adı/şifresiyle giriş yapar ve şirketinizin tüm FiloPro verisini görür/senkronize eder.</div>
      {yukleniyor?<div style={{fontSize:13,color:C.muted}}>Yükleniyor…</div>:(
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {(users||[]).map(u=>(
            <div key={u.username} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div>
                <span style={{fontSize:13,fontWeight:600,color:C.text}}>{u.username}</span>
                <span style={{...S.badge(u.role==='admin'?C.accent:C.muted),marginLeft:8,fontSize:11}}>{u.role==='admin'?'Yönetici':'Üye'}</span>
              </div>
              {u.username!==cfg.username&&<button style={{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:12}} onClick={()=>sil(u.username)}>🗑 Çıkar</button>}
            </div>
          ))}
        </div>
      )}
      <form onSubmit={ekle} style={S.g3}>
        <FG label="Kullanıcı Adı"><input style={S.inp} value={yeniKadi} onChange={e=>setYeniKadi(e.target.value)} autoCapitalize="off" autoCorrect="off" autoComplete="off" spellCheck="false" required/></FG>
        <FG label="Şifre"><input type="password" style={S.inp} value={yeniSifre} onChange={e=>setYeniSifre(e.target.value)} autoCapitalize="off" autoCorrect="off" autoComplete="new-password" spellCheck="false" required minLength={6}/></FG>
        <FG label="Rol">
          <select style={S.inp} value={yeniRol} onChange={e=>setYeniRol(e.target.value)}>
            <option value="kullanici">Üye</option>
            <option value="admin">Yönetici</option>
          </select>
        </FG>
      </form>
      {hata&&<div style={{...S.alert(C.red),marginTop:10}}>⚠️ {hata}</div>}
      <button style={{...S.btn(),marginTop:10}} onClick={ekle} disabled={ekleniyor}>{ekleniyor?'⏳ Ekleniyor...':'+ Ekip Üyesi Ekle'}</button>
    </div>
  );
}

function YapayZekaAyarlari(){
  const cfg=getSyncCfg();
  const [ayar,setAyar]=useState(null);
  const [yukleniyor,setYukleniyor]=useState(true);
  const [anahtar,setAnahtar]=useState('');
  const [model,setModel]=useState('');
  const [limit,setLimit]=useState('');
  const [kaydediliyor,setKaydediliyor]=useState(false);
  const [hata,setHata]=useState('');

  const yukle=async()=>{
    setYukleniyor(true);
    try{
      const d=await fpAiGetConfig();
      setAyar(d);
      setModel(d.model);
      setLimit(String(d.dailyLimit));
    }catch(e){fpToast(e.message,'error');}
    finally{setYukleniyor(false);}
  };
  useEffect(()=>{yukle();},[]);

  const kaydet=async(e)=>{
    e.preventDefault();
    setHata('');setKaydediliyor(true);
    try{
      const payload={model,dailyLimit:limit};
      if(anahtar.trim())payload.groqApiKey=anahtar.trim();
      await fpAiSaveConfig(payload);
      fpToast('✅ Yapay zeka ayarları kaydedildi.');
      setAnahtar('');
      yukle();
    }catch(err){
      setHata(err.message||'Kaydedilemedi.');
    }finally{
      setKaydediliyor(false);
    }
  };

  const kaldir=async()=>{
    if(!(await fpConfirm('Şirketinize özel Groq API anahtarı kaldırılsın mı? Sunucuda ortak bir anahtar tanımlıysa ona geri dönülür, yoksa AI Asistan devre dışı kalır.')))return;
    try{
      await fpAiRemoveConfig();
      fpToast('Anahtar kaldırıldı.');
      yukle();
    }catch(e){fpToast(e.message,'error');}
  };

  if(cfg.role!=='admin'){
    return <InfoBox color={C.blue}>ℹ️ Yapay zeka ayarlarını görmek ve değiştirmek için yönetici (admin) hesabıyla giriş yapmış olmanız gerekir.</InfoBox>;
  }
  if(yukleniyor)return <div style={{...S.card,marginTop:16,fontSize:13,color:C.muted}}>Yükleniyor…</div>;

  return (
    <div style={{...S.card,marginTop:16}}>
      <div style={S.secTitle}>🤖 Yapay Zeka Ayarları</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>AI Asistan modülü (sohbet, arıza tahmini, maliyet projeksiyonu) için <b>ücretsiz</b> bir Groq API anahtarı gerekir — kredi kartı istemez. <a href="https://console.groq.com" target="_blank" rel="noopener noreferrer" style={{color:C.accent}}>console.groq.com</a> üzerinden alabilirsiniz.</div>

      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <span style={S.badge(ayar?.configured?C.green:C.yellow)}>{ayar?.configured?'✓ Yapılandırıldı':'⚠ Yapılandırılmadı'}</span>
        {ayar?.usingServerDefault&&<span style={{fontSize:12,color:C.muted}}>(sunucudaki ortak anahtar kullanılıyor)</span>}
        {ayar?.usingOwnKey&&<span style={{fontSize:12,color:C.muted}}>(şirketinize özel anahtar)</span>}
      </div>

      <form onSubmit={kaydet}>
        <FG label={ayar?.configured?'Yeni API Anahtarı (değiştirmek için doldurun)':'Groq API Anahtarı'}>
          <input type="password" style={S.inp} placeholder="gsk_..." value={anahtar} onChange={e=>setAnahtar(e.target.value)} autoCapitalize="off" autoCorrect="off" autoComplete="off" spellCheck="false"/>
        </FG>
        <div style={S.g2}>
          <FG label="Model">
            <select style={S.inp} value={model} onChange={e=>setModel(e.target.value)}>
              {(ayar?.availableModels||[]).map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </FG>
          <FG label="Günlük İstek Limiti">
            <input type="number" style={S.inp} min={1} max={5000} value={limit} onChange={e=>setLimit(e.target.value)}/>
          </FG>
        </div>
        {hata&&<div style={{...S.alert(C.red),marginBottom:12}}>⚠️ {hata}</div>}
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button type="submit" style={S.btn()} disabled={kaydediliyor}>{kaydediliyor?'⏳ Kaydediliyor...':'💾 Kaydet'}</button>
          {ayar?.usingOwnKey&&<button type="button" style={S.btnR} onClick={kaldir}>🗑 Anahtarımı Kaldır</button>}
        </div>
      </form>

      <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:12,color:C.muted}}>Bugünkü kullanım</div>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginTop:2}}>{ayar?.usageToday ?? 0} <span style={{fontSize:13,fontWeight:400,color:C.muted}}>/ {ayar?.dailyLimit} istek</span></div>
      </div>
    </div>
  );
}

function SenkronPaneli(){
  const cfg=getSyncCfg();
  const [status,setStatus]=useState(fpSyncStatus());
  const [mod,setMod]=useState('giris'); // 'giris' | 'kayit'
  const [url,setUrl]=useState(cfg.url||'');
  const [firma,setFirma]=useState('');
  const [kadi,setKadi]=useState(cfg.username||'');
  const [sifre,setSifre]=useState('');
  const [islemde,setIslemde]=useState(false);
  const [hata,setHata]=useState('');
  useEffect(()=>fpSyncSubscribe(setStatus),[]);

  const gonder=async(e)=>{
    e.preventDefault();
    setHata('');setIslemde(true);
    try{
      if(mod==='kayit'){
        await fpSyncRegister(url,firma,kadi,sifre);
        fpToast('✅ Şirket kaydı oluşturuldu, senkronizasyon başlatılıyor.');
      }else{
        await fpSyncLogin(url,kadi,sifre);
        fpToast('✅ Sunucuya bağlanıldı, senkronizasyon başlatılıyor.');
      }
      setSifre('');
    }catch(err){
      setHata(err.message||'İşlem başarısız.');
    }finally{
      setIslemde(false);
    }
  };
  const baglantiyiKes=async()=>{
    if(!(await fpConfirm('Sunucu bağlantısı kesilsin mi? Veriler bu cihazda kalmaya devam eder, ancak diğer cihazlarla senkronize edilmez.')))return;
    fpSyncLogout();
    fpToast('Sunucu bağlantısı kesildi.');
  };
  const bagli=!!getSyncCfg().token;
  return (
    <div>
      <div style={S.card}>
        <div style={S.secTitle}>☁️ Cihazlar Arası Senkronizasyon</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>Bir FiloPro senkronizasyon sunucusuna bağlanarak verilerinizi birden fazla cihaz ve ekip üyesi arasında (JWT ile korumalı) otomatik olarak senkronize edin. Her şirketin verisi diğerlerinden tamamen izoledir. Bağlanmadan da uygulama, veriler yalnızca bu cihazda saklanarak normal şekilde çalışmaya devam eder.</div>
        {!bagli?(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <button onClick={()=>setMod('giris')} style={{...S.btn(mod==='giris'?C.accent:C.muted),flex:1}}>Giriş Yap</button>
              <button onClick={()=>setMod('kayit')} style={{...S.btn(mod==='kayit'?C.accent:C.muted),flex:1}}>Şirket Kaydı Oluştur</button>
            </div>
            <form onSubmit={gonder}>
              <FG label="Sunucu Adresi"><input style={S.inp} placeholder="https://filopro-sync.ornekdomain.com" value={url} onChange={e=>setUrl(e.target.value)} required/></FG>
              {mod==='kayit'&&<FG label="Şirket Adı"><input style={S.inp} value={firma} onChange={e=>setFirma(e.target.value)} required/></FG>}
              <div style={S.g2}>
                <FG label="Kullanıcı Adı"><input style={S.inp} value={kadi} onChange={e=>setKadi(e.target.value)} autoCapitalize="off" autoCorrect="off" autoComplete="username" spellCheck="false" required/></FG>
                <FG label="Şifre"><input type="password" style={S.inp} value={sifre} onChange={e=>setSifre(e.target.value)} autoCapitalize="off" autoCorrect="off" autoComplete={mod==='kayit'?'new-password':'current-password'} spellCheck="false" required minLength={6}/></FG>
              </div>
              {hata&&<div style={{...S.alert(C.red),marginBottom:12}}>⚠️ {hata}</div>}
              <button type="submit" style={S.btn()} disabled={islemde}>{islemde?'⏳ İşleniyor...':mod==='kayit'?'🏢 Şirketi Kaydet':'🔗 Bağlan'}</button>
              {mod==='kayit'&&<div style={{fontSize:12,color:C.muted,marginTop:10}}>Bu, yeni ve boş bir şirket veri alanı oluşturur; girdiğiniz kullanıcı otomatik olarak yönetici olur. Daha sonra ekip üyelerinizi ekleyebilirsiniz.</div>}
            </form>
          </div>
        ):(
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
              <span style={S.badge(status.state==='hata'?C.red:status.state==='cevrimdisi'?C.yellow:C.green)}>{status.state==='bagli'?'✓ Bağlı':status.state==='senkron_ediliyor'?'🔄 Senkronize ediliyor':status.state==='hata'?'⚠️ Hata':'📴 Çevrimdışı'}</span>
              <span style={{fontSize:12,color:C.muted}}>{cfg.companyName} — {cfg.username} ({cfg.role==='admin'?'Yönetici':'Üye'})</span>
            </div>
            <div style={S.g3}>
              <StatCard color={C.blue} value={status.pending||0} label="Bekleyen Değişiklik"/>
              <StatCard color={C.green} value={status.lastSync?new Date(status.lastSync).toLocaleTimeString('tr-TR'):'—'} label="Son Senkron"/>
              <StatCard color={status.state==='hata'?C.red:C.accent} value={status.state==='hata'?'Hata':'Aktif'} label="Durum"/>
            </div>
            {status.error&&<div style={{...S.alert(C.red),marginTop:12}}>⚠️ {status.error}</div>}
            <div style={{display:'flex',gap:10,marginTop:16,flexWrap:'wrap'}}>
              <button style={S.btn()} onClick={fpSyncNow} disabled={status.state==='senkron_ediliyor'}>{status.state==='senkron_ediliyor'?'⏳ Senkronize ediliyor...':'🔄 Şimdi Senkronize Et'}</button>
              <button style={S.btnR} onClick={baglantiyiKes}>🔌 Bağlantıyı Kes</button>
            </div>
          </div>
        )}
      </div>
      {bagli&&<EkipYonetimi/>}
      {bagli&&<YapayZekaAyarlari/>}
      {bagli&&<YedekEmailAyarlari/>}
      <InfoBox color={C.blue}>ℹ️ Senkronizasyon için ayrıca bir FiloPro Sync sunucusu kurulu olmalıdır (backend deposundaki server klasörüne bakın). Her şirket kendi izole verisine sahiptir; şu anki sürümde eşzamanlı çakışan değişikliklerde en son kaydeden kazanır (son yazan üzerine yazar).</InfoBox>
    </div>
  );
}

function Ayarlar(){
  const [tab,setTab]=useState('genel');
  const [s,setS]=useState(getSettings());
  const [saved,setSaved]=useState(false);
  const [fileErr,setFileErr]=useState('');
  const fileInputRef=React.useRef(null);
  const upd=(k,v)=>setS(f=>({...f,[k]:v}));
  const [yeniGelirKat,setYeniGelirKat]=useState('');
  const [yeniGiderKat,setYeniGiderKat]=useState('');
  const gelirKatEkle=()=>{const v=yeniGelirKat.trim();if(!v)return;if((s.gelirKategorileri||[]).includes(v)){setYeniGelirKat('');return;}upd('gelirKategorileri',[...(s.gelirKategorileri||[]),v]);setYeniGelirKat('');};
  const giderKatEkle=()=>{const v=yeniGiderKat.trim();if(!v)return;if((s.giderKategorileri||[]).includes(v)){setYeniGiderKat('');return;}upd('giderKategorileri',[...(s.giderKategorileri||[]),v]);setYeniGiderKat('');};
  const gelirKatSil=(k)=>upd('gelirKategorileri',(s.gelirKategorileri||[]).filter(x=>x!==k));
  const giderKatSil=(k)=>upd('giderKategorileri',(s.giderKategorileri||[]).filter(x=>x!==k));
  const modulToggle=(id)=>upd('modulDurumu',{...s.modulDurumu,[id]:s.modulDurumu?.[id]===false?true:false});
  const [yeniServisIkon,setYeniServisIkon]=useState('🔧');
  const [yeniServisEtiket,setYeniServisEtiket]=useState('');
  const servisTipEkle=()=>{
    const label=yeniServisEtiket.trim();if(!label)return;
    const mevcut=s.sahaServisTipleri||[];
    let id=slugifyTr(label);
    if(mevcut.some(t=>t.id===id))id=id+(mevcut.length+1);
    upd('sahaServisTipleri',[...mevcut,{id,icon:yeniServisIkon.trim()||'🔧',label}]);
    setYeniServisEtiket('');setYeniServisIkon('🔧');
  };

// ── Uygulama Kilidi (Giriş Ekranı) ────────────────────────────────────────────
function LockScreen({onUnlock}){
  const s=getSettings();
  const kullanicilar=useMemo(()=>LS.get('kullanicilar').filter(k=>k.aktif),[]);
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [secilen,setSecilen]=useState(s.aktifKullaniciId||kullanicilar[0]?.id||'');
  const dene=async(e)=>{
    e?.preventDefault();
    if(!pw)return;
    setBusy(true);setErr('');
    const hash=await hashPassword(pw,s.girisSifreSalt||'');
    if(hash===s.girisSifreHash){
      sessionStorage.setItem('fp_unlocked','1');
      const guncelS=getSettings();
      if(secilen){
        saveSettings({...guncelS,aktifKullaniciId:+secilen});
        const kul=kullanicilar.find(k=>k.id===+secilen);
        const loglar=LS.get('islemLoglari');
        LS.set('islemLoglari',[{id:uid(),kullanici:kul?.ad||'Bilinmeyen',islem:'Giriş yapıldı',detay:'Uygulama kilidi açıldı',tarih:new Date().toLocaleString('tr-TR')},...loglar]);
      }
      setBusy(false);
      onUnlock();
    }else{
      setBusy(false);
      setErr('Şifre hatalı. Tekrar deneyin.');
      setPw('');
    }
  };
  return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:`radial-gradient(circle at 30% 20%,${C.card},${C.bg})`,padding:20}}>
    <form onSubmit={dene} style={{width:'min(380px,92vw)',background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:'32px 28px',boxShadow:'0 20px 60px -20px rgba(0,0,0,.6)'}} className="fp-fade">
      <div style={{textAlign:'center',marginBottom:22}}>
        <div style={{fontSize:40,marginBottom:8}}>🚜</div>
        <div style={{fontSize:20,fontWeight:800,color:C.white}}>{s.firmaAdi||'FiloPro'}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>Devam etmek için şifrenizi girin</div>
      </div>
      {kullanicilar.length>0&&(<div style={{marginBottom:14}}>
        <label style={S.lbl}>Kullanıcı</label>
        <select style={S.sel} value={secilen} onChange={e=>setSecilen(e.target.value)}>
          {kullanicilar.map(k=><option key={k.id} value={k.id}>{k.ad}</option>)}
        </select>
      </div>)}
      <div style={{marginBottom:10}}>
        <label style={S.lbl}>Şifre</label>
        <input autoFocus type="password" style={S.inp} value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} placeholder="••••••••"/>
      </div>
      {err&&<div style={S.alert(C.red)}>⚠️ {err}</div>}
      <button type="submit" style={{...S.btn(),width:'100%',padding:'11px 0',fontSize:13,marginTop:6}} disabled={busy||!pw}>{busy?'⏳ Kontrol ediliyor...':'🔓 Giriş Yap'}</button>
      <div style={{textAlign:'center',marginTop:16,fontSize:11,color:C.muted,lineHeight:1.5}}>Bu kilit yalnızca bu cihazdaki erişimi korur.<br/>Veriler tarayıcıda şifrelenmeden saklanır.</div>
    </form>
  </div>);
}

function DepoGenelBakis(){
  const depolar=LS.get('depolar'),kalemler=LS.get('envanterKalemleri');
  const kritikler=kalemler.filter(k=>k.miktar<=k.minMiktar);
  const toplamDeger=kalemler.reduce((s,k)=>s+(+k.miktar||0)*(+k.fiyat||0),0);
  const depoOzet=depolar.map(d=>{
    const dk=kalemler.filter(k=>k.depoId===d.id);
    return{depo:d,kalemSayisi:dk.length,deger:dk.reduce((s,k)=>s+(+k.miktar||0)*(+k.fiyat||0),0),kritikSayisi:dk.filter(k=>k.miktar<=k.minMiktar).length};
  });
  return(<div>
    <div style={S.g4}>
      <StatCard color={C.blue} value={depolar.length} label="Toplam Depo"/>
      <StatCard color={C.teal} value={kalemler.length} label="Stok Kalemi Çeşidi"/>

      <tbody>{depoOzet.map(o=>(<tr key={o.depo.id}><td style={S.td}><strong style={{color:C.white}}>{o.depo.ad}</strong></td><td style={S.td}>{DEPO_TIP_LABEL[o.depo.tip]||o.depo.tip}</td><td style={S.td}>{o.depo.konum||'—'}</td><td style={S.td}>{o.kalemSayisi}</td><td style={S.td}><span style={{color:o.kritikSayisi>0?C.red:C.muted,fontWeight:o.kritikSayisi>0?700:400}}>{o.kritikSayisi}</span></td><td style={S.td}>{fmtTL(o.deger)}</td></tr>))}</tbody></table>

function DepolarListesi(){
  const personel=LS.get('personel'),kalemler=LS.get('envanterKalemleri');
  const [depolar,setDepolar]=useState(LS.get('depolar')),[modal,setModal]=useState(false),[form,setForm]=useState({}),[err,setErr]=useState('');
  const save=()=>{
    const hata=validate(form,{ad:[f=>!!f.ad?.trim(),'Depo adı zorunludur.']});
    if(hata){setErr(hata);return;}
    setErr('');
    const n=form.id?depolar.map(d=>d.id===form.id?form:d):[...depolar,{...form,id:uid()}];
    LS.set('depolar',n);setDepolar(n);setModal(false);
  };
  const del=async(id)=>{
    if(kalemler.some(k=>k.depoId===id)){fpToast('Bu depoda kayıtlı stok kalemleri var. Silmeden önce kalemleri başka bir depoya taşıyın veya silin.','error');return;}
    if(!(await fpConfirm('Bu depo silinsin mi?')))return;
    const n=depolar.filter(d=>d.id!==id);LS.set('depolar',n);setDepolar(n);
  };
  return(<div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}><button style={S.btn()} onClick={()=>{setForm({tip:'merkez'});setErr('');setModal(true);}}>＋ Depo Ekle</button></div>
    <div style={S.g3}>
      {depolar.map(d=>{
        const dk=kalemler.filter(k=>k.depoId===d.id);
        const deger=dk.reduce((s,k)=>s+(+k.miktar||0)*(+k.fiyat||0),0);

const KOPEK_DURUM_LABEL={aktif:'Aktif',emekli:'Emekli',vefat:'Vefat Etti'};

const kopekYasi=(dogumTarihi)=>{
  if(!dogumTarihi)return'—';
  const d=new Date(dogumTarihi),now=new Date();
  let yil=now.getFullYear()-d.getFullYear(),ay=now.getMonth()-d.getMonth();
  if(now.getDate()<d.getDate())ay--;
  if(ay<0){yil--;ay+=12;}
  if(yil>0)return`${yil} yaş${ay>0?` ${ay} ay`:''}`;
  return`${ay} ay`;
};

function BekciGenelBakis(){

  return(<div>

      <StatCard color={C.red} value={acikSaglik.length} label="Açık Sağlık Kaydı"/>
      <StatCard color={C.accent} value={fmtTL(genelToplamMaliyet)} label="Toplam Masraf" sub={`Bu yıl: ${fmtTL(buYilMaliyet)}`}/>
    </div>
    {yaklasanAsilar.length>0&&(<div style={S.card}>
      <div style={S.secTitle}>💉 Yaklaşan / Gecikmiş Aşılar</div>
      {yaklasanAsilar.map(a=>{
        const gun=daysLeft(a.sonrakiTarih);const renk=gun<0?C.red:gun<=eK?C.red:C.yellow;
        return(<div key={a.id} style={{...S.alert(renk),marginBottom:8}}><span style={{fontSize:16}}>{gun<0?'🔴':'🟡'}</span><div style={{flex:1}}><div style={{fontWeight:700,marginBottom:2}}>{kopekAd(a.kopekId)} — {a.asiAdi}</div><div style={{fontSize:12,opacity:.85}}>{gun<0?`${Math.abs(gun)} gün gecikti`:`${gun} gün kaldı`}</div></div><span style={{fontSize:11,opacity:.7}}>{fmtDate(a.sonrakiTarih)}</span></div>);
      })}
    </div>)}
